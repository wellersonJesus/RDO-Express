<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | SRE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <div class="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="logo-text"><span class="text-danger">RDO</span><span class="text-dark">Express</span></div>
        <nav class="nav flex-column">
            <a class="nav-link" href="#" onclick="loadPage('dashboard', 'Dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</a>
            
            <a class="nav-link" href="#" onclick="toggleSubmenu(this)"><i class="bi bi-box-seam"></i> Pedidos <i class="bi bi-chevron-down float-end"></i></a>
            <div class="submenu">
                <a class="nav-link" href="#" onclick="loadPage('pedidos_novo', 'Novo Pedido')">Novo Pedido</a>
                <a class="nav-link" href="#" onclick="loadPage('pedidos_lista', 'Listagem')">Listagem</a>
            </div>

            <a class="nav-link" href="#" onclick="loadPage('clientes', 'Clientes')"><i class="bi bi-people"></i> Clientes</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-rdo btn-rdo-danger w-100" onclick="logout()">
                <i class="bi bi-box-arrow-left"></i> Sair do Painel
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <button class="burger-btn d-md-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 id="page-title" class="mb-0">Dashboard</h5>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold">Wellerson</div>
                    <div class="text-muted" style="font-size: 11px;">SRE Architect</div>
                </div>
                <div class="profile-circle" onclick="logout()">
                    <i class="bi bi-power"></i>
                </div>
            </div>
        </header>
        <div class="p-4" id="router-view"></div>
    </main>

    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
