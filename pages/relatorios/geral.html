<div class="animate-in">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-bold m-0 text-dark">Relatório Geral</h5>
            <p class="text-muted small m-0" id="rel-count-info">Sincronizando...</p>
        </div>
        <button class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold" onclick="window.fetchRelatorios()">
            <i class="bi bi-arrow-clockwise me-1"></i> ATUALIZAR
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light border-bottom">
                    <tr class="text-muted small text-uppercase" style="font-size: 0.7rem; letter-spacing: 0.5px;">
                        <th class="px-3 py-2 text-center" style="width: 50px;">Qtd</th>
                        <th class="px-3 py-2">Data</th>
                        <th class="px-3 py-2">Cliente</th>
                        <th class="px-3 py-2">Serviço / Endereço</th>
                    </tr>
                </thead>
                <tbody id="b-rel" class="border-top-0" style="font-size: 0.82rem;">
                    <tr><td colspan="4" class="text-center p-4 text-muted">Carregando dados da aba relatorios...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center px-3 py-2 bg-light border-top">
            <div style="font-size: 0.75rem;" class="text-muted" id="rel-page-info">Página 1</div>
            <nav><ul class="pagination pagination-sm mb-0 gap-1" id="rel-pagination"></ul></nav>
        </div>
    </div>
</div>

<script>
(function() {
    let dataSet = [];
    let page = 1;
    const limit = 15;

    window.fetchRelatorios = async function() {
        const tbody = document.getElementById('b-rel');
        try {
            // Chamada forçando a aba 'relatorios'
            const response = await fetch(`${API_URL}?sheet=relatorios`);
            const data = await response.json();
            
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center p-4 text-danger">Erro: ${data.error}</td></tr>`;
                return;
            }

            dataSet = data;
            render();
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center p-4 text-danger">Erro de conexão com a API.</td></tr>';
        }
    };

    function render() {
        const tbody = document.getElementById('b-rel');
        const start = (page - 1) * limit;
        const end = start + limit;
        const items = dataSet.slice(start, end);

        document.getElementById('rel-count-info').innerText = `${dataSet.length} registros encontrados`;
        document.getElementById('rel-page-info').innerText = `${start + 1}-${Math.min(end, dataSet.length)} de ${dataSet.length}`;

        tbody.innerHTML = items.map(row => `
            <tr>
                <td class="px-3 py-2 fw-bold text-danger text-center">${row.quantidade || '1'}</td>
                <td class="px-3 py-2 text-secondary" style="white-space:nowrap">${row.datas || '-'}</td>
                <td class="px-3 py-2 fw-bold text-dark">${row.cliente || '---'}</td>
                <td class="px-3 py-2 text-muted">
                    <div style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        <span class="badge bg-danger bg-opacity-10 text-danger border-0 me-1" style="font-size: 0.65rem;">
                            ${(row.tipos_de_servicos || 'N/A').toUpperCase()}
                        </span>
                        ${row.enderecos || '-'}
                    </div>
                </td>
            </tr>
        `).join('');

        renderPagination();
    }

    function renderPagination() {
        const total = Math.ceil(dataSet.length / limit);
        const nav = document.getElementById('rel-pagination');
        let h = '';
        for (let i = 1; i <= total; i++) {
            h += `<li class="page-item ${i === page ? 'active' : ''}">
                    <a class="page-link border-0 rounded-1 mx-1" href="#" onclick="changeRelPage(event, ${i})">${i}</a>
                  </li>`;
        }
        nav.innerHTML = h;
    }

    window.changeRelPage = (e, p) => {
        e.preventDefault();
        page = p;
        render();
    };

    fetchRelatorios();
})();
</script>
