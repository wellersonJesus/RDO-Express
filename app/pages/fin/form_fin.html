<div class="modal fade" id="modalNovoFinanceiro" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
      <div class="fin-form-header">
        <div class="d-flex align-items-center gap-3">
          <div class="fin-form-header-icon" id="fin-form-header-icon">
            <i class="bi bi-plus-circle"></i>
          </div>
          <div>
            <h6 id="form-fin-titulo" class="fw-bold mb-0 text-white">Novo Lançamento</h6>
            <small class="fin-form-subtitle" id="fin-form-subtitle">Preencha os dados abaixo</small>
          </div>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4 pt-4 pb-2">
        <input type="hidden" id="fin-edit-id">
        <div id="form-novo-fin-erro" class="alert alert-danger d-none py-2 px-3 rounded-3 mb-3" style="font-size:.74rem;"></div>

        <div class="fin-form-section">
          <div class="fin-form-section-label"><i class="bi bi-calendar-event me-1"></i>Informações Principais</div>
          <div class="row g-3">
            <div class="col-6">
              <label class="fin-field-label">Tipo <span class="text-danger">*</span></label>
              <select id="fin-tipo" class="form-select form-select-sm fin-field-input">
                <option value="">Selecione...</option>
                <option value="entrada">Entrada (Receita)</option>
                <option value="saida">Saída (Despesa)</option>
              </select>
            </div>
            <div class="col-6">
              <label class="fin-field-label">Data <span class="text-danger">*</span></label>
              <input type="date" id="fin-data" class="form-control form-control-sm fin-field-input">
            </div>
            <div class="col-6">
              <label class="fin-field-label">Situação</label>
              <select id="fin-situacao" class="form-select form-select-sm fin-field-input">
                <option value="pendente">Pendente</option>
                <option value="pago">Pago</option>
                <option value="recebido">Recebido</option>
                <option value="cancelado">Cancelado</option>
              </select>
            </div>
            <div class="col-6">
              <label class="fin-field-label">Colaborador</label>
              <select id="fin-colaborador-id" class="form-select form-select-sm fin-field-input">
                <option value="">— Nenhum —</option>
              </select>
            </div>
            <div class="col-12">
              <label class="fin-field-label">Descrição</label>
              <input type="text" id="fin-descricao" class="form-control form-control-sm fin-field-input"
                placeholder="Ex: Pix realizado para Igor - 01/06/2025">
            </div>
          </div>
        </div>

        <div class="fin-form-divider"></div>

        <div class="fin-form-section">
          <div class="fin-form-section-label"><i class="bi bi-currency-dollar me-1"></i>Valor</div>
          <div class="row g-3">
            <div class="col-12">
              <label class="fin-field-label">Valor (R$) <span class="text-danger">*</span></label>
              <div class="input-group input-group-sm">
                <span class="input-group-text fin-field-prefix">R$</span>
                <input type="text" id="fin-valor" class="form-control form-control-sm fin-field-input"
                  placeholder="0,00" inputmode="decimal">
              </div>
            </div>
          </div>
          <div id="fin-preview-comissao" class="d-none mt-3 p-2 rounded-3" style="background:#f8f9fa;font-size:.72rem;">
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted">Total</span>
              <span id="preview-valor-total" class="fw-semibold"></span>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted">Colaborador (<span id="preview-pct-colab">80</span>%)</span>
              <span id="preview-valor-colab" class="fw-semibold" style="color:#6f42c1;"></span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted">Empresa (<span id="preview-pct-empresa">20</span>%)</span>
              <span id="preview-valor-empresa" class="fw-semibold" style="color:#0d6efd;"></span>
            </div>
          </div>
        </div>

        <div class="fin-form-divider"></div>

        <div class="fin-form-section">
          <div class="fin-form-section-label"><i class="bi bi-chat-left-text me-1"></i>Observação</div>
          <textarea id="fin-obs" class="form-control form-control-sm fin-field-input"
            rows="2" placeholder="Observações opcionais..." style="resize:none;"></textarea>
        </div>
      </div>
      <div class="fin-form-footer">
        <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" id="btn-salvar-novo-fin" class="btn btn-danger btn-sm rounded-pill px-4">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
      </div>
    </div>
  </div>
</div>
