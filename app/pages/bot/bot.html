<div class="container-fluid p-0">

    <div class="card border-0 shadow-sm bg-white rounded-4 mb-3">
        <div class="card-body p-3">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-3">
                    <div id="bot-logo-container" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-gear-wide-connected" style="font-size:1.5rem;color:#FF0000;"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color:#FF0000;">RDO</span> Express</h5>
                        <small class="text-muted" style="font-size:0.72rem;">Painel de Gestão e Automatização</small>
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button id="btn-status-bot" class="btn btn-master-off btn-sm rounded-pill px-3" onclick="window.toggleMaster()">
                        MASTER OFF
                    </button>
                    <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="window.abrirModalCadastro()">
                        <i class="bi bi-plus-lg"></i> Novo
                    </button>
                    <button class="btn-sync-bot" onclick="window.initBot()" title="Atualizar">
                        <i id="sync-icon-bot" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex gap-2 align-items-center">
                <select id="filtro-tipo" class="form-select form-select-sm rounded-pill"
                    style="width:150px;font-size:0.78rem;" onchange="window.filtrarBot()">
                    <option value="TODOS">Todos</option>
                    <option value="usuarios">Usuários</option>
                    <option value="clientes">Clientes</option>
                    <option value="colaboradores">Colaboradores</option>
                </select>
                <div class="input-group input-group-sm flex-grow-1">
                    <span class="input-group-text bg-white border-end-0 rounded-start-pill">
                        <i class="bi bi-search text-muted" style="font-size:0.8rem;"></i>
                    </span>
                    <input id="busca-nome" type="text" class="form-control border-start-0 rounded-end-pill"
                        placeholder="Buscar por nome..." style="font-size:0.78rem;" oninput="window.filtrarBot()">
                </div>
            </div>

        </div>
    </div>

    <div class="card border-0 shadow-sm bg-white rounded-4">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle border-0 mb-0">
                <thead class="text-uppercase" style="font-size:0.65rem;color:#999;letter-spacing:1px;">
                    <tr>
                        <th class="ps-3" style="width:60px;">
                            <div class="d-flex align-items-center gap-2">
                                <input type="checkbox" id="seletor-global-status" class="seletor-global-checkbox"
                                    title="Ativar/Desativar todos" disabled
                                    onchange="window.alternarTodosStatus(this.checked)">
                                <span>Status</span>
                            </div>
                        </th>
                        <th style="width:50px;">Avatar</th>
                        <th>Nome</th>
                        <th style="width:100px;">Tipo</th>
                        <th class="text-end pe-3" style="width:110px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="bot-list"></tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center px-3 pb-3">
            <small id="info-total" class="text-muted" style="font-size:0.72rem;"></small>
            <div class="btn-group shadow-sm">
                <button class="btn btn-light btn-sm" onclick="window.mudarPagina(-1)">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <button class="btn btn-light btn-sm" id="info-paginacao" disabled
                    style="min-width:100px;font-size:0.75rem;">Pág 1</button>
                <button class="btn btn-light btn-sm" onclick="window.mudarPagina(1)">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

</div>


<div class="modal fade" id="modalConfirmarExclusao" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-body text-center p-4">
                <div class="mb-3">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem;"></i>
                </div>
                <h6 class="fw-bold mb-2">Confirmar Exclusão</h6>
                <p class="text-muted mb-0" style="font-size:0.82rem;" id="texto-exclusao">
                    Deseja remover este registro?
                </p>
            </div>
            <div class="modal-footer border-0 justify-content-center gap-2 pb-4 pt-0">
                <button type="button" class="btn btn-light btn-sm rounded-pill px-4" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="button" class="btn btn-danger btn-sm rounded-pill px-4" id="btn-confirmar-exclusao">
                    <i class="bi bi-trash me-1"></i> Excluir
                </button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="modalUsuarioBot" tabindex="-1" data-bs-backdrop="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 rounded-4 shadow overflow-hidden">

            <div class="bot-form-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="bot-form-header-icon">
                        <i class="bi bi-person-gear"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0 text-white" id="modal-usuario-bot-titulo" style="font-size:.88rem;">Novo Usuário</h6>
                        <small class="bot-form-subtitle">Preencha os dados abaixo</small>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body px-4 py-3">
                <input type="hidden" id="usuario-bot-id">

                <div class="bot-form-section">
                    <div class="bot-form-section-label">Identificação</div>
                    <div class="mb-3">
                        <label class="bot-field-label">Nome</label>
                        <input type="text" id="usuario-bot-username"
                            class="form-control form-control-sm bot-field-input"
                            placeholder="Nome do usuário">
                    </div>
                    <div class="mb-3">
                        <label class="bot-field-label">Contato</label>
                        <input type="text" id="usuario-bot-contato"
                            class="form-control form-control-sm bot-field-input"
                            placeholder="+55 11 99999-9999">
                    </div>
                    <div class="mb-3">
                        <label class="bot-field-label">Cargo</label>
                        <select id="usuario-bot-tipo" class="form-select form-select-sm bot-field-input"></select>
                    </div>
                </div>

                <div class="bot-form-section">
                    <div class="bot-form-section-label">Acesso</div>
                    <div class="mb-3">
                        <label class="bot-field-label">Senha</label>
                        <div class="input-group input-group-sm">
                            <input type="password" id="usuario-bot-password"
                                class="form-control bot-field-input"
                                style="border-radius:10px 0 0 10px !important;"
                                placeholder="Senha">
                            <button type="button" class="btn-olhinho-clean oculto" id="btn-toggle-senha-bot"
                                style="border:1px solid #e9ecef;border-left:none;border-radius:0 10px 10px 0;padding:0 10px;">
                                <i class="bi bi-eye-slash" id="icon-toggle-senha-bot"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="bot-field-label">URL da Imagem (opcional)</label>
                        <input type="text" id="usuario-bot-imagem"
                            class="form-control form-control-sm bot-field-input"
                            placeholder="https://...">
                    </div>
                </div>

            </div>

            <div class="bot-form-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-3"
                    data-bs-dismiss="modal" style="font-size:.72rem;">
                    Cancelar
                </button>
                <button type="button" class="btn btn-danger btn-sm rounded-pill px-4"
                    id="btn-salvar-usuario-bot" onclick="window.salvarUsuarioBot()" style="font-size:.72rem;">
                    <i class="bi bi-check-lg me-1"></i> Salvar
                </button>
            </div>

        </div>
    </div>
</div>


<script>
(function () {
    const btnToggle = document.getElementById('btn-toggle-senha-bot');
    const inputSenha = document.getElementById('usuario-bot-password');
    const iconToggle = document.getElementById('icon-toggle-senha-bot');

    if (btnToggle && inputSenha && iconToggle) {
        btnToggle.addEventListener('click', function () {
            const visivel = inputSenha.type === 'text';
            inputSenha.type = visivel ? 'password' : 'text';
            iconToggle.className = visivel ? 'bi bi-eye-slash' : 'bi bi-eye';
            btnToggle.classList.toggle('oculto', visivel);
        });
    }
})();
</script>
