<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS Logística - RDO Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div id="login-screen" class="container d-flex justify-content-center" style="margin-top: 15vh;">
        <div class="card shadow-lg p-4" style="max-width: 360px; width: 100%; border-radius: 15px;">
            <h3 class="text-center fw-bold text-primary mb-4">GMS <span class="text-dark">LOG</span></h3>
            <div id="login-error" class="alert alert-danger d-none">Credenciais inválidas!</div>
            <form id="login-form">
                <input type="text" id="user" class="form-control mb-3" placeholder="Usuário" required>
                <input type="password" id="pass" class="form-control mb-4" placeholder="Senha" required>
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Acessar</button>
            </form>
        </div>
    </div>

    <div id="main-panel" class="d-none">
        <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
            <div class="container">
                <span class="navbar-brand fw-bold">GMS <span class="text-primary">RDO EXPRESS</span></span>
                <button onclick="logout()" class="btn btn-sm btn-outline-danger border-0">Sair</button>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="bg-white p-2 rounded shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>DATA</th><th>CLIENTE</th><th>SOLICITAÇÃO</th><th>SERVIÇO</th><th>VALOR</th><th>MOTOBOY</th>
                            </tr>
                        </thead>
                        <tbody id="data-table">
                            <tr><td colspan="6" class="text-center py-5">Carregando dados...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
