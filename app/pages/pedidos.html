<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3"><h5>Gerenciamento de Pedidos</h5></div>
    <div class="table-responsive">
        <table class="table table-hover table-sm">
            <thead class="table-light">
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Origem</th>
                    <th>Destino</th>
                    <th>Solicitação</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody id="pedidos-body">
                <tr><td colspan="6">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    window.carregarPedidos = async () => {
        const tbody = document.getElementById('pedidos-body');
        const data = await API.call('getpedidos');
        
        if (!data || data.status === 'error') {
            return tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Erro ao carregar: ${data ? data.message : 'Sem resposta'}</td></tr>`;
        }
        
        tbody.innerHTML = data.map(p => `
            <tr>
                <td>${p.data_solicitacao ? p.data_solicitacao.substring(0, 10) : '-'}</td>
                <td>${p.id_cliente || '-'}</td>
                <td>${p.origem || '-'}</td>
                <td>${p.destino || '-'}</td>
                <td>${p.solicitacao || '-'}</td>
                <td>${p.tipo_servico || '-'}</td>
            </tr>
        `).join('');
    };
</script>
