<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content border-0 rounded-4 shadow overflow-hidden">

      <div class="fin-form-header">
        <div class="d-flex align-items-center justify-content-between w-100">
          <div class="d-flex align-items-center gap-3">
            <div class="fin-form-header-icon"><i class="bi bi-send-fill"></i></div>
            <div>
              <h6 class="fw-bold mb-0 text-white" style="font-size:.88rem;">
                <span style="color:rgba(255,255,255,.7);">RDO</span> Express — Checkout
              </h6>
              <small class="fin-form-subtitle">
                <i class="bi bi-person-fill me-1"></i>Cliente:
                <span id="header-nome-cliente" class="fw-bold text-white">Carregando...</span>
              </small>
            </div>
          </div>
          <button
            type="button"
            class="d-flex align-items-center justify-content-center rounded-circle border-0"
            style="width:28px;height:28px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;transition:background .2s;flex-shrink:0;"
            onmouseover="this.style.background='rgba(255,255,255,.28)'"
            onmouseout="this.style.background='rgba(255,255,255,.15)'"
            onclick="window.fecharParaChat('modalFormulario')"
            title="Cancelar e voltar ao chat">
            <i class="bi bi-x-lg" style="font-size:.8rem;"></i>
          </button>
        </div>
      </div>

      <div class="modal-body px-4 py-3">
        <form id="form-checkout" novalidate autocomplete="off" onsubmit="return false;">

          <div class="fin-form-section">
            <div class="fin-form-section-label">
              <i class="bi bi-person-badge me-2"></i>Dados principais
            </div>

            <div class="row g-2 mb-2">
              <div class="col-md-6">
                <label class="fin-field-label">Solicitante <span class="text-danger">*</span></label>
                <input type="text" id="p-solicitante" class="form-control form-control-sm fin-field-input"
                  placeholder="Nome do solicitante" readonly>
              </div>
              <div class="col-md-6">
                <label class="fin-field-label">Contato <span class="text-danger">*</span></label>
                <input type="text" id="p-contato" class="form-control form-control-sm fin-field-input"
                  placeholder="Telefone ou WhatsApp">
              </div>
            </div>

            <div class="row g-2 mb-2">
              <div class="col-md-3">
                <label class="fin-field-label">Mercadoria <span class="text-danger">*</span></label>
                <select id="p-mercadoria" class="form-select form-select-sm fin-field-input">
                  <option value="">SELECIONE</option>
                  <option value="ENTREGA">Entrega</option>
                  <option value="BUSCA">Busca</option>
                  <option value="COMPRA">Compra</option>
                  <option value="PAGAMENTO">Pagamento</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="fin-field-label">Horário</label>
                <input type="text" id="p-horario" class="form-control form-control-sm fin-field-input"
                  placeholder="Ex: 14:30">
              </div>
              <div class="col-md-3">
                <label class="fin-field-label">Distância (KM)</label>
                <input type="text" id="p-distancia" class="form-control form-control-sm fin-field-input"
                  readonly style="background:#f8f9fa;cursor:not-allowed;">
              </div>
              <div class="col-md-3">
                <label class="fin-field-label">Tempo</label>
                <input type="text" id="p-tempo" class="form-control form-control-sm fin-field-input"
                  readonly style="background:#f8f9fa;cursor:not-allowed;">
              </div>
            </div>

            <div class="mb-2">
              <label class="fin-field-label">Rota(s) <span class="text-danger">*</span></label>
              <textarea id="p-rotas" class="form-control form-control-sm fin-field-input" rows="3"
                style="border-radius:10px!important;resize:none;background:#f8f9fa;cursor:not-allowed;font-family:monospace;font-size:.75rem;line-height:1.6;"
                readonly></textarea>
            </div>
          </div>

          <div class="fin-form-section">
            <div class="fin-form-section-label">
              <i class="bi bi-calculator me-2"></i>Tarifação
            </div>

            <div class="row g-2 mb-2">
              <div class="col-6 col-md-3">
                <label class="fin-field-label">Valor/KM</label>
                <select id="p-valor-km" class="form-select form-select-sm fin-field-input"
                  onchange="window.calcularTudo()">
                  <option value="2.02">R$ 2,02</option>
                  <option value="2.20">R$ 2,20</option>
                  <option value="3.00" selected>R$ 3,00</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <label class="fin-field-label">Retorno</label>
                <select id="p-retorno" class="form-select form-select-sm fin-field-input"
                  onchange="window.calcularTudo()">
                  <option value="0">Não</option>
                  <option value="0.6">Sim (60%)</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <label class="fin-field-label">Dinâmica</label>
                <select id="p-dinamica" class="form-select form-select-sm fin-field-input"
                  onchange="window.calcularTudo()">
                  <option value="0">R$ 0,00</option>
                  <option value="5">R$ 5,00</option>
                  <option value="7">R$ 7,00</option>
                  <option value="10">R$ 10,00</option>
                  <option value="15">R$ 15,00</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <label class="fin-field-label">Prioridade</label>
                <select id="p-prioridade" class="form-select form-select-sm fin-field-input"
                  onchange="window.calcularTudo()">
                  <option value="0">Normal</option>
                  <option value="5">Agendado (+R$5)</option>
                  <option value="7">Urgente (+R$7)</option>
                </select>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-12">
                <label class="fin-field-label">Observação</label>
                <input type="text" id="p-obs" class="form-control form-control-sm fin-field-input"
                  placeholder="Informações adicionais...">
              </div>
            </div>
          </div>

          <div class="fin-form-section mb-0">
            <div class="fin-form-section-label">
              <i class="bi bi-cash-stack me-2"></i>Resumo financeiro
            </div>
            <div class="d-flex align-items-center justify-content-between px-3 py-3 rounded-3 shadow-sm"
              style="background:linear-gradient(135deg,#f8f9fa 0%,#ffffff 100%);border:2px solid #e9ecef;">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-currency-dollar text-success" style="font-size:1.3rem;"></i>
                <span style="font-size:.7rem;font-weight:600;color:#6c757d;text-transform:uppercase;letter-spacing:.05em;">
                  Total estimado
                </span>
              </div>
              <span id="view-valor-final" style="font-size:1.5rem;font-weight:700;color:#198754;">R$ 0,00</span>
            </div>
          </div>

        </form>
      </div>

      <div class="fin-form-footer">
        <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-3"
          style="font-size:.72rem;font-weight:600;" onclick="window.voltarParaMapa()">
          <i class="bi bi-arrow-left me-1"></i>Voltar
        </button>
        <button type="button" id="btn-remitir-pedido" class="btn btn-danger btn-sm rounded-pill px-4 shadow-sm"
          style="font-size:.72rem;font-weight:600;" onclick="window.remitirPedido()">
          <i class="bi bi-send-fill me-1"></i>EMITIR PEDIDO
        </button>
      </div>

    </div>
  </div>
</div>
