            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Colaborador</h5>
                <input type="text" id="col-username" class="form-control mb-2" placeholder="Nome">
                <select id="col-tipo" class="form-select mb-2">
                    <option value="">Selecione o Tipo</option>

                </select>
                <input type="text" id="col-cnpj" class="form-control mb-2" placeholder="CNPJ">
                <button class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalColaborador')">Salvar</button>
            </div>
        </div>
    </div>
</div>
