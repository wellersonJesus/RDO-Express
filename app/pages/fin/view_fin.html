<div class="modal fade" id="modalViewFin" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

      <div class="fin-extrato-header" id="fin-view-header">
        <div class="d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-3">
            <div class="fin-extrato-header-icon" id="fin-view-tipo-icon">
              <i class="bi bi-arrow-down-left"></i>
            </div>
            <div>
              <div class="fin-extrato-tipo" id="fin-view-tipo-label">RECEITA</div>
              <div class="fin-extrato-date" id="fin-view-data"></div>
            </div>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
      </div>

      <div class="modal-body p-0">

        <div class="fin-extrato-status-bar" id="fin-view-status-bar">
          <div class="d-flex align-items-center gap-2">
            <div class="fin-extrato-status-dot" id="fin-view-status-dot"></div>
            <span class="fin-extrato-status-text" id="fin-view-status-text">Pendente</span>
          </div>
          <span class="fin-extrato-id" id="fin-view-id">#0000</span>
        </div>

        <div class="fin-extrato-body">

          <!-- Valor em destaque, grande e centralizado -->
          <div class="fin-view-valor-destaque" id="fin-view-valor-footer">
            <div class="fin-view-valor-destaque-label">
              <i class="bi bi-cash-coin" id="fin-view-valor-footer-icon"></i>
              <span id="fin-view-valor-footer-titulo">VALOR DA RECEITA</span>
            </div>
            <div class="fin-view-valor-destaque-valor" id="fin-view-valor">R$ 0,00</div>
          </div>

          <!-- Informações em ordem: Cliente, Colaborador, Tipo, Situação, Hora -->
          <div class="fin-extrato-section">
            <div class="fin-extrato-section-title">Informações do Lançamento</div>
            <div class="fin-view-grid-info">
              <div class="fin-view-grid-item">
                <div class="fin-view-grid-label"><i class="bi bi-person"></i> Cliente</div>
                <div class="fin-view-grid-value" id="fin-view-cliente-grid">-</div>
              </div>
              <div class="fin-view-grid-item">
                <div class="fin-view-grid-label"><i class="bi bi-person-badge"></i> Colaborador</div>
                <div class="fin-view-grid-value" id="fin-view-colaborador-grid">-</div>
              </div>
              <div class="fin-view-grid-item">
                <div class="fin-view-grid-label"><i class="bi bi-arrow-down-up"></i> Tipo</div>
                <div class="fin-view-grid-value" id="fin-view-tipo-grid">-</div>
              </div>
              <div class="fin-view-grid-item">
                <div class="fin-view-grid-label"><i class="bi bi-circle-half"></i> Situação</div>
                <div class="fin-view-grid-value" id="fin-view-situacao-grid">-</div>
              </div>
              <div class="fin-view-grid-item">
                <div class="fin-view-grid-label"><i class="bi bi-clock"></i> Hora</div>
                <div class="fin-view-grid-value" id="fin-view-hora-grid">-</div>
              </div>
            </div>
          </div>

          <div class="fin-extrato-divider"></div>

          <div class="fin-extrato-section">
            <div class="fin-extrato-section-title">Detalhes</div>
            <div class="fin-extrato-row">
              <div class="fin-extrato-row-icon"><i class="bi bi-file-text"></i></div>
              <div class="fin-extrato-row-content">
                <div class="fin-extrato-row-label">Descrição</div>
                <div class="fin-extrato-row-value" id="fin-view-descricao">-</div>
              </div>
            </div>
            <div class="fin-extrato-row">
              <div class="fin-extrato-row-icon"><i class="bi bi-box-seam"></i></div>
              <div class="fin-extrato-row-content">
                <div class="fin-extrato-row-label">Pedido Vinculado</div>
                <div class="fin-extrato-row-value" id="fin-view-pedido">-</div>
              </div>
            </div>
            <div class="fin-extrato-row" id="fin-view-obs-row">
              <div class="fin-extrato-row-icon"><i class="bi bi-chat-left-text"></i></div>
              <div class="fin-extrato-row-content">
                <div class="fin-extrato-row-label">Observação</div>
                <div class="fin-extrato-row-value" id="fin-view-obs">-</div>
              </div>
            </div>
          </div>

        </div>

        <div class="fin-extrato-footer">
          <div class="fin-extrato-footer-line">
            <i class="bi bi-clock-history"></i>
            <span id="fin-view-timestamp"></span>
          </div>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-danger rounded-pill px-4" id="btn-visualizar-editar-fin"
              style="font-size:.78rem;height:38px;">
              <i class="bi bi-pencil-square me-1"></i>Editar
            </button>
            <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal">
              Fechar
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
