<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 px-4 pt-4 flex-column align-items-start">
                <h5 class="modal-title fw-bold text-danger">RDO Express - Checkout</h5>
                <div class="mt-1 text-muted small">
                    Solicitante: <span id="header-nome-solicitante" class="fw-bold text-dark"></span>
                </div>
            </div>
            
            <div class="modal-body p-4 pt-2">
                <form id="form-checkout">
                    <div class="mb-2">
                        <small class="text-muted fw-bold">Solicitante:</small>
                        <input type="text" id="p-solicitante" class="form-control form-control-sm rounded-pill border-secondary" readonly>
                    </div>

                    <div class="row g-2">
                        <div class="col-6"><input type="text" id="p-contato" class="form-control form-control-sm rounded-pill border-secondary" placeholder="Contato"></div>
                        <div class="col-6"><input type="time" id="p-horario" class="form-control form-control-sm rounded-pill border-secondary"></div>
                        <div class="col-4"><input type="number" id="p-distancia" class="form-control form-control-sm rounded-pill border-secondary" placeholder="KM Total"></div>
                        <div class="col-4"><input type="text" id="p-tempo" class="form-control form-control-sm rounded-pill border-secondary" placeholder="Tempo Est."></div>
                        <div class="col-4">
                            <select id="p-prioridade" class="form-select form-select-sm rounded-pill border-secondary">
                                <option value="0">Normal</option>
                                <option value="7">Urgente</option>
                            </select>
                        </div>
                    </div>

                    <div class="my-2" id="container-linhas-rotas"></div>

                    <textarea id="p-obs" class="form-control form-control-sm rounded-3 border-secondary" rows="2" placeholder="Observações"></textarea>
                </form>

                <div class="mt-3 p-2 bg-light rounded-3 text-center border border-secondary">
                    <span class="text-muted small">Valor Final:</span>
                    <h5 class="mb-0 fw-bold text-danger" id="view-valor-final">R$ 0,00</h5>
                </div>

                <div class="row g-2 mt-3">
                    <div class="col-5"><button type="button" class="btn btn-outline-danger w-100 rounded-pill fw-bold" onclick="window.voltarParaMapa()">Voltar</button></div>
                    <div class="col-7"><button type="button" class="btn btn-danger w-100 rounded-pill fw-bold" onclick="salvarPedidoAPI()">FINALIZAR PEDIDO</button></div>
                </div>
            </div>
        </div>
    </div>
</div>
