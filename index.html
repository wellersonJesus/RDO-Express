<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | SRE Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="landing-page">
        <div class="card-gms">
            <h3 class="fw-bold text-center mb-4"><span class="text-danger">RDO</span> EXPRESS</h3>
            <form id="login-form">
                <input type="text" id="user" class="form-control mb-3" placeholder="Usuário">
                <input type="password" id="pass" class="form-control mb-4" placeholder="Senha">
                <button class="btn btn-danger w-100 fw-bold">ACESSAR SISTEMA</button>
            </form>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="p-4 border-bottom">
                <h4 class="fw-bold m-0"><span class="text-danger">RDO</span> LOG</h4>
            </div>
            <nav class="mt-4">
                <a href="#" class="nav-link" onclick="loadModule('gestao', 'coletas')"><i class="bi bi-truck me-2"></i> Coletas</a>
                <a href="#" class="nav-link" onclick="loadModule('gestao', 'entregas')"><i class="bi bi-geo-alt me-2"></i> Entregas</a>
                <a href="#" class="nav-link" onclick="loadModule('relatorios', 'geral')"><i class="bi bi-bar-chart me-2"></i> Relatórios</a>
                <hr>
                <a href="#" class="nav-link text-danger" onclick="logout()"><i class="bi bi-door-open me-2"></i> Sair</a>
            </nav>
        </aside>
        <main class="main-content" id="router-view"></main>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
