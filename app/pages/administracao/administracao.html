<div class="container-fluid p-0">
    <div class="card border-0 shadow-sm bg-white rounded-4 mb-3">
        <div class="card-body p-3">
            <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock text-danger"></i> Administração</h5>
            <ul id="adminTabs" class="list-unstyled d-flex gap-2">
                <li><button class="btn-tab-custom active" data-origem="clientes" onclick="window.carregarAdmin('clientes')">Clientes</button></li>
                <li><button class="btn-tab-custom" data-origem="colaboradores" onclick="window.carregarAdmin('colaboradores')">Colaboradores</button></li>
            </ul>
        </div>
    </div>

    <div class="card border-0 shadow-sm bg-white rounded-4">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center p-3">
            <div class="d-flex align-items-center gap-3">
                <small class="text-muted text-uppercase fw-bold" id="titulo-aba">Gerenciando: Clientes</small>
                <input type="text" id="filtro-admin" class="form-control form-control-sm w-auto" placeholder="Filtrar por nome..."
                    oninput="window.adminState.filtroAtual = this.value; window.renderizarAdmin()">
                <button class="btn btn-outline-danger btn-sm rounded-circle" style="width:28px; height:28px; padding:0;" onclick="window.carregarAdmin(window.adminState.origemAtual)">
                    <i id="sync-icon-admin" class="bi bi-arrow-repeat"></i>
                </button>
            </div>
            <button class="btn btn-danger btn-sm rounded-pill px-3" id="btn-novo-admin" onclick="window.abrirModalCadastro()">
                <i class="bi bi-plus-lg"></i> Novo Registro
            </button>
        </div>
        
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle border-0">
                <thead class="text-uppercase" style="font-size: 0.65rem; color: #999;">
                    <tr>
                        <th class="ps-3">Avatar</th>
                        <th>Nome</th>
                        <th>Status</th>
                        <th class="text-end pe-3">Ações</th>
                    </tr>
                </thead>
                <tbody id="admin-list"></tbody>
            </table>
        </div>
        
        <div class="card-footer bg-white border-0 d-flex justify-content-center pb-3">
            <div class="btn-group shadow-sm">
                <button class="btn btn-light" onclick="window.mudarPaginaAdmin(-1)"><i class="bi bi-chevron-left"></i></button>
                <button class="btn btn-light" id="info-paginacao-admin" disabled style="min-width: 100px;">Pág 1</button>
                <button class="btn btn-light" onclick="window.mudarPaginaAdmin(1)"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalBloqueioMaster" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 p-3">
            <div class="modal-body text-center p-4">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                <h5 class="fw-bold mt-3 mb-2">Sistema Master RDO desligado</h5>
                <p class="text-muted mb-4">Faça um contato com a gestão para liberar o registro.</p>
                <button type="button" class="btn btn-dark w-100 rounded-pill" data-bs-dismiss="modal">Entendido</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEscolhaTipo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-bold mb-4">Novo Registro</h5>
                <button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('clientes')">Cliente</button>
                <button class="btn btn-outline-danger w-100" onclick="window.abrirModalEspecifico('colaboradores')">Colaborador</button>
            </div>
        </div>
    </div>
</div>
