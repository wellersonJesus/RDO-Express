<div class="card shadow-sm border-0 bg-white">
    <div class="card-header bg-white py-3 border-0">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold text-dark mb-1 d-flex align-items-center">
                    <i class="bi bi-gear-wide-connected text-danger me-2"></i> Bot RDO Express
                </h4>
                <div class="d-flex align-items-center gap-2">
                    <p class="text-muted mb-0" style="font-size: 0.75rem;">Gerencie conexões de atendentes e grupos.</p>
                    <div id="status-loop" class="d-flex align-items-center gap-1 fw-bold" style="font-size: 0.7rem;"></div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button id="btn-status-bot" class="btn btn-sm px-2 fw-bold shadow-sm" style="font-size: 0.7rem;" onclick="toggleStatusBot()"></button>
                <button class="btn btn-dark btn-sm px-2 shadow-sm" style="font-size: 0.7rem;" data-bs-toggle="modal" data-bs-target="#modalNovoCadastro">
                    <i class="bi bi-plus-lg me-1"></i> CADASTRAR
                </button>
            </div>
        </div>
    </div>
    
    <div class="table-responsive px-3 pb-3">
        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
            <thead class="table-light">
                <tr class="text-secondary" style="font-size: 0.75rem;">
                    <th class="border-0">STATUS</th>
                    <th class="border-0">AVATAR</th>
                    <th class="border-0">NOME</th>
                    <th class="border-0">JID/NÚMERO</th>
                    <th class="border-0">TIPO</th>
                    <th class="border-0 text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="bot-list" class="border-top-0"></tbody>
        </table>
    </div>
</div>

<!-- Modal Cadastro -->
<div class="modal fade" id="modalNovoCadastro" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0 justify-content-center">
                <h5 class="fw-bold text-dark mt-3">Configuração RDO <span class="text-danger">Express</span></h5>
            </div>
            <div class="modal-body px-4 pt-3">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Nome</label>
                    <input type="text" id="reg-nome" class="form-control bg-light border-0" placeholder="Nome do atendente ou grupo">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary text-uppercase">WhatsApp / JID</label>
                    <input type="text" id="reg-valor" class="form-control bg-light border-0" placeholder="55319... ou @g.us">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary text-uppercase">URL da Foto</label>
                    <input type="text" id="reg-logo" class="form-control bg-light border-0" placeholder="https://...">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary text-uppercase">Tipo</label>
                    <select id="reg-tipo" class="form-select bg-light border-0">
                        <option value="atendente">Atendente</option>
                        <option value="grupo">Grupo</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer border-0 px-4 pb-4">
                <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">CANCELAR</button>
                <button class="btn btn-danger px-4 py-2 fw-bold shadow" onclick="executarCadastro()">
                    <i class="bi bi-save me-2"></i> SALVAR
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Confirmação de Exclusão Premium -->
<div class="modal fade" id="modalConfirmDelete" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg text-center" style="border-radius: 1.5rem;">
            <div class="modal-body p-4">
                <div class="text-danger mb-3">
                    <i class="bi bi-exclamation-octagon-fill" style="font-size: 3rem;"></i>
                </div>
                <h5 class="fw-bold text-dark mb-2">Tem certeza?</h5>
                <p class="text-muted small mb-0">Esta ação irá remover o registro permanentemente.</p>
            </div>
            <div class="d-flex border-top">
                <button type="button" class="btn btn-link text-secondary fw-bold text-decoration-none border-end w-100 py-3 m-0 rounded-0" data-bs-dismiss="modal">NÃO</button>
                <button type="button" id="confirmDeleteBtn" class="btn btn-link text-danger fw-bold text-decoration-none w-100 py-3 m-0 rounded-0">SIM</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        let botAtivo = localStorage.getItem('bot_status') === 'true';
        let idParaRemover = null;
        const deleteModal = new bootstrap.Modal(document.getElementById('modalConfirmDelete'));

        window.toggleStatusBot = () => {
            botAtivo = !botAtivo;
            localStorage.setItem('bot_status', botAtivo);
            renderBotUI();
        };

        function renderBotUI() {
            const btn = document.getElementById('btn-status-bot');
            const loop = document.getElementById('status-loop');
            if(botAtivo) {
                btn.className = "btn btn-danger btn-sm px-2 shadow-sm";
                btn.innerHTML = '<i class="bi bi-broadcast"></i> ATIVADO';
                loop.innerHTML = '<i class="bi bi-arrow-repeat spin text-success"></i> <span class="text-success">CONECTADO</span>';
            } else {
                btn.className = "btn btn-outline-secondary btn-sm px-2 shadow-sm";
                btn.innerHTML = '<i class="bi bi-power"></i> DESATIVADO';
                loop.innerHTML = '<i class="bi bi-arrow-repeat text-danger"></i> <span class="text-danger">OFFLINE</span>';
            }
        }

        window.executarCadastro = async () => {
            const payload = {
                action: 'addbotconfig',
                id: "ID-" + Date.now(),
                username: document.getElementById('reg-nome').value.trim(),
                valor: document.getElementById('reg-valor').value.trim(),
                imagem: document.getElementById('reg-logo').value.trim() || 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                tipo: document.getElementById('reg-tipo').value,
                status: true
            };

            if(!payload.username || !payload.valor) return alert("Preencha Nome e WhatsApp!");

            const res = await API.call('addbotconfig', payload);
            if(res) {
                bootstrap.Modal.getInstance(document.getElementById('modalNovoCadastro')).hide();
                document.getElementById('reg-nome').value = '';
                document.getElementById('reg-valor').value = '';
                document.getElementById('reg-logo').value = '';
                carregarBot();
            }
        };

        window.carregarBot = async () => {
            const data = await API.call('getbotconfig') || [];
            const list = document.getElementById('bot-list');
            
            list.innerHTML = data.map(i => {
                const id = i.id || i.ID;
                const nome = i.username || i.USERNAME || 'Sem Nome';
                const valor = i.valor || i.VALOR || 'Sem Dado';
                const logo = i.imagem || i.IMAGEM || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                const tipo = (i.tipo || i.TIPO || 'GERAL').toUpperCase();
                const ativo = (String(i.status || i.STATUS).toLowerCase() === 'true');

                return `
                    <tr class="${!ativo ? 'opacity-50' : ''}">
                        <td>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" ${ativo ? 'checked' : ''} 
                                onchange="API.call('updatebotstatus',{id:'${id}',status:this.checked, action:'updatebotstatus'}).then(carregarBot)">
                            </div>
                        </td>
                        <td><img src="${logo}" class="rounded-circle border" width="32" height="32" style="object-fit:cover"></td>
                        <td class="fw-bold text-dark" style="font-size:0.8rem">${nome}</td>
                        <td class="text-muted small">${valor}</td>
                        <td><span class="badge bg-light text-dark border" style="font-size:0.6rem">${tipo}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm text-danger" onclick="abrirModalRemover('${id}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        };

        window.abrirModalRemover = (id) => {
            idParaRemover = id;
            deleteModal.show();
        };

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if(idParaRemover) {
                await API.call('deletebotconfig', { id: idParaRemover, action: 'deletebotconfig' });
                deleteModal.hide();
                idParaRemover = null;
                carregarBot();
            }
        });

        renderBotUI();
        carregarBot();
    })();
</script>

<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 2s linear infinite; }
    .modal-content { overflow: hidden; }
    .btn-link:hover { background-color: #f8f9fa; text-decoration: none; }
</style>
