<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold text-secondary d-flex align-items-center">
            <i class="bi bi-box-seam text-danger me-3 fs-3"></i>Lista de Pedidos
        </h4>
        <button class="btn btn-dark btn-sm px-3 shadow-sm" onclick="navegarPara('chat')">
            <i class="bi bi-plus-lg me-1"></i> Novo Pedido
        </button>
    </div>
    <div class="table-responsive px-3">
        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
            <thead class="table-light">
                <tr>
                    <th class="py-3 text-secondary">Data</th>
                    <th class="py-3 text-secondary">Cliente</th>
                    <th class="py-3 text-secondary">Origem</th>
                    <th class="py-3 text-secondary">Destino</th>
                    <th class="py-3 text-secondary">Serviço</th>
                    <th class="py-3 text-secondary">Total</th>
                    <th class="text-center py-3 text-secondary">Ações</th>
                </tr>
            </thead>
            <tbody id="pedidos-body">
                <tr>
                    <td colspan="7" class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm text-danger me-2"></div> Carregando pedidos...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white py-2">
        <div id="pagination-info" class="small text-muted text-end"></div>
    </div>
</div>

<script>
    (async function() {
        const tbody = document.getElementById('pedidos-body');
        try {
            const res = await API.call('getpedidos');
            if (!res || res.status === 'error') {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Erro ao carregar dados.</td></tr>';
                return;
            }

            const data = Array.isArray(res) ? res.reverse() : [];
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">Nenhum pedido encontrado.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(p => `
                <tr>
                    <td class="text-muted">${p.data_solicitacao ? new Date(p.data_solicitacao).toLocaleDateString() : '-'}</td>
                    <td>
                        <div class="fw-bold text-dark">${p.id_cliente || 'Não informado'}</div>
                    </td>
                    <td>
                        <div class="text-truncate" style="max-width: 200px;" title="${p.origem}">
                            <i class="bi bi-geo-alt-fill text-danger small"></i> ${p.origem || '-'}
                        </div>
                    </td>
                    <td>
                        <div class="text-truncate text-muted" style="max-width: 200px;" title="${p.destino}">
                            <i class="bi bi-flag-fill text-secondary small"></i> ${p.destino || '-'}
                        </div>
                    </td>
                    <td>
                        <span class="badge bg-light text-danger border border-danger border-opacity-25">${p.tipo_servico || 'Padrão'}</span>
                    </td>
                    <td class="fw-bold text-dark">
                        R$ ${p.valor_total_pedido ? parseFloat(p.valor_total_pedido).toFixed(2).replace('.', ',') : '0,00'}
                    </td>
                    <td class="text-center">
                        <div class="btn-group">
                            <button class="btn btn-sm btn-link text-secondary p-1" title="Ver Detalhes"><i class="bi bi-eye"></i></button>
                            <button class="btn btn-sm btn-link text-danger p-1" title="Excluir"><i class="bi bi-trash3"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.getElementById('pagination-info').innerText = `Total: ${data.length} pedidos encontrados`;

        } catch (err) {
            console.error(err);
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Erro de conexão com o banco de dados.</td></tr>';
        }
    })();
</script>
