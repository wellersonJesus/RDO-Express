<div class="row g-3 h-100">
    <!-- Topo Status Master -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span>
                        </h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Atendimento</small>
                    </div>
                </div>
                <div class="text-end">
                    <span id="sync-text" class="fw-bold text-dark me-2" style="font-size: 0.75rem;">Serviço Ativo</span>
                    <i id="sync-icon" class="bi bi-arrow-repeat fs-4 text-danger" style="cursor:pointer;" onclick="carregarDados()"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Contatos -->
    <div class="col-md-4">
        <div class="accordion shadow-sm rounded-4 overflow-hidden bg-white" id="accordionChat" style="height: 580px; overflow-y: auto;">
            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button class="accordion-button no-arrow bg-light fw-bold text-secondary small py-3 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collAtendentes">
                        ATENDENTES
                    </button>
                </h2>
                <div id="collAtendentes" class="accordion-collapse collapse show">
                    <div id="lista-atendentes-chat" class="list-group list-group-flush"></div>
                </div>
            </div>
            <div class="accordion-item border-0 border-top">
                <h2 class="accordion-header">
                    <button class="accordion-button no-arrow bg-light fw-bold text-secondary small py-3 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collGrupos">
                        GRUPOS / OUTROS
                    </button>
                </h2>
                <div id="collGrupos" class="accordion-collapse collapse show">
                    <div id="lista-grupos-chat" class="list-group list-group-flush"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Janela de Chat -->
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 580px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div id="chat-header-avatar"></div>
                    <div class="ms-3">
                        <h6 id="chat-header-name" class="fw-bold mb-0">Selecione um contato</h6>
                        <small id="chat-header-status" class="text-muted" style="font-size: 0.7rem;"></small>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="btn border-0" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-three-dots-vertical fs-5 text-secondary"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3">
                        <li><a class="dropdown-item py-2 small" href="#" onclick="abrirModalModelo()"><i class="bi bi-file-earmark-text me-2"></i> Modelo de Mensagem</a></li>
                    </ul>
                </div>
            </div>
            
            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto d-flex flex-column gap-2"></div>
            
            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <textarea id="msg-input" class="form-control border-0 bg-transparent px-3" rows="1" placeholder="Cole a solicitação preenchida aqui..." style="resize: none;"></textarea>
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemManual()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Status do Pedido -->
<div class="modal fade" id="modalStatusPedido" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0">
                <h6 class="fw-bold mb-0">Atualizar Status</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="status-msg-id">
                <label class="small fw-bold text-muted mb-1 text-uppercase">Status</label>
                <select id="status-emoji-sel" class="form-select form-select-sm border-0 bg-light mb-3">
                    <option value="⏳">⏳ Aguardando confirmação</option>
                    <option value="📦">📦 Em rota</option>
                    <option value="✅">✅ Finalizado</option>
                    <option value="⭕">⭕ Cancelado</option>
                </select>

                <label class="small fw-bold text-muted mb-1 text-uppercase">Motoboy</label>
                <select id="status-motoboy-sel" class="form-select form-select-sm border-0 bg-light mb-4">
                    <option value="">Selecione o motoboy...</option>
                </select>

                <button class="btn btn-danger w-100 rounded-pill fw-bold btn-sm" onclick="salvarStatusMensagem()">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Checkout e Modais de apoio mantidos conforme original -->
<div class="modal fade" id="modalPedido" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold mb-0">RDO <span class="text-danger">Express</span> - Checkout</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="passo-conferencia">
                    <div class="rounded-4 overflow-hidden border mb-3" style="height: 250px;">
                        <iframe id="mapa-iframe" width="100%" height="100%" frameborder="0" style="border:0"></iframe>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted text-uppercase">Coleta (Origem)</label>
                            <input type="text" id="p-origem" class="form-control form-control-sm bg-light border-0 shadow-sm" oninput="atualizarMapa()">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted text-uppercase">Entrega (Destino)</label>
                            <input type="text" id="p-destino" class="form-control form-control-sm bg-light border-0 shadow-sm" oninput="atualizarMapa()">
                        </div>
                    </div>
                    <button class="btn btn-danger w-100 rounded-pill fw-bold" onclick="proximoPassoPedido()">CONFIGURAR VALORES <i class="bi bi-gear-fill ms-2"></i></button>
                </div>
                <div id="passo-finalizacao" style="display:none;">
                    <div class="row g-2">
                        <div class="col-md-4"><label class="small fw-bold text-muted">Solicitante</label><input type="text" id="p-solicitante" class="form-control border-0 bg-light"></div>
                        <div class="col-md-4"><label class="small fw-bold text-muted">Horário Coleta</label><input type="text" id="p-horario-manual" class="form-control border-0 bg-light"></div>
                        <div class="col-md-4">
                            <label class="small fw-bold text-muted">Tabela KM</label>
                            <select id="p-tabela-km" class="form-select border-0 bg-light" onchange="atualizarTotal()">
                                <option value="2.20" selected>2,20</option><option value="2.40">2,40</option><option value="3.00">3,00</option>
                            </select>
                        </div>
                        <div class="col-md-4 mt-2"><label class="small fw-bold text-muted">Mercadoria</label><input type="text" id="p-mercadoria" class="form-control border-0 bg-light"></div>
                        <div class="col-md-4 mt-2">
                            <label class="small fw-bold text-muted">Zona</label>
                            <select id="p-zona" class="form-select border-0 bg-light" onchange="atualizarTotal()">
                                <option value="0">Centro</option><option value="5">Z. Sul (+5)</option><option value="7">Z. Norte (+7)</option>
                            </select>
                        </div>
                        <div class="col-md-4 mt-2">
                            <label class="small fw-bold text-muted">Prioridade</label>
                            <select id="p-prioridade" class="form-select border-0 bg-light" onchange="atualizarTotal()">
                                <option value="0">Base</option><option value="7">Fast (+7)</option>
                            </select>
                        </div>
                        <div class="col-12 mt-2"><label class="small fw-bold text-muted">Observações</label><textarea id="p-obs" class="form-control border-0 bg-light" rows="1"></textarea></div>
                        <div class="col-12 mt-3">
                            <div class="card border-0 rounded-4" style="background-color: #FF0000; color: white;">
                                <div class="card-body p-3 text-center">
                                    <p class="mb-0 small opacity-75">VALOR TOTAL</p>
                                    <h2 class="mb-0 fw-bold" id="view-valor-final">R$ 0,00</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-light w-50 rounded-pill fw-bold" onclick="voltarPasso()">VOLTAR</button>
                        <button class="btn btn-secondary w-50 rounded-pill fw-bold text-white" onclick="salvarPedidoAPI()">FINALIZAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .no-arrow::after { display: none !important; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 2px solid white; position: absolute; bottom: 2px; right: 12px; }
    .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .msg-wrapper { position: relative; display: flex; flex-direction: column; max-width: 85%; }
    .msg-bubble { background: white; padding: 10px 14px; border-radius: 12px; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); width: 100%; position: relative; }
    .msg-mine { align-self: flex-end; }
    .msg-mine .msg-bubble { background-color: #dcf8c6; border: 1px solid #c7e5b0; }
    .status-emoji-footer { font-size: 1.2rem; margin-top: 2px; cursor: pointer; display: inline-block; transition: transform 0.2s; }
    .status-emoji-footer:hover { transform: scale(1.2); }
    .msg-clickable { cursor: pointer; transition: opacity 0.2s; }
    .msg-clickable:hover { opacity: 0.9; }
    .chat-date-separator { align-self: center; background: #d1f4fd; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; color: #555; margin: 10px 0; text-transform: uppercase; box-shadow: 0 1px 1px rgba(0,0,0,0.05); }
</style>

<script>
    if (!window.chatState) window.chatState = { currentName: null };

    async function carregarDados() {
        const configs = await API.call('getbotconfig');
        renderizar(configs);
        await carregarMotoboys();
        if(window.chatState.currentName) await carregarMensagensBanco(window.chatState.currentName);
    }

    async function carregarMotoboys() {
        const colaboradores = await API.call('getcolaboradores') || [];
        const motoboys = colaboradores.filter(c => String(c.tipo).toLowerCase().includes('motoboy') || String(c.identificar).toLowerCase().includes('motoboy'));
        const select = document.getElementById('status-motoboy-sel');
        select.innerHTML = '<option value="">Selecione o Motoboy...</option>' + 
            motoboys.map(m => `<option value="${m.username}">${m.username}</option>`).join('');
    }

    function renderizar(configs) {
        const isOnline = (u) => localStorage.getItem('bot_status') === 'true' && String(u.status) === 'true';
        const renderItem = (u) => {
            const sel = window.chatState.currentName === u.username;
            return `<button onclick="selecionarChat('${u.username}', '${u.imagem}', ${isOnline(u)})" class="list-group-item list-group-item-action border-0 ${sel ? 'bg-danger text-white' : ''}">
                <div class="d-flex align-items-center px-2">
                    <div class="position-relative">
                        <img src="${u.imagem}" class="rounded-circle border me-3" width="38" height="38">
                        <span class="status-dot ${isOnline(u) ? 'bg-success' : 'bg-secondary'}"></span>
                    </div>
                    <span class="fw-bold small">${u.username}</span>
                </div>
            </button>`;
        };
        document.getElementById('lista-atendentes-chat').innerHTML = configs.filter(c => c.tipo !== 'grupo').map(renderItem).join('');
        document.getElementById('lista-grupos-chat').innerHTML = configs.filter(c => c.tipo === 'grupo').map(renderItem).join('');
    }

    async function selecionarChat(nome, imagem, online) {
        window.chatState.currentName = nome;
        document.getElementById('chat-header-name').innerText = nome;
        document.getElementById('chat-header-avatar').innerHTML = `<img src="${imagem}" class="rounded-circle border" width="40" height="40">`;
        await carregarMensagensBanco(nome);
    }

    async function carregarMensagensBanco(nome) {
        const todasMsgs = await API.call('getmensagens_chat') || [];
        const filtradas = todasMsgs.filter(m => String(m.jid_numero).includes(nome));
        const container = document.getElementById('chat-messages-container');
        
        let html = '';
        let ultimaData = '';

        filtradas.forEach(m => {
            // Lógica de divisor de data
            const dataMsg = m.data || new Date().toLocaleDateString('pt-BR');
            if (dataMsg !== ultimaData) {
                html += `<div class="chat-date-separator">${dataMsg}</div>`;
                ultimaData = dataMsg;
            }

            const isPedido = String(m.finalizado) === 'true';
            const status = m.status_emoji || '⏳';
            const motoboy = m.motoboy || 'Aguardando confirmação do Motoboy!';
            const isConcluido = status.includes('✅');

            html += `
            <div class="msg-wrapper ${isPedido ? 'msg-mine' : ''} mb-2">
                <div class="msg-bubble ${isPedido && !isConcluido ? 'msg-clickable' : ''}" 
                     ${isPedido && !isConcluido ? `onclick="abrirModalStatus('${m.id}', '${status}', '${m.motoboy}')"` : ''}>
                    <div class="text-dark" style="white-space: pre-wrap; font-size: 0.85rem;">${m.texto.replace(/\*(.*?)\*/g, '<b>$1</b>')}</div>
                    <div class="text-end text-muted mt-1" style="font-size: 0.6rem;">${m.hora}</div>
                </div>
                ${isPedido ? `
                <div class="status-emoji-footer" 
                     ${!isConcluido ? `onclick="abrirModalStatus('${m.id}', '${status}', '${m.motoboy}')"` : ''} 
                     title="Motoboy: ${motoboy}">
                    ${status}
                </div>` : ''}
            </div>`;
        });
        
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }

    function enviarMensagemManual() {
        const input = document.getElementById('msg-input');
        const texto = input.value.trim();
        if(!texto || !window.chatState.currentName) return;

        if (texto.toUpperCase().includes('COLETA:') && texto.toUpperCase().includes('ENTREGA:')) {
            prepararPedido(texto);
            input.value = '';
            return;
        } 

        API.call('addmensagens_chat', { 
            id: Date.now().toString(), 
            jid_numero: window.chatState.currentName, 
            texto: texto, 
            hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            data: new Date().toLocaleDateString('pt-BR'),
            finalizado: "false" 
        }).then(() => {
            input.value = '';
            carregarMensagensBanco(window.chatState.currentName);
        });
    }

    function prepararPedido(texto) {
        const getField = (label) => {
            const regex = new RegExp(`${label}:\\s*(.*)`, 'i');
            const match = texto.match(regex);
            return match ? match[1].trim() : '';
        };
        document.getElementById('p-solicitante').value = getField('SOLICITANTE');
        document.getElementById('p-mercadoria').value = getField('MERCADORIA') || 'Coleta';
        document.getElementById('p-origem').value = getField('COLETA');
        document.getElementById('p-destino').value = getField('ENTREGA');
        document.getElementById('p-horario-manual').value = getField('HORÁRIO PARA PEGAR ENCOMENDA');
        document.getElementById('p-obs').value = getField('OBS');
        
        atualizarMapa();
        document.getElementById('passo-conferencia').style.display = 'block';
        document.getElementById('passo-finalizacao').style.display = 'none';
        new bootstrap.Modal(document.getElementById('modalPedido')).show();
        atualizarTotal();
    }

    async function salvarPedidoAPI() {
        const pedidoId = "RDO-" + Math.floor(1000 + Math.random() * 9000);
        const msgFormatada = `📦 LOGÍSTICA RDO\n\n` +
            `ID: ${pedidoId}\n` +
            `Solicitante: ${document.getElementById('p-solicitante').value}\n` +
            `Mercadoria: ${document.getElementById('p-mercadoria').value}\n` +
            `De: ${document.getElementById('p-origem').value}\n` +
            `HORÁRIO PARA PEGAR ENCOMENDA: ${document.getElementById('p-horario-manual').value}\n` +
            `Para: ${document.getElementById('p-destino').value}\n` +
            `OBS: ${document.getElementById('p-obs').value}\n` +
            `Valor: ${document.getElementById('view-valor-final').innerText.replace('R$ ', '')}`;

        await API.call('addmensagens_chat', {
            id: Date.now().toString(), 
            jid_numero: window.chatState.currentName, 
            texto: msgFormatada, 
            hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            data: new Date().toLocaleDateString('pt-BR'),
            finalizado: "true", 
            pedido_id: pedidoId,
            status_emoji: '⏳',
            motoboy: 'Aguardando confirmação do Motoboy!'
        });
        bootstrap.Modal.getInstance(document.getElementById('modalPedido')).hide();
        await carregarMensagensBanco(window.chatState.currentName);
    }

    function abrirModalStatus(msgId, currentEmoji, currentMotoboy) {
        document.getElementById('status-msg-id').value = msgId;
        document.getElementById('status-emoji-sel').value = currentEmoji.includes('⏳') ? '⏳' : currentEmoji;
        document.getElementById('status-motoboy-sel').value = (currentMotoboy && !currentMotoboy.includes('Aguardando')) ? currentMotoboy : '';
        new bootstrap.Modal(document.getElementById('modalStatusPedido')).show();
    }

    async function salvarStatusMensagem() {
        const id = document.getElementById('status-msg-id').value;
        const emoji = document.getElementById('status-emoji-sel').value;
        const motoboyNome = document.getElementById('status-motoboy-sel').value;

        if(!motoboyNome) { alert('Selecione um motoboy!'); return; }

        let motoboyDesc = '';
        if(emoji === '📦') motoboyDesc = `Pedido em rota. Motoboy: ${motoboyNome}`;
        else if(emoji === '⭕') motoboyDesc = `Pedido CANCELADO! Motoboy: ${motoboyNome}`;
        else if(emoji === '✅') motoboyDesc = `Pedido CONCLUÍDO. Motoboy: ${motoboyNome}`;
        else motoboyDesc = `Aguardando confirmação do Motoboy!`;

        await API.call('addmensagens_chat', { 
            id: id, 
            status_emoji: emoji, 
            motoboy: motoboyDesc 
        });

        bootstrap.Modal.getInstance(document.getElementById('modalStatusPedido')).hide();
        await carregarMensagensBanco(window.chatState.currentName);
    }

    // Auxiliares de interface
    function atualizarMapa() {
        const orig = document.getElementById('p-origem').value;
        const dest = document.getElementById('p-destino').value;
        document.getElementById('mapa-iframe').src = `https://maps.google.com/maps?saddr=${encodeURIComponent(orig)}&daddr=${encodeURIComponent(dest)}&output=embed`;
    }
    function proximoPassoPedido() { document.getElementById('passo-conferencia').style.display = 'none'; document.getElementById('passo-finalizacao').style.display = 'block'; }
    function voltarPasso() { document.getElementById('passo-conferencia').style.display = 'block'; document.getElementById('passo-finalizacao').style.display = 'none'; }
    function atualizarTotal() {
        const vKm = parseFloat(document.getElementById('p-tabela-km').value);
        const vZona = parseFloat(document.getElementById('p-zona').value);
        const vPrioridade = parseFloat(document.getElementById('p-prioridade').value);
        const total = (10 * vKm) + vZona + vPrioridade;
        document.getElementById('view-valor-final').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }
    function abrirModalModelo() { new bootstrap.Modal(document.getElementById('modalModelo')).show(); }
    function copiarModelo() {
        navigator.clipboard.writeText(document.getElementById('texto-modelo-copiar').innerText).then(() => {
            alert('Modelo copiado!');
            bootstrap.Modal.getInstance(document.getElementById('modalModelo')).hide();
        });
    }

    carregarDados();
    setInterval(() => { if(window.chatState.currentName) carregarMensagensBanco(window.chatState.currentName); }, 10000);
</script>
