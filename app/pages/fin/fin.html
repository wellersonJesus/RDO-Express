<div class="container-fluid p-0">
    <div class="card border-0 shadow-sm bg-white rounded-4 mb-3">
        <div class="card-body p-3">
            <h5 class="fw-bold mb-3"><i class="bi bi-wallet2 text-danger"></i> Financeiro</h5>
            <ul id="finTabs" class="list-unstyled d-flex gap-2 mb-0">
                <li>
                    <button class="btn-tab-fin active" data-aba="receitas">Receitas</button>
                </li>
                <li>
                    <button class="btn-tab-fin" data-aba="despesas">Despesas</button>
                </li>
                <li>
                    <button class="btn-tab-fin" data-aba="resumo">Resumo</button>
                </li>
            </ul>
        </div>
    </div>

    <div class="card border-0 shadow-sm bg-white rounded-4">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center p-3">
            <div class="d-flex align-items-center gap-3">
                <small class="text-muted text-uppercase fw-bold" id="titulo-aba-fin">Gerenciando: Receitas</small>
                <input type="text" id="filtro-fin" class="form-control form-control-sm w-auto" placeholder="Filtrar...">
                <button class="btn btn-sm border-0 bg-transparent p-0" id="btn-sync-fin" style="width:28px;height:28px;">
                    <i id="sync-icon-fin" class="bi bi-arrow-repeat" style="font-size:1.1rem;"></i>
                </button>
            </div>
            <button class="btn btn-danger btn-sm rounded-pill px-3" id="btn-novo-fin">
                <i class="bi bi-plus-lg"></i> Novo
            </button>
        </div>

        <div class="table-responsive p-3">
            <table class="table table-hover align-middle border-0 mb-0">
                <thead class="text-uppercase" style="font-size:0.65rem;color:#999;">
                    <tr id="fin-thead-row">
                        <th class="ps-3">—</th>
                        <th>—</th>
                        <th>—</th>
                        <th class="text-end pe-3">Ações</th>
                    </tr>
                </thead>
                <tbody id="fin-list"></tbody>
            </table>
        </div>

        <div class="card-footer bg-white border-0 d-flex justify-content-end pe-4 pb-3">
            <div class="btn-group shadow-sm">
                <button class="btn btn-light" id="btn-pag-prev-fin"><i class="bi bi-chevron-left"></i></button>
                <button class="btn btn-light" id="info-paginacao-fin" disabled style="min-width:100px;">Pág 1</button>
                <button class="btn btn-light" id="btn-pag-next-fin"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<div id="fin-modal-container"></div>
