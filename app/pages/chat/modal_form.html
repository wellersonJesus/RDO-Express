<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md"> <!-- modal-md para ser mais compacto -->
        <div class="modal-content border-0 shadow rounded-4 bg-white">
            
            <!-- Cabeçalho Minimalista -->
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <div class="w-100">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <h5 class="modal-title fw-bold m-0"><span class="text-danger">RDO</span> Express</h5>
                        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
                    </div>
                    <!-- Nome do cliente do chat aqui -->
                    <div id="subtitulo-cliente-form" class="text-danger small fw-bold mb-1"></div>
                    <div class="text-muted small">
                        Solicitante: <span id="form-nome-solicitante" class="fw-semibold text-dark"></span>
                    </div>
                </div>
            </div>
            
            <div class="modal-body p-4 pt-3">
                <form id="form-checkout" class="needs-validation" novalidate>
                    <!-- Linha 1: Dados básicos -->
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label x-small text-muted mb-0">Contato</label>
                            <input type="tel" id="p-contato" class="form-control form-control-sm rounded-3" placeholder="(00) 90000-0000" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label x-small text-muted mb-0">Horário</label>
                            <input type="text" id="p-horario" class="form-control form-control-sm rounded-3" placeholder="Ex: 15:45 ou À combinar">
                        </div>
                    </div>

                    <!-- Linha 2: Métricas -->
                    <div class="row g-2 mt-1">
                        <div class="col-4">
                            <label class="form-label x-small text-muted mb-0">KM</label>
                            <input type="number" id="p-distancia" class="form-control form-control-sm rounded-3" oninput="window.calcularTudo()" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label x-small text-muted mb-0">Tempo</label>
                            <input type="text" id="p-tempo" class="form-control form-control-sm rounded-3" placeholder="30 min" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label x-small text-muted mb-0">Mercadoria</label>
                            <select id="p-mercadoria" class="form-select form-select-sm rounded-3">
                                <option value="Sacola">Sacola</option>
                                <option value="Coleta">Coleta</option>
                                <option value="Bolsa">Bolsa</option>
                            </select>
                        </div>
                    </div>

                    <!-- Linha 3: Financeiro Compacto -->
                    <div class="row g-2 mt-1">
                        <div class="col-6">
                            <label class="form-label x-small text-muted mb-0">Prioridade</label>
                            <select id="p-prioridade" class="form-select form-select-sm rounded-3" onchange="window.calcularTudo()">
                                <option value="0">Normal</option>
                                <option value="5">Agendado (+R$5)</option>
                                <option value="8">Urgente (+R$8)</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label x-small text-muted mb-0">Retorno</label>
                            <select id="p-retorno" class="form-select form-select-sm rounded-3" onchange="window.calcularTudo()">
                                <option value="0">Não</option>
                                <option value="0.6">Sim (+60%)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Itinerário -->
                    <div class="mt-2">
                        <label class="form-label x-small text-muted mb-0">Itinerário (Rotas)</label>
                        <textarea id="p-rotas" class="form-control form-control-sm rounded-3" rows="3" placeholder="1. De: X Para: Y..." required></textarea>
                    </div>

                    <div class="mt-2">
                        <label class="form-label x-small text-muted mb-0">Observação</label>
                        <input type="text" id="p-obs" class="form-control form-control-sm rounded-3" placeholder="Algum detalhe extra?">
                    </div>
                </form>

                <!-- Valor Final -->
                <div class="mt-3 p-2 bg-light rounded-3 text-center border">
                    <small class="text-muted d-block">Valor Total</small>
                    <div class="fs-4 fw-bold text-danger" id="view-valor-final">R$ 0,00</div>
                </div>

                <!-- Ações -->
                <div class="d-flex gap-2 mt-3">
                    <button type="button" class="btn btn-outline-secondary btn-sm flex-fill rounded-3" onclick="window.voltarParaMapa()">Voltar</button>
                    <button type="button" id="btn-finalizar" class="btn btn-danger btn-sm flex-fill rounded-3 fw-bold" onclick="window.salvarPedidoAPI()">EMITIR PEDIDO</button>
                </div>
            </div>
        </div>
    </div>
</div>
