<div class="container-fluid p-0">
    <div class="col-12 mb-3">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-4 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-check2-square"></i>
                    <div>
                        <h5 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> 
                            <span style="color: #000000;">Express - Bot</span>
                        </h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Atendimento Profissional</small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" id="btn-status-bot" class="btn btn-outline-danger rounded-pill px-4"
                        onclick="window.toggleMaster()">
                        MASTER OFF
                    </button>
                    <button type="button"
                        class="btn btn-danger rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 40px; height: 40px;" onclick="window.abrirModalForm()">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="table-responsive p-3">
                <table class="table table-hover align-middle border-0">
                    <thead class="text-uppercase" style="font-size: 0.7rem; color: #FF0000; letter-spacing: 0.8px;">
                        <tr>
                            <th class="ps-3">Status</th>
                            <th>Avatar</th>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th class="text-end pe-3">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="bot-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
