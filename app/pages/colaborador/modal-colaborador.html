<div class="modal fade" id="modalColaborador" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Colaborador</h5>
                <div id="colaborador-error" class="alert alert-danger d-none p-2 small"></div>

                <div class="row g-2 mb-2">
                    <div class="col-6"><label class="small fw-bold text-muted">Nome</label><input type="text" id="col-username" class="form-control" placeholder="Nome completo"></div>
                    <div class="col-6"><label class="small fw-bold text-muted">CPF/CNPJ</label><input type="text" id="col-cpf_cnpj" class="form-control" placeholder="000.000.000-00"></div>
                </div>

                <div class="mb-3">
                    <label class="small fw-bold text-muted d-block mb-2">Funções</label>
                    <div class="d-flex gap-4">
                        <div class="form-check"><input class="form-check-input col-funcao" type="checkbox" value="Atendente" id="checkAtendente"><label class="form-check-label" for="checkAtendente">Atendente</label></div>
                        <div class="form-check"><input class="form-check-input col-funcao" type="checkbox" value="Motoboy" id="checkMotoboy" onchange="window.toggleComissao()"><label class="form-check-label" for="checkMotoboy">Motoboy</label></div>
                    </div>
                </div>

                <div class="mb-3 d-none" id="div-comissao">
                    <label class="small fw-bold text-muted">Comissão</label>
                    <select id="col-comissao" class="form-select">
                        <option value="">Selecione a %</option>
                        <option value="10%">10%</option><option value="20%">20%</option>
                        <option value="30%">30%</option><option value="50%">50%</option>
                        <option value="80%">80%</option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="small fw-bold text-muted">Placa Moto</label><input type="text" id="col-moto_placa" class="form-control" placeholder="ABC-1234"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">E-mail</label><input type="email" id="col-email" class="form-control" placeholder="email@exemplo.com"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">Chave PIX</label><input type="text" id="col-chave_pix" class="form-control" placeholder="Chave aqui"></div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="small fw-bold text-muted">Endereço</label><input type="text" id="col-endereco" class="form-control" placeholder="Rua exemplo, 00"></div>
                    <div class="col-6"><label class="small fw-bold text-muted">Bairro</label><input type="text" id="col-bairro" class="form-control" placeholder="Bairro"></div>
                </div>

                <input type="hidden" id="col-status" value="TRUE">
                <input type="hidden" id="col-colaborador">

                <button class="btn btn-danger w-100 fw-bold" id="btn-salvar-colaborador" onclick="window.salvarColaborador()">
                    <span id="txt-salvar">Salvar Colaborador</span>
                    <i id="spinner-salvar" class="bi bi-arrow-repeat d-none spinner-rotate"></i>
                </button>
            </div>
        </div>
    </div>
</div>
