<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | Login</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/pages/login/login.css">
</head>
<body>

    <div class="bg-container">
        <div class="bg-image"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="text-center mb-5">
                <div class="d-inline-block p-3 rounded-circle mb-3" style="background: #fff5f5;">
                    <i class="bi bi-lightning-charge-fill text-danger" style="font-size: 2rem;"></i>
                </div>
                <h2 class="m-0">
                    <span class="text-danger">RDO</span> EXPRESS
                </h2>
            </div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <input
                        type="text"
                        id="user"
                        class="form-control"
                        placeholder="Usuário"
                        required
                        autocomplete="username"
                        autofocus
                    >
                </div>

                <div class="mb-4 pass-container">
                    <input
                        type="password"
                        id="pass"
                        class="form-control"
                        placeholder="Senha"
                        required
                        autocomplete="current-password"
                    >
                    <i
                        id="togglePassIcon"
                        class="bi bi-eye toggle-password-icon"
                        role="button"
                        aria-label="Mostrar/ocultar senha"
                        tabindex="0"
                        style="cursor: pointer;"
                    ></i>
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-danger btn-login w-100">
                    Acessar Painel
                </button>

                <div id="login-msg" class="text-center mt-3 text-danger small fw-bold" role="alert" aria-live="polite"></div>
            </form>

        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>

</body>
</html>
