<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Usuário</h5>
                <div class="row g-2 mb-2">
                    <div class="col-6"><input type="text" id="u-username" class="form-control" placeholder="Nome"></div>
                    <div class="col-6">
                        <select id="u-tipo" class="form-select">
                            <option value="">Selecione o Tipo</option>
                            <option value="Atendente">Atendente</option><option value="Grupo">Grupo</option><option value="Motoboy">Motoboy</option><option value="TI">TI</option><option value="SRE Architect">SRE Architect</option><option value="Logistica">Logistica</option><option value="Financeiro">Financeiro</option><option value="Comercial">Comercial</option>
                        </select>
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6"><input type="text" id="u-imagem" class="form-control" placeholder="URL Imagem"></div>
                    <div class="col-6"><input type="password" id="u-password" class="form-control" placeholder="Senha"></div>
                </div>
                <button class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalUsuario')">Salvar</button>
            </div>
        </div>
    </div>
</div>
