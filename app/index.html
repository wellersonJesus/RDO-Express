<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <div class="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar p-3" id="sidebar">
        <div class="logo-text mb-4 px-2"><span class="text-rdo">RDO</span><span class="text-express">Express</span></div>
        <nav class="nav flex-column">
            <a class="nav-link" href="#" onclick="loadPage('dashboard', 'Dashboard')"><i class="bi bi-house"></i> Home</a>
            <a class="nav-link" href="#" onclick="loadPage('clientes', 'Clientes')"><i class="bi bi-people"></i> Clientes</a>
            <a class="nav-link" href="#" onclick="loadPage('colaboradores', 'Colaboradores')"><i class="bi bi-person-badge"></i> Colaboradores</a>
            <a class="nav-link" href="#" onclick="loadPage('pedidos', 'Pedidos')"><i class="bi bi-box-seam"></i> Pedidos</a>
            <a class="nav-link" href="#" onclick="loadPage('financeiro', 'Financeiro')"><i class="bi bi-wallet2"></i> Financeiro</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <button class="btn d-md-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <h5 id="page-title" class="mb-0">Dashboard</h5>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold small">Wellerson</div>
                    <div class="text-muted" style="font-size: 10px;">Software Architect</div>
                </div>
                <div class="profile-circle" onclick="logout()">
                    <i class="bi bi-person"></i>
                </div>
            </div>
        </header>
        <div class="p-4" id="router-view"></div>
    </main>

    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
