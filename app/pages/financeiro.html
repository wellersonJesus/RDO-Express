<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold text-secondary d-flex align-items-center">
            <i class="bi bi-cash-coin text-danger me-3 fs-3"></i>RDO Financeiro
        </h4>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm px-3 shadow-sm"><i class="bi bi-download me-1"></i> Exportar</button>
            <button class="btn btn-dark btn-sm px-3 shadow-sm"><i class="bi bi-plus-lg me-1"></i> Novo Lançamento</button>
        </div>
    </div>
    <div class="table-responsive px-3">
        <table class="table table-hover align-middle table-sm" style="font-size: 0.8rem;">
            <thead class="table-light">
                <tr>
                    <th class="py-3 text-secondary">Data</th>
                    <th class="py-3 text-secondary">Cliente</th>
                    <th class="py-3 text-secondary">Pagamento</th>
                    <th class="py-3 text-secondary">Entrada</th>
                    <th class="py-3 text-secondary">Saída</th>
                    <th class="py-3 text-secondary">Taxa</th>
                    <th class="py-3 text-secondary">Origem</th>
                    <th class="py-3 text-secondary">Status</th>
                    <th class="text-center py-3 text-secondary">Ações</th>
                </tr>
            </thead>
            <tbody id="financeiro-body">
                <tr>
                    <td colspan="9" class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm text-danger me-2"></div> Otimizando visualização...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white py-3 d-flex justify-content-between align-items-center">
        <div id="pagination-info-fin" class="small text-muted" style="font-size: 0.75rem;"></div>
        <nav>
            <ul class="pagination pagination-sm mb-0" id="pagination-controls-fin"></ul>
        </nav>
    </div>
</div>

<script>
    (function() {
        let financeiroComNomes = [];
        let currentFinPage = 1;
        const finLimit = 20;

        const formatCurrency = (valor) => {
            const n = parseFloat(valor) || 0;
            return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        async function init() {
            try {
                const [resFin, resPed, resCli] = await Promise.all([
                    API.call('getfinanceiro'),
                    API.call('getpedidos'),
                    API.call('getclientes')
                ]);

                if (!resFin || resFin.status === 'error') {
                    document.getElementById('financeiro-body').innerHTML = `<tr><td colspan="9" class="text-center text-danger py-4">Erro ao carregar dados.</td></tr>`;
                    return;
                }

                // Mapa de Pedido para ID de Cliente
                const pedToCli = {};
                if (Array.isArray(resPed)) {
                    resPed.forEach(p => pedToCli[String(p.id).trim()] = String(p.id_cliente).trim());
                }

                // Mapa de ID de Cliente para Primeiro Nome
                const cliToName = {};
                if (Array.isArray(resCli)) {
                    resCli.forEach(c => {
                        const fullUsername = c.username || c.nome || "Usuário";
                        // Pega apenas a primeira parte do nome
                        cliToName[String(c.id).trim()] = fullUsername.trim().split(' ')[0];
                    });
                }

                // Cruzamento de dados
                financeiroComNomes = resFin.map(f => {
                    const idPed = String(f.id_pedido).trim();
                    const idCli = pedToCli[idPed];
                    const primeiroNome = idCli ? (cliToName[idCli] || "N/D") : "Avulso";

                    return {
                        ...f,
                        clienteExibicao: primeiroNome
                    };
                }).reverse();

                renderizarPaginaFin(1);
            } catch (err) {
                console.error("Erro no processamento:", err);
                document.getElementById('financeiro-body').innerHTML = `<tr><td colspan="9" class="text-center text-danger py-4">Erro ao processar nomes.</td></tr>`;
            }
        }

        window.renderizarPaginaFin = function(page) {
            currentFinPage = page;
            const start = (page - 1) * finLimit;
            const end = start + finLimit;
            const paginatedItems = financeiroComNomes.slice(start, end);
            const tbody = document.getElementById('financeiro-body');

            if (paginatedItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">Nenhum registro.</td></tr>`;
                return;
            }

            tbody.innerHTML = paginatedItems.map(f => {
                const statusClass = f.status_pgt?.toLowerCase().includes('pago') 
                    ? 'bg-success-subtle text-success' 
                    : 'bg-warning-subtle text-warning';

                const dataFormatada = f.data_pagamento ? f.data_pagamento.substring(0, 10).split('-').reverse().join('/') : '-';

                return `
                    <tr>
                        <td class="text-nowrap text-secondary">${dataFormatada}</td>
                        <td class="fw-bold text-dark text-uppercase" style="letter-spacing: 0.5px;">${f.clienteExibicao}</td>
                        <td class="text-secondary small">${f.tipo_pgt || '-'}</td>
                        <td class="text-success fw-bold">${formatCurrency(f.valor_entrada)}</td>
                        <td class="text-danger">${formatCurrency(f.valor_saida_colab)}</td>
                        <td class="text-muted small">${formatCurrency(f.taxa_adm)}</td>
                        <td><span class="badge bg-light text-dark border fw-normal">${f.caixa_origem || '-'}</span></td>
                        <td><span class="badge ${statusClass} border-0 px-2">${f.status_pgt || '-'}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-link text-secondary p-1"><i class="bi bi-pencil-square"></i></button>
                            <button class="btn btn-sm btn-link text-secondary p-1"><i class="bi bi-trash3"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');

            renderPaginationControlsFin();
        };

        function renderPaginationControlsFin() {
            const totalPages = Math.ceil(financeiroComNomes.length / finLimit);
            const controls = document.getElementById('pagination-controls-fin');
            let html = '';
            
            html += `<li class="page-item ${currentFinPage === 1 ? 'disabled' : ''}">
                <a class="page-link border-0 text-secondary" href="#" onclick="event.preventDefault(); renderizarPaginaFin(${currentFinPage - 1})">Anterior</a>
            </li>`;
            
            for(let i = 1; i <= totalPages; i++) {
                if(i === 1 || i === totalPages || (i >= currentFinPage - 1 && i <= currentFinPage + 1)) {
                    html += `<li class="page-item ${i === currentFinPage ? 'active' : ''}">
                        <a class="page-link border-0 rounded-circle mx-1 ${i === currentFinPage ? 'bg-secondary text-white' : 'text-secondary'}" href="#" onclick="event.preventDefault(); renderizarPaginaFin(${i})">${i}</a>
                    </li>`;
                }
            }
            
            html += `<li class="page-item ${currentFinPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                <a class="page-link border-0 text-secondary" href="#" onclick="event.preventDefault(); renderizarPaginaFin(${currentFinPage + 1})">Próximo</a>
            </li>`;
            
            controls.innerHTML = html;
            document.getElementById('pagination-info-fin').innerText = `Total: ${financeiroComNomes.length} lançamentos`;
        }

        init();
    })();
</script>
