<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold text-secondary">
            <i class="bi bi-robot text-danger me-2"></i>Gestão do Bot RDO
        </h4>
        <div>
            <button class="btn btn-success btn-sm fw-bold me-2" onclick="ativarMonitoramento()">
                <i class="bi bi-broadcast me-1"></i> ATIVAR BOT
            </button>
            <button class="btn btn-danger btn-sm fw-bold" data-bs-toggle="modal" data-bs-target="#modalNovoGrupo">
                <i class="bi bi-plus-circle me-1"></i> NOVO GRUPO
            </button>
        </div>
    </div>
    
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Tipo</th>
                        <th>Identificador (JID)</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody id="bot-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNovoGrupo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Cadastrar Monitoramento</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">ID do WhatsApp (JID)</label>
                    <input type="text" id="bot-val" class="form-control" placeholder="Ex: 120363...@g.us">
                    <div class="form-text">Use o F12 no WhatsApp Web para capturar o ID da conversa.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Tipo de Alvo</label>
                    <select id="bot-tipo" class="form-select">
                        <option value="grupo">Grupo (@g.us)</option>
                        <option value="atendente">Atendente (@c.us)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                <button type="button" class="btn btn-danger" onclick="salvarBot()">CADASTRAR AGORA</button>
            </div>
        </div>
    </div>
</div>

<script>
    window.ativarMonitoramento = async () => {
        const instance = prompt("Digite o nome da instância na Evolution (Ex: rdo_bot):", "rdo_bot");
        if(!instance) return;
        
        try {
            const res = await fetch('/api/bot/configurar-webhook', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ instanceName: instance })
            });
            const data = await res.json();
            alert(data.message);
        } catch (e) { alert("Erro ao ativar monitoramento"); }
    };

    window.salvarBot = async () => {
        const valor = document.getElementById('bot-val').value;
        const tipo = document.getElementById('bot-tipo').value;
        if(!valor) return alert("Insira o ID");

        const res = await API.call('addbotconfig', { 
            id: "BOT-" + Date.now(), 
            tipo: tipo, 
            valor: valor 
        });

        if(res.status === 'success') {
            const modal = bootstrap.Modal.getInstance(document.getElementById('modalNovoGrupo'));
            modal.hide();
            carregarBot();
        }
    };

    window.carregarBot = async () => {
        const data = await API.call('getbotconfig');
        const list = document.getElementById('bot-list');
        list.innerHTML = data.map(i => `
            <tr>
                <td><span class="badge bg-info">${i.tipo}</span></td>
                <td class="font-monospace small">${i.valor}</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-danger" onclick="excluirBot('${i.id}')"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('');
    };

    window.excluirBot = async (id) => {
        if(confirm('Remover?')) {
            await API.call('deletebotconfig', { id });
            carregarBot();
        }
    };
    carregarBot();
</script>
