<div class="row g-3">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-clipboard2-check fs-4 text-danger"></i>
                    <div>
                        <h6 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span> - Pedidos
                        </h6>
                        <small class="text-muted" style="font-size: 0.7rem;">Logística e Controle de Entregas</small>
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <div class="dropdown">
                        <button class="btn btn-light btn-sm rounded-pill border-0 px-3" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-filter-left fs-5"></i>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end shadow border-0 p-3" style="width: 250px;">
                            <label class="small fw-bold text-muted mb-2">FILTRAR POR:</label>
                            <select id="tipo-filtro" class="form-select form-select-sm border-0 bg-light mb-2">
                                <option value="todos">Todos os Campos</option>
                                <option value="id">ID Pedido</option>
                                <option value="data">Data</option>
                                <option value="solicitante">Solicitante</option>
                                <option value="motoboy">Motoboy</option>
                                <option value="status">Status</option>
                            </select>
                            <input type="text" id="filtro-pedido" class="form-control form-control-sm border-0 bg-light" placeholder="Digite para buscar..." onkeyup="window.RDO_PEDIDOS.renderizarTabela()">
                        </div>
                    </div>
                    
                    <button class="btn btn-light btn-sm rounded-pill border-0 px-2" onclick="window.RDO_PEDIDOS.carregarPedidos()">
                        <i id="sync-pedidos" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-sm align-middle mb-0" style="font-size: 0.75rem;">
                    <thead class="bg-light">
                        <tr>
                            <th class="border-0 px-3 py-2 fw-bold text-muted text-uppercase">ID Pedido</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Data</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Solicitante</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Motoboy</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Status</th>
                            <th class="border-0 px-3 py-2 text-end fw-bold text-muted text-uppercase">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pedidos-body" class="bg-white text-secondary"></tbody>
                </table>
            </div>
            <div id="loading-pedidos" class="text-center py-4">
                <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalPedidoDetalhes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="fw-bold mb-0 text-dark" id="detalhe-titulo">Gestão de Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pb-4">
                <div class="row g-3">
                    <div class="col-12"><h6 class="text-danger fw-bold small text-uppercase mb-0">Dados do Chat</h6><hr class="my-1 opacity-10"></div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">ID DO PEDIDO</label>
                        <input type="text" id="det-pedido-id" class="form-control form-control-sm border-0 bg-light fw-bold" readonly>
                    </div>
                    <div class="col-md-5">
                        <label class="small text-muted fw-bold">SOLICITANTE</label>
                        <input type="text" id="det-solicitante" class="form-control form-control-sm border-0 bg-light" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted fw-bold">MOTOBOY</label>
                        <input type="text" id="det-motoboy" class="form-control form-control-sm border-0 bg-white shadow-sm" placeholder="Nome do Motoboy">
                    </div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">STATUS ATUAL</label>
                        <select id="det-status" class="form-select form-select-sm border-0 bg-white shadow-sm">
                            <option value="⏳">⏳ Aguardando Motoboy</option>
                            <option value="📦">📦 Em Rota</option>
                            <option value="✅">✅ Concluído</option>
                            <option value="⭕">⭕ Cancelado</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">MERCADORIA</label>
                        <input type="text" id="det-mercadoria" class="form-control form-control-sm border-0 bg-light" readonly>
                    </div>

                    <div class="col-12 mt-4"><h6 class="text-danger fw-bold small text-uppercase mb-0">Dados Técnicos</h6><hr class="my-1 opacity-10"></div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">KM</label>
                        <input type="text" id="det-km" class="form-control form-control-sm border-0 bg-white shadow-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">TAXA/LOCALIDADE</label>
                        <input type="text" id="det-taxa" class="form-control form-control-sm border-0 bg-white shadow-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">VALOR FINAL</label>
                        <input type="text" id="det-valor" class="form-control form-control-sm border-0 bg-light fw-bold text-success" readonly>
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">PRIORIDADE</label>
                        <select id="det-prioridade" class="form-select form-select-sm border-0 bg-white shadow-sm">
                            <option value="Normal">Normal</option>
                            <option value="Urgente + 7">Urgente + 7</option>
                            <option value="Agendado + 10">Agendado + 10</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="small text-muted fw-bold">OBSERVAÇÕES DE ENTREGA</label>
                        <textarea id="det-obs" class="form-control form-control-sm border-0 bg-white shadow-sm" rows="2"></textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button id="btn-salvar" class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow" onclick="window.RDO_PEDIDOS.salvarSincronizado()">SALVAR ALTERAÇÕES</button>
                    <button class="btn btn-light w-100 rounded-pill fw-bold py-2 border" data-bs-dismiss="modal">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
    .bg-status-pending { background-color: #fef3c7; color: #92400e; }
    .bg-status-route { background-color: #e0f2fe; color: #075985; }
    .bg-status-done { background-color: #dcfce7; color: #166534; }
    .bg-status-cancel { background-color: #fee2e2; color: #991b1b; }
    .btn-action { background: #f8f9fa; border: none; color: #adb5bd; padding: 4px 8px; border-radius: 6px; transition: 0.2s; }
    .btn-action:hover { background: #e9ecef; color: #dc3545; }
    .loading-spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<script>
(() => {
    let dadosChat = [];
    let dadosPedidos = [];
    let bsModal;

    setTimeout(() => {
        const modalEl = document.getElementById('modalPedidoDetalhes');
        if (modalEl) {
            bsModal = new bootstrap.Modal(modalEl);
            carregarPedidos();
        }
    }, 100);

    async function carregarPedidos() {
        document.getElementById('sync-pedidos')?.classList.add('loading-spin');
        try {
            const [resChat, resPedidos] = await Promise.all([
                API.call('getmensagens_chat'),
                API.call('getpedidos')
            ]);
            dadosChat = (resChat || []).filter(m => String(m.finalizado) === "true").reverse();
            dadosPedidos = resPedidos || [];
            renderizarTabela();
        } catch (e) { 
            console.error(e); 
        } finally { 
            document.getElementById('sync-pedidos')?.classList.remove('loading-spin'); 
            const loader = document.getElementById('loading-pedidos');
            if (loader) loader.style.display = 'none'; 
        }
    }

    function extrair(texto, rotulo) {
        if (!texto) return '---';
        const regex = new RegExp(`${rotulo}:\\s*(.*)`, 'i');
        const match = texto.match(regex);
        return match ? match[1].trim() : '---';
    }

    function renderizarTabela() {
        const inputFiltro = document.getElementById('filtro-pedido');
        const query = inputFiltro ? inputFiltro.value.toLowerCase() : '';
        const tipoFiltro = document.getElementById('tipo-filtro').value;
        const statusMap = { "⏳": ["bg-status-pending", "Pendente"], "📦": ["bg-status-route", "Rota"], "✅": ["bg-status-done", "OK"], "⭕": ["bg-status-cancel", "Cancel"] };

        const filtrados = dadosChat.filter(p => {
            if (!query) return true;
            
            const id = extrair(p.texto, 'ID').toLowerCase();
            const solicitante = extrair(p.texto, 'Solicitante').toLowerCase();
            const motoboy = (p.motoboy || '').toLowerCase();
            const data = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '';
            const statusStr = (statusMap[p.status_emoji] ? statusMap[p.status_emoji][1] : '').toLowerCase();

            switch(tipoFiltro) {
                case 'id': return id.includes(query);
                case 'data': return data.includes(query);
                case 'solicitante': return solicitante.includes(query);
                case 'motoboy': return motoboy.includes(query);
                case 'status': return statusStr.includes(query);
                default: return id.includes(query) || solicitante.includes(query) || motoboy.includes(query) || statusStr.includes(query);
            }
        });

        const tbody = document.getElementById('tabela-pedidos-body');
        if (!tbody) return;

        tbody.innerHTML = filtrados.map(p => {
            const idPedido = extrair(p.texto, 'ID');
            const st = statusMap[p.status_emoji] || ["bg-light", "---"];
            
            return `<tr>
                <td class="px-3 fw-bold text-danger">${idPedido}</td>
                <td>${p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '--'}</td>
                <td>${extrair(p.texto, 'Solicitante')}</td>
                <td><span class="me-1">🛵</span>${p.motoboy || '---'}</td>
                <td><span class="status-badge ${st[0]}">${st[1]}</span></td>
                <td class="px-3 text-end">
                    <button class="btn-action me-1" onclick="window.RDO_PEDIDOS.abrirSincronizado('${p.id}', '${idPedido}')" title="Editar">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn-action" onclick="window.RDO_PEDIDOS.abrirSincronizado('${p.id}', '${idPedido}')" title="Visualizar">
                        <i class="bi bi-eye"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    function abrirSincronizado(chatId, pedidoId) {
        const pChat = dadosChat.find(x => x.id == chatId);
        const pTech = dadosPedidos.find(x => String(x.id_pedido) === String(pedidoId) || String(x.id) === String(pedidoId));

        document.getElementById('det-pedido-id').value = pedidoId;
        document.getElementById('det-solicitante').value = extrair(pChat.texto, 'Solicitante');
        document.getElementById('det-mercadoria').value = extrair(pChat.texto, 'Mercadoria');
        document.getElementById('det-motoboy').value = pChat.motoboy || '';
        document.getElementById('det-status').value = pChat.status_emoji || '⏳';
        document.getElementById('det-valor').value = extrair(pChat.texto, 'Valor');

        document.getElementById('det-km').value = pTech ? pTech.km : '0 KM';
        document.getElementById('det-taxa').value = pTech ? pTech.taxa_localidade : 'Centro';
        document.getElementById('det-prioridade').value = pTech ? pTech.prioridade : 'Normal';
        document.getElementById('det-obs').value = pTech ? (pTech.observacao || pTech.obs || '') : extrair(pChat.texto, 'OBS');

        const btnSalvar = document.getElementById('btn-salvar');
        btnSalvar.setAttribute('data-chatid', chatId);
        btnSalvar.setAttribute('data-pedidoid', pedidoId);

        if (bsModal) bsModal.show();
    }

    async function salvarSincronizado() {
        const btn = document.getElementById('btn-salvar');
        const chatId = btn.getAttribute('data-chatid');
        const pedidoId = btn.getAttribute('data-pedidoid');

        btn.disabled = true;
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-arrow-repeat loading-spin"></i> SALVANDO...';

        let limpo = document.getElementById('det-valor').value.replace(/R\$\s?/g, '').replace(/\./g, '').replace(',', '.').trim();
        let valorTotal = parseFloat(limpo) || 0.00;

        const dadosParaChat = {
            id: chatId,
            motoboy: document.getElementById('det-motoboy').value.trim(),
            status_emoji: document.getElementById('det-status').value
        };

        const dadosParaPedidos = {
            id: pedidoId,
            id_pedido: pedidoId,
            id_mensagens_chat: chatId,
            km: document.getElementById('det-km').value.trim() || '0 KM',
            taxa_localidade: document.getElementById('det-taxa').value.trim() || 'Centro',
            prioridade: document.getElementById('det-prioridade').value,
            valor_corrida: valorTotal,
            observacao: document.getElementById('det-obs').value.trim() || '---'
        };

        try {
            await API.call('updatemensagens_chat', dadosParaChat);
            const existe = dadosPedidos.some(x => String(x.id_pedido) === String(pedidoId) || String(x.id) === String(pedidoId));
            
            if (existe) {
                await API.call('updatepedidos', dadosParaPedidos);
            } else {
                await API.call('addpedidos', dadosParaPedidos);
            }
            
            if (bsModal) bsModal.hide();
            await carregarPedidos();
        } catch (e) { 
            console.error("Erro na sincronização:", e);
            alert("Erro ao sincronizar os dados com o servidor."); 
        } finally {
            btn.disabled = false;
            btn.innerHTML = textoOriginal;
        }
    }

    window.RDO_PEDIDOS = {
        carregarPedidos,
        renderizarTabela,
        abrirSincronizado,
        salvarSincronizado
    };
})();
</script>
