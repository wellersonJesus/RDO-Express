<div class="fin-header-bar">
    <div class="fin-header-left">
        <button class="fin-header-hamburger" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i class="bi bi-list"></i>
        </button>
        <div class="fin-header-info">
            <h6 class="fin-header-title">Financeiro</h6>
            <small class="fin-header-desc">Controle de entradas, saídas e fluxo de caixa</small>
        </div>
    </div>
    <div class="fin-header-right">
        <div class="fin-header-user-info">
            <span class="fin-header-user-nome" id="fin-user-nome">Master</span>
            <small class="fin-header-user-cargo" id="fin-user-cargo">SR Arquiteto</small>
        </div>
        <div class="fin-header-avatar-box" onclick="abrirModalLogout()">
            <img src="" alt="Avatar" class="fin-header-avatar-img" id="fin-user-avatar" style="display:none;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="fin-header-avatar-fallback"><i class="bi bi-person-fill"></i></div>
        </div>
    </div>
</div>

<div class="row g-3 fin-body">

    <div class="col-12">
        <div id="global-error-fin" class="alert alert-danger d-none rounded-4 shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="global-error-fin-msg"></span>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-wallet2 fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">
                            <span class="text-danger">RDO</span> Express - Financeiro
                        </h5>
                        <small class="text-muted fin-subtitle">Gestão Financeira e Fluxo de Caixa</small>
                    </div>
                </div>
                <button class="btn-sync-fin" id="btn-refresh-fin" title="Atualizar tudo">
                    <i id="sync-icon-fin" class="bi bi-arrow-repeat"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="row g-2" id="cards-resumo-fin">
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm h-100 card-resumo-fin" style="border-left:3px solid #198754!important;">
                    <div class="card-body p-2 d-flex align-items-center gap-2">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(25,135,84,0.08);flex-shrink:0;">
                            <i class="bi bi-arrow-down-circle" style="color:#198754;font-size:.95rem;"></i>
                        </div>
                        <div>
                            <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Entradas</div>
                            <div id="total-entradas" style="font-size:.82rem;font-weight:400;color:#198754;">****</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm h-100 card-resumo-fin" style="border-left:3px solid #dc3545!important;">
                    <div class="card-body p-2 d-flex align-items-center gap-2">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(220,53,69,0.08);flex-shrink:0;">
                            <i class="bi bi-arrow-up-circle" style="color:#dc3545;font-size:.95rem;"></i>
                        </div>
                        <div>
                            <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Saídas</div>
                            <div id="total-saidas" style="font-size:.82rem;font-weight:400;color:#dc3545;">****</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm h-100 card-resumo-fin" style="border-left:3px solid #0d6efd!important;">
                    <div class="card-body p-2 d-flex align-items-center gap-2">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(13,110,253,0.08);flex-shrink:0;">
                            <i class="bi bi-wallet2" style="color:#0d6efd;font-size:.95rem;"></i>
                        </div>
                        <div>
                            <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Saldo</div>
                            <div id="total-saldo" style="font-size:.82rem;font-weight:400;color:#0d6efd;">****</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm h-100 card-resumo-fin" style="border-left:3px solid #6f42c1!important;">
                    <div class="card-body p-2 d-flex align-items-center gap-2">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(111,66,193,0.08);flex-shrink:0;">
                            <i class="bi bi-receipt" style="color:#6f42c1;font-size:.95rem;"></i>
                        </div>
                        <div>
                            <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Registros</div>
                            <div id="total-registros" style="font-size:.82rem;font-weight:400;color:#6f42c1;">****</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body pb-0">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                    <div class="d-flex gap-2 flex-wrap" id="fin-tabs">
                        <button class="btn-tab-fin active" data-tab="todos">Todos</button>
                        <button class="btn-tab-fin" data-tab="entrada">Receitas</button>
                        <button class="btn-tab-fin" data-tab="saida">Despesas</button>
                        <button class="btn-tab-fin" data-tab="extrato">Extrato</button>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <input type="month" id="filtro-mes-fin" class="form-control form-control-sm rounded-pill input-filtro-fin" title="Filtrar por mês">
                        <button id="btn-novo-fin" class="btn-novo-fin" title="Novo lançamento">
                            <i class="bi bi-plus-lg"></i> Novo
                        </button>
                        <button id="btn-toggle-valores" class="btn-toggle-fin" title="Mostrar/Ocultar valores">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="table-responsive p-3">
                <table class="table table-hover align-middle border-0 mb-0" id="tabela-fin">
                    <thead class="text-uppercase tabela-fin-head">
                        <tr>
                            <th class="ps-3 border-0 fw-normal">Data</th>
                            <th class="border-0 fw-normal">Descrição</th>
                            <th class="border-0 fw-normal text-end">Valor</th>
                            <th class="border-0 fw-normal">Status</th>
                            <th class="text-end pe-3 border-0 fw-normal">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-fin-body">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
                                <div class="mt-2 fin-loading-text-init">Carregando...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center px-3 pb-3">
                <span class="text-muted fin-pag-info" id="fin-pag-info">0 registros</span>
                <div class="d-flex gap-1" id="fin-pag-controls"></div>
            </div>
        </div>
    </div>

</div>

<div class="modal fade" id="modal-fin-view" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow-lg modal-fin-content">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h6 class="fw-bold mb-0" style="font-size:.88rem;">
                    <i class="bi bi-receipt text-danger me-2"></i>Detalhes do Lançamento
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-3 pb-4" id="modal-fin-view-body"></div>
        </div>
    </div>
</div>
