     ═══════════════════════════════════════════════════════════════ -->

<div class="row g-3">

    <!-- ═══ HEADER ═══ -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-file-earmark-bar-graph fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">
                            <span class="text-danger">RDO</span> Express - Relatórios
                        </h5>
                        <small class="text-muted" id="relatorio-subtitle">
                            Análise e exportação de dados operacionais
                        </small>
                    </div>
                </div>
                <button class="btn-sync-fin" id="btn-sync-relatorio"
                    onclick="window.initRelatorios()" title="Atualizar relatórios">
                    <i id="sync-icon-relatorio" class="bi bi-arrow-repeat"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ═══ CONTEÚDO PRINCIPAL ═══ -->
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 bg-white">
            <div class="card-body p-5 text-center">
                <i class="bi bi-tools fs-1 text-secondary opacity-50"></i>
                <h5 class="mt-3 text-secondary">Funcionalidade em desenvolvimento</h5>
                <p class="text-muted small mb-0">
                    Estamos trabalhando para trazer os melhores dados para você.
                </p>
            </div>
        </div>
    </div>

</div>
