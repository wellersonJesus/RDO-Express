<div id="modalRelatorioOverlay"
  style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:16px;">
  <div id="modalRelatorioContainer"
    style="background:#fff;border-radius:16px;width:100%;max-width:880px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.22);">

    <div
      style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;">
      <div class="d-flex align-items-center gap-3">
        <div
          style="width:50px;height:50px;border-radius:12px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;">
          <i id="modal-rel-icon" class="bi bi-file-earmark-bar-graph" style="color:#fff;font-size:1.4rem;"></i>
        </div>
        <div>
          <div id="modal-rel-titulo" style="font-size:.95rem;font-weight:700;color:#fff;letter-spacing:.5px;">RELATÓRIO
          </div>
          <div id="modal-rel-periodo" style="font-size:.68rem;color:rgba(255,255,255,.55);margin-top:2px;">—</div>
        </div>
      </div>
      <button id="modal-rel-fechar" type="button"
        style="background:transparent;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;"
        title="Fechar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div id="modal-rel-body" style="overflow-y:auto;padding:20px;flex:1;background:#f8f9fa;">
      <div class="rel-modal-loading text-center py-5">
        <div class="spinner-border text-danger" role="status"></div>
        <div class="mt-3" style="font-size:.8rem;color:#999;">Gerando relatório<span class="rel-dots"></span></div>
      </div>
    </div>

    <div
      style="padding:14px 20px;background:#fff;border-top:1px solid #e9ecef;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="d-flex gap-2">
        <button id="modal-rel-btn-pdf" type="button" class="btn-modal-rel btn-modal-rel-secondary" title="Imprimir/PDF">
          <i class="bi bi-file-earmark-pdf"></i>
          <span>PDF</span>
        </button>
        <button id="modal-rel-btn-copiar" type="button" class="btn-modal-rel btn-modal-rel-secondary" title="Copiar">
          <i class="bi bi-clipboard"></i>
          <span>Copiar</span>
        </button>
      </div>
      <div class="d-flex gap-2">
        <button id="modal-rel-btn-voltar" type="button" class="btn-modal-rel btn-modal-rel-light" style="display:none;">
          <i class="bi bi-arrow-left"></i>
          <span>Voltar</span>
        </button>
        <button id="modal-rel-btn-cancelar" type="button" class="btn-modal-rel btn-modal-rel-light">
          <i class="bi bi-x-circle"></i>
          <span>Cancelar</span>
        </button>
        <button id="modal-rel-btn-salvar" type="button" class="btn-modal-rel btn-modal-rel-primary">
          <i class="bi bi-save"></i>
          <span>Salvar Relatório</span>
        </button>

    </div>

<div id="modalBuilderOverlay"
  style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:16px;">
  <div id="modalBuilderContainer"
    style="background:#fff;border-radius:16px;width:100%;max-width:900px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.22);">

    <div
      style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:.95rem;font-weight:700;color:#fff;letter-spacing:.5px;">
          <i class="bi bi-sliders me-2"></i>Construtor de Relatório
        </div>
        <div id="rb-header-step" style="font-size:.68rem;color:rgba(255,255,255,.55);margin-top:2px;">
          Etapa 1 de 2 - Selecione os campos
        </div>
      </div>
      <button id="rb-btn-fechar" type="button"
        style="background:transparent;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;"
        title="Fechar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div style="display:flex;justify-content:center;gap:8px;padding:14px 0;background:#f8f9fa;border-bottom:1px solid #eee;">
      <span class="rb-step-dot active" data-step="1" style="width:10px;height:10px;border-radius:50%;background:#dee2e6;"></span>
      <span class="rb-step-dot" data-step="2" style="width:10px;height:10px;border-radius:50%;background:#dee2e6;"></span>
    </div>

    <div id="rb-step-1" class="rb-builder-step active" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
      <div id="rb-banco-tabs" style="display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid #eee;flex-wrap:wrap;"></div>
      <div id="rb-banco-panels" style="padding:20px;flex:1;"></div>
    </div>

    <div id="rb-step-2" class="rb-builder-step" style="flex:1;overflow-y:auto;padding:24px;">
      <label style="font-size:.72rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px;">
        Nome do Relatório
      </label>
      <input type="text" id="rb-nome-relatorio" class="form-control mb-4" placeholder="Ex: Relatório Semanal Motoboys">
      <div style="font-size:.72rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">
        Resumo da Seleção
      </div>
      <div id="rb-step2-resumo" style="background:#f8f9fa;border:1px solid #eee;border-radius:10px;padding:14px 16px;font-size:.78rem;color:#444;"></div>
    </div>

    <div
      style="padding:14px 20px;background:#fff;border-top:1px solid #e9ecef;display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <button id="rb-btn-voltar" type="button" class="btn-modal-rel btn-modal-rel-light" style="display:none;">
        <i class="bi bi-arrow-left"></i>
        <span>Voltar</span>
      </button>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button id="rb-btn-avancar" type="button" class="btn-modal-rel btn-modal-rel-primary">
          <i class="bi bi-arrow-right"></i>
          <span>Avançar</span>
        </button>
        <button id="rb-btn-gerar-final" type="button" class="btn-modal-rel btn-modal-rel-primary" style="display:none;">
          <i class="bi bi-file-earmark-bar-graph"></i>
          <span>Gerar Relatório</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  (function () {
    'use strict';
    function _aguardar() {
      if (typeof window.initRelatorios === 'function') {
        window.initRelatorios();
      } else {
        setTimeout(_aguardar, 100);
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', _aguardar);
    } else {
      _aguardar();
    }
  })();
</script>
