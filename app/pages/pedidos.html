<div class="row g-3">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-clipboard2-check fs-4 text-danger"></i>
                    <div>
                        <h6 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span> - Pedidos
                        </h6>
                        <small class="text-muted" style="font-size: 0.7rem;">Logística e Controle de Entregas</small>
                    </div>
                </div>
                
                <div class="d-flex gap-2 align-items-center">
                    <div class="input-group input-group-sm" style="width: 220px;">
                        <span class="input-group-text border-0 bg-light"><i class="bi bi-search text-muted" style="font-size: 0.7rem;"></i></span>
                        <input type="text" id="filtro-pedido" class="form-control border-0 bg-light small" placeholder="Buscar em Tudo..." onkeyup="paginaAtual=1;renderizarTabela()">
                    </div>

                    <button class="btn btn-light btn-sm rounded-pill border-0 px-2" onclick="carregarPedidos()" title="Atualizar">
                        <i id="sync-pedidos" class="bi bi-arrow-repeat"></i>
                    </button>

                    <div class="dropdown">
                        <button class="btn btn-light btn-sm rounded-pill border-0 px-2" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-list fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2" style="font-size: 0.8rem;">
                            <li><h6 class="dropdown-header fw-bold text-muted" style="font-size: 0.65rem;">FILTRAR POR CAMPO</h6></li>
                            <li><a class="dropdown-item active" href="#" onclick="setFiltro('TUDO', this)">Ver Tudo</a></li>
                            <li><a class="dropdown-item" href="#" onclick="setFiltro('ID', this)">N. Pedido</a></li>
                            <li><a class="dropdown-item" href="#" onclick="setFiltro('DATA', this)">Data</a></li>
                            <li><a class="dropdown-item" href="#" onclick="setFiltro('SOLICITANTE', this)">Solicitante</a></li>
                            <li><a class="dropdown-item" href="#" onclick="setFiltro('MOTOBOY', this)">Motoboy</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-sm align-middle mb-0" style="font-size: 0.75rem;">
                    <thead class="bg-light">
                        <tr>
                            <th class="border-0 px-3 py-2 fw-bold text-muted text-uppercase" style="font-size: 0.65rem;">N. Pedido</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase" style="font-size: 0.65rem;">Data</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase" style="font-size: 0.65rem;">Solicitante</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase" style="font-size: 0.65rem;">Motoboy</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase" style="font-size: 0.65rem;">Status</th>
                            <th class="border-0 px-3 py-2 text-end fw-bold text-muted text-uppercase" style="font-size: 0.65rem;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pedidos-body" class="bg-white text-secondary"></tbody>
                </table>
            </div>
            
            <div class="card-footer bg-white border-0 py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted" id="info-paginacao" style="font-size: 0.7rem;"></small>
                    <nav><ul class="pagination pagination-sm mb-0 gap-1" id="paginador-ul"></ul></nav>
                </div>
            </div>

            <div id="loading-pedidos" class="text-center py-4">
                <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalPedidoDetalhes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="fw-bold mb-0" id="detalhe-titulo">Detalhes do Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-4 pb-4">
                <div class="row g-3">
                    <div class="col-12 mt-4"><h6 class="text-danger fw-bold small text-uppercase mb-0">Informações Gerais</h6><hr class="my-2 opacity-10"></div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">N. PEDIDO</label>
                        <input type="text" id="det-id" class="form-control form-control-sm border-0 bg-light rounded-3" readonly>
                    </div>
                    <div class="col-md-5">
                        <label class="small text-muted fw-bold">SOLICITANTE</label>
                        <input type="text" id="det-solicitante" class="form-control form-control-sm border-0 bg-light rounded-3" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted fw-bold">MERCADORIA</label>
                        <input type="text" id="det-mercadoria" class="form-control form-control-sm border-0 bg-light rounded-3" readonly>
                    </div>

                    <div class="col-12 mt-4"><h6 class="text-danger fw-bold small text-uppercase mb-0">Trajeto e Horários</h6><hr class="my-2 opacity-10"></div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">DE (COLETA)</label>
                        <textarea id="det-coleta" class="form-control form-control-sm border-0 bg-light rounded-3" rows="2" readonly></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">PARA (ENTREGA)</label>
                        <textarea id="det-entrega" class="form-control form-control-sm border-0 bg-light rounded-3" rows="2" readonly></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted fw-bold">HORÁRIO ESTIMADO</label>
                        <input type="text" id="det-horario" class="form-control form-control-sm border-0 bg-light rounded-3" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted fw-bold">TROCA / RETORNO</label>
                        <input type="text" id="det-retorno" class="form-control form-control-sm border-0 bg-light rounded-3" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted fw-bold">VALOR</label>
                        <input type="text" id="det-valor" class="form-control form-control-sm border-0 bg-light rounded-3 fw-bold text-dark" readonly>
                    </div>

                    <div class="col-12 mt-4"><h6 class="text-danger fw-bold small text-uppercase mb-0">Logística e Status</h6><hr class="my-2 opacity-10"></div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">MOTOBOY DESIGNADO</label>
                        <input type="text" id="det-motoboy" class="form-control form-control-sm border-0 bg-light rounded-3" placeholder="Aguardando atribuição...">
                    </div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">STATUS DA ENTREGA</label>
                        <select id="det-status" class="form-select form-select-sm border-0 bg-light rounded-3">
                            <option value="⏳">⏳ Aguardando Motoboy</option>
                            <option value="📦">📦 Pedido em Rota</option>
                            <option value="✅">✅ Pedido Concluído</option>
                            <option value="⭕">⭕ Pedido Cancelado</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="small text-muted fw-bold">OBSERVAÇÕES</label>
                        <textarea id="det-obs" class="form-control form-control-sm border-0 bg-light rounded-3" rows="2" readonly></textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button id="btn-salvar-detalhe" class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow-sm" onclick="salvarAlteracaoDetalhe()">SALVAR ALTERAÇÕES</button>
                    <button class="btn btn-secondary w-100 rounded-pill fw-bold py-2 shadow-sm" data-bs-dismiss="modal">FECHAR</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
    .bg-status-pending { background-color: #fef3c7; color: #92400e; }
    .bg-status-route { background-color: #e0f2fe; color: #075985; }
    .bg-status-done { background-color: #dcfce7; color: #166534; }
    .bg-status-cancel { background-color: #fee2e2; color: #991b1b; }
    .btn-action { background: #f8f9fa; border: none; color: #adb5bd; padding: 4px 8px; border-radius: 6px; transition: 0.2s; }
    .btn-action:hover { background: #e9ecef; color: #dc3545; }
    .page-link { border: none; color: #6c757d; background: #f8f9fa; border-radius: 4px !important; margin: 0 2px; cursor: pointer; }
    .page-item.active .page-link { background: #6c757d; color: white; }
    .loading-spin { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    tr:hover { background-color: #fafafa; }
    .dropdown-item.active { background-color: #dc3545 !important; color: white !important; }
</style>

<script>
    let todosPedidos = [];
    let paginaAtual = 1;
    let filtroAtivo = 'TUDO';
    const itensPorPagina = 20;
    const modalDetalhes = new bootstrap.Modal(document.getElementById('modalPedidoDetalhes'));

    function setFiltro(tipo, element) {
        filtroAtivo = tipo;
        document.querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('filtro-pedido').placeholder = `Buscar por ${element.innerText}...`;
        document.getElementById('filtro-pedido').value = '';
        paginaAtual = 1;
        renderizarTabela();
    }

    async function carregarPedidos() {
        const icon = document.getElementById('sync-pedidos');
        if(icon) icon.classList.add('loading-spin');
        try {
            const res = await API.call('getmensagens_chat') || [];
            todosPedidos = res.filter(m => String(m.finalizado) === "true").reverse();
            document.getElementById('loading-pedidos').style.display = 'none';
            renderizarTabela();
        } catch (e) { console.error(e); }
        finally { if(icon) setTimeout(() => icon.classList.remove('loading-spin'), 600); }
    }

    function extrairInfo(texto, rotulo) {
        const regex = new RegExp(`${rotulo}:\\s*(.*)`, 'i');
        const match = texto.match(regex);
        return match ? match[1].trim() : '---';
    }

    function renderizarTabela() {
        const query = document.getElementById('filtro-pedido').value.toLowerCase();
        const filtered = todosPedidos.filter(p => {
            const id = extrairInfo(p.texto, 'ID').toLowerCase();
            const solicitante = extrairInfo(p.texto, 'Solicitante').toLowerCase();
            const motoboy = (p.motoboy || 'Pendente').toLowerCase();
            const dataStr = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '';
            if (filtroAtivo === 'ID') return id.includes(query);
            if (filtroAtivo === 'DATA') return dataStr.includes(query);
            if (filtroAtivo === 'SOLICITANTE') return solicitante.includes(query);
            if (filtroAtivo === 'MOTOBOY') return motoboy.includes(query);
            return id.includes(query) || solicitante.includes(query) || motoboy.includes(query) || dataStr.includes(query);
        });

        const totalPaginas = Math.ceil(filtered.length / itensPorPagina) || 1;
        const inicio = (paginaAtual - 1) * itensPorPagina;
        const itensExibidos = filtered.slice(inicio, inicio + itensPorPagina);

        const statusMap = { "⏳": ["bg-status-pending", "Pendente"], "📦": ["bg-status-route", "Em Rota"], "✅": ["bg-status-done", "Concluído"], "⭕": ["bg-status-cancel", "Cancelado"] };

        document.getElementById('tabela-pedidos-body').innerHTML = itensExibidos.map(p => {
            const st = statusMap[p.status_emoji] || ["bg-light", "Aguardando"];
            return `<tr>
                <td class="px-3"><span class="text-danger fw-bold">${extrairInfo(p.texto, 'ID')}</span></td>
                <td>${p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '--/--/--'}</td>
                <td>${extrairInfo(p.texto, 'Solicitante')}</td>
                <td><span class="text-muted"><i class="bi bi-bicycle me-1"></i>${p.motoboy || 'Pendente'}</span></td>
                <td><span class="status-badge ${st[0]}">${st[1]}</span></td>
                <td class="px-3 text-end">
                    <button class="btn-action" onclick="abrirModalPedido('${p.id}', 'visualizar')"><i class="bi bi-eye"></i></button>
                    <button class="btn-action" onclick="abrirModalPedido('${p.id}', 'editar')"><i class="bi bi-pencil"></i></button>
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="6" class="text-center py-4">Nenhum pedido encontrado.</td></tr>';

        document.getElementById('info-paginacao').innerText = `Exibindo ${itensExibidos.length} de ${filtered.length}`;
        renderizarPaginador(totalPaginas);
    }

    function renderizarPaginador(total) {
        let html = '';
        for(let i=1; i<=total; i++) {
            if(total > 5 && (i > 3 && i < total)) { if(i===4) html += '<li class="page-item disabled"><span class="page-link">...</span></li>'; continue; }
            html += `<li class="page-item ${i === paginaAtual ? 'active' : ''}"><a class="page-link" href="#" onclick="paginaAtual=${i};renderizarTabela()">${i}</a></li>`;
        }
        document.getElementById('paginador-ul').innerHTML = html;
    }

    function abrirModalPedido(id, modo) {
        const p = todosPedidos.find(x => x.id == id);
        if(!p) return;

        // Título e Botão
        document.getElementById('detalhe-titulo').innerText = modo === 'editar' ? 'Editar Logística' : 'Visualizar Pedido';
        document.getElementById('btn-salvar-detalhe').style.display = modo === 'editar' ? 'block' : 'none';

        // Mapeamento de Campos do Texto
        document.getElementById('det-id').value = extrairInfo(p.texto, 'ID');
        document.getElementById('det-solicitante').value = extrairInfo(p.texto, 'Solicitante');
        document.getElementById('det-mercadoria').value = extrairInfo(p.texto, 'Mercadoria');
        document.getElementById('det-coleta').value = extrairInfo(p.texto, 'De');
        document.getElementById('det-entrega').value = extrairInfo(p.texto, 'Para');
        document.getElementById('det-horario').value = extrairInfo(p.texto, 'HORÁRIO');
        document.getElementById('det-retorno').value = extrairInfo(p.texto, 'Troca/Retorno');
        document.getElementById('det-valor').value = extrairInfo(p.texto, 'Valor');
        document.getElementById('det-obs').value = extrairInfo(p.texto, 'OBS');

        // Campos Editáveis
        document.getElementById('det-motoboy').value = p.motoboy || '';
        document.getElementById('det-status').value = p.status_emoji || '⏳';
        
        // Bloqueia campos se for apenas visualização
        const inputs = ['det-motoboy', 'det-status'];
        inputs.forEach(id => {
            document.getElementById(id).disabled = modo === 'visualizar';
            document.getElementById(id).classList.toggle('bg-white', modo === 'editar');
        });

        // Armazena o ID no botão de salvar
        document.getElementById('btn-salvar-detalhe').setAttribute('data-id', id);

        modalDetalhes.show();
    }

    async function salvarAlteracaoDetalhe() {
        const id = document.getElementById('btn-salvar-detalhe').getAttribute('data-id');
        const motoboy = document.getElementById('det-motoboy').value;
        const status_emoji = document.getElementById('det-status').value;

        try {
            const res = await API.call('updategetmensagens_chat', { id, motoboy, status_emoji });
            if(res.status === 'success') {
                modalDetalhes.hide();
                carregarPedidos();
            } else { alert("Erro ao salvar!"); }
        } catch (e) { console.error(e); }
    }

    carregarPedidos();
    setInterval(carregarPedidos, 60000);
</script>
