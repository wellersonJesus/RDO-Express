<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3"></i>
                    <div>
                        <h5 class="fw-bold mb-0">RDO <span class="fw-light opacity-75">Express</span></h5>
                        <div class="d-flex align-items-center gap-1">
                            <span id="sync-text" class="text-white-50 fst-italic" style="font-size: 0.65rem;">Modo Estático</span>
                            <i id="sync-icon" class="bi bi-arrow-repeat text-white-50" style="cursor:pointer; font-size: 0.7rem;" onclick="carregarDados(true)"></i>
                        </div>
                    </div>
                </div>
                <div class="input-group bg-white rounded-pill p-1 shadow-sm" style="width: 45%;">
                    <input type="text" id="input-colar" class="form-control border-0 bg-transparent px-3" placeholder="Colar conteúdo do pedido aqui..." style="font-size: 0.85rem;">
                    <button class="btn btn-danger rounded-pill px-4 fw-bold" onclick="criarPedido()">GERAR PEDIDO</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="accordion-container shadow-sm rounded-4 overflow-hidden bg-white" style="height: 580px;">
            <div class="dropdown-section border-bottom">
                <div class="section-header p-3 bg-light d-flex align-items-center" style="cursor: pointer;">
                    <i class="bi bi-person-circle text-danger me-2"></i>
                    <span class="fw-bold text-secondary text-uppercase" style="font-size: 0.75rem;">Atendentes</span>
                </div>
                <div class="section-content"><div id="lista-atendentes-chat" class="list-group list-group-flush"></div></div>
            </div>

            <div class="dropdown-section">
                <div class="section-header p-3 bg-light d-flex align-items-center" style="cursor: pointer;">
                    <i class="bi bi-people-fill text-danger me-2"></i>
                    <span class="fw-bold text-secondary text-uppercase" style="font-size: 0.75rem;">Grupos</span>
                </div>
                <div class="section-content"><div id="lista-grupos-chat" class="list-group list-group-flush"></div></div>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 580px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center">
                <div id="chat-header-avatar">
                    <div class="rounded-circle bg-light d-flex align-items-center justify-content-center border" style="width: 40px; height: 40px;">
                        <i class="bi bi-person text-muted"></i>
                    </div>
                </div>
                <div class="ms-3">
                    <h6 id="chat-header-name" class="fw-bold mb-0" style="font-size: 0.9rem;">Selecione uma conversa</h6>
                    <small id="chat-header-status" class="text-muted" style="font-size: 0.7rem;">Offline</small>
                </div>
            </div>

            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto">
                <div class="text-center my-5 text-muted small">Nenhuma mensagem para exibir</div>
            </div>

            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <button class="btn btn-link text-secondary"><i class="bi bi-emoji-smile"></i></button>
                    <input type="text" id="msg-input" class="form-control border-0 bg-transparent px-2" placeholder="Digite uma mensagem..." style="font-size: 0.85rem;">
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemChat()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .dropdown-section .section-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #fff; }
    .dropdown-section:hover .section-content { max-height: 400px; overflow-y: auto; }
    .section-header:hover { background-color: #f1f1f1 !important; }
    .section-header { transition: 0.3s; }
    
    .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 2px; right: 2px; }
    .grayscale { filter: grayscale(1); opacity: 0.4; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .whatsapp-bg { 
        background-color: #e5ddd5; 
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
        background-repeat: repeat;
    }

    .msg-bubble {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 0.85rem;
        box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        margin-bottom: 8px;
        position: relative;
    }
    .msg-received { background: #fff; align-self: flex-start; border-top-left-radius: 0; }
    .msg-sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
</style>

<script>
    let jidSelecionado = null;
    let cacheDados = null;

    async function carregarDados(force = false) {
        if (cacheDados && !force) {
            renderizar(cacheDados.configs, cacheDados.pedidos, localStorage.getItem('bot_status') === 'true');
            return;
        }
        const icon = document.getElementById('sync-icon');
        icon.classList.add('spin');
        try {
            const masterOn = localStorage.getItem('bot_status') === 'true';
            const [configs, pedidos] = await Promise.all([API.call('getbotconfig'), API.call('getchatlive')]);
            cacheDados = { configs, pedidos };
            renderizar(configs || [], pedidos || [], masterOn);
        } finally { icon.classList.remove('spin'); }
    }

    function renderizar(configs, pedidos, masterOn) {
        const listaAtendentes = document.getElementById('lista-atendentes-chat');
        const listaGrupos = document.getElementById('lista-grupos-chat');
        const cargosAtendentes = ['SRE ARCHITECT', 'ATENDENTE', 'ADMINISTRADOR'];

        // Renderizar Atendentes
        listaAtendentes.innerHTML = configs.filter(c => cargosAtendentes.includes(c.tipo?.toUpperCase())).map(u => {
            const isOnline = masterOn && String(u.status).toLowerCase() === 'true';
            return `<button onclick="selecionarJid('${u.jid_numero}', '${u.username}', '${u.imagem}', ${isOnline})" class="list-group-item list-group-item-action p-2 ${jidSelecionado === u.jid_numero ? 'bg-danger text-white' : ''} ${!isOnline ? 'grayscale' : ''}">
                <div class="d-flex align-items-center px-2">
                    <div class="position-relative me-3">
                        <img src="${u.imagem}" class="rounded-circle border" width="35" height="35" style="object-fit:cover">
                        <span class="status-dot ${isOnline ? 'bg-success' : 'bg-secondary'}"></span>
                    </div>
                    <div class="flex-grow-1">
                        <span class="fw-bold d-block mb-0" style="font-size: 0.8rem;">${u.username}</span>
                        <small style="font-size: 0.65rem;">${u.tipo}</small>
                    </div>
                </div></button>`;
        }).join('') || '<div class="p-3 text-center small text-muted">Nenhum atendente</div>';

        // Renderizar Grupos
        listaGrupos.innerHTML = configs.filter(c => c.tipo?.toUpperCase() === 'GRUPO' || c.username?.toUpperCase().includes('RDO')).map(g => {
            const isAtivo = masterOn && String(g.status).toLowerCase() === 'true';
            return `<button onclick="selecionarJid('${g.jid_numero}', '${g.username}', '${g.imagem}', ${isAtivo})" class="list-group-item list-group-item-action p-2 ${jidSelecionado === g.jid_numero ? 'bg-danger text-white' : ''} ${!isAtivo ? 'grayscale' : ''}">
                <div class="d-flex align-items-center px-2">
                    <div class="position-relative me-3">
                        <img src="${g.imagem}" class="rounded-circle border" width="35" height="35" style="object-fit:cover">
                        <span class="status-dot ${isAtivo ? 'bg-success' : 'bg-secondary'}"></span>
                    </div>
                    <div class="flex-grow-1"><span class="fw-bold small d-block mb-0" style="font-size: 0.8rem;">${g.username}</span></div>
                </div></button>`;
        }).join('') || '<div class="p-3 text-center small text-muted">Nenhum grupo</div>';

        // Renderizar Mensagens
        const container = document.getElementById('chat-messages-container');
        const filtrados = jidSelecionado ? pedidos.filter(p => p.cliente === jidSelecionado) : pedidos;
        
        if (filtrados.length > 0) {
            container.innerHTML = `<div class="d-flex flex-column">` + filtrados.slice().reverse().map(p => `
                <div class="msg-bubble ${p.status === 'Concluído' ? 'msg-sent' : 'msg-received'}">
                    ${p.ultima_msg}
                </div>`).join('') + `</div>`;
            container.scrollTop = container.scrollHeight;
        } else {
            container.innerHTML = `<div class="text-center my-5 text-muted small">Nenhuma mensagem nesta conversa</div>`;
        }
    }

    window.selecionarJid = (jid, nome, imagem, online) => {
        jidSelecionado = jid;
        
        // Atualizar cabeçalho do chat
        document.getElementById('chat-header-name').innerText = nome;
        document.getElementById('chat-header-status').innerText = online ? 'Online agora' : 'Offline';
        document.getElementById('chat-header-status').className = online ? 'text-success fw-bold' : 'text-muted';
        document.getElementById('chat-header-avatar').innerHTML = `<img src="${imagem}" class="rounded-circle border" width="40" height="40" style="object-fit:cover">`;

        renderizar(cacheDados.configs, cacheDados.pedidos, localStorage.getItem('bot_status') === 'true');
    };

    window.enviarMensagemChat = async () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !jidSelecionado) return;
        
        // Simulação de envio ou integração com sua API de mensagens
        console.log("Enviando para:", jidSelecionado, "Mensagem:", input.value);
        input.value = '';
    };

    carregarDados();
</script>
