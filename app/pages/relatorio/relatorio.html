<script>
(function() {
    'use strict';
    function _aguardar() {
        if (typeof window.initRelatorios === 'function') {
            window.initRelatorios();
        } else {
            setTimeout(_aguardar, 100);
        }
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', _aguardar);
    } else {
        _aguardar();
    }
})();
</script>
