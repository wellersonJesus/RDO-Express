<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div class="modal fade" id="modalMapa" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="modal-header border-0 pb-0 px-4 pt-4 flex-column align-items-start">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-map-fill text-danger me-2"></i>
                    <span class="text-danger">RDO</span> Express — Rota(s)
                </h5>
                <div class="mt-1 text-muted small">
                    <i class="bi bi-person-fill me-1"></i>
                    Solicitante:
                    <span id="header-nome-solicitante" class="fw-bold text-dark">Carregando...</span>
                </div>
            </div>
            <div class="modal-body p-3">
                <div id="container-mapa-visual" style="height: 350px; width: 100%; border-radius: 10px;" class="border shadow-sm mb-3"></div>
                <div id="lista-rotas-editavel" class="mb-3 p-0 bg-light rounded overflow-hidden" style="max-height: 200px; overflow-y: auto; font-size: 0.88rem;"></div>
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div id="resumo-total" class="text-primary"></div>
                    <button class="btn btn-danger px-4 rounded-3 d-flex align-items-center gap-2" onclick="window.prosseguirParaFormulario()">
                        <i class="bi bi-cart-check-fill"></i>
                        Avançar para Checkout
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
