<div class="row g-3">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-clipboard2-check fs-4 text-danger"></i>
                    <div>
                        <h6 class="fw-bold mb-0">
                            <span class="text-danger">RDO</span> Express - Pedidos
                        </h6>
                        <small class="text-muted fs-7">Logística e Controle de Entregas</small>
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <div class="dropdown">
                        <button class="btn btn-light btn-sm rounded-pill border-0 px-3" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-filter-left fs-5"></i>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end shadow border-0 p-3" style="width: 250px;">
                            <label class="small fw-bold text-muted mb-2">FILTRAR POR:</label>
                            <select id="tipo-filtro" class="form-select form-select-sm border-0 bg-light mb-2">
                                <option value="todos">Todos os Campos</option>
                                <option value="id">Pedido</option>
                                <option value="data">Data</option>
                                <option value="motoboy">Motoboy</option>
                                <option value="status">Status</option>
                            </select>
                            <input type="text" id="filtro-pedido" class="form-control form-control-sm border-0 bg-light" placeholder="Digite para buscar..." onkeyup="window.RDO_PEDIDOS.renderizarTabela()">
                        </div>
                    </div>
                    
                    <button class="btn btn-light btn-sm rounded-pill border-0 px-2" onclick="window.RDO_PEDIDOS.carregarPedidos()">
                        <i id="sync-pedidos" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-sm align-middle mb-0 fs-7">
                    <thead class="bg-light">
                        <tr>
                            <th class="border-0 px-3 py-2 fw-bold text-muted text-uppercase">Pedido</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Data</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Motoboy</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Valor</th>
                            <th class="border-0 py-2 fw-bold text-muted text-uppercase">Status</th>
                            <th class="border-0 px-3 py-2 text-end fw-bold text-muted text-uppercase">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pedidos-body" class="bg-white text-secondary"></tbody>
                </table>
            </div>
            <div id="loading-pedidos" class="text-center py-4">
                <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAtencaoPedido" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-warning display-4 mb-3 d-block"></i>
                <h6 class="fw-bold text-dark mb-2">Pedido Concluído</h6>
                <p class="text-muted small mb-4">Atenção! Este pedido já foi concluído e não pode mais ser editado.</p>
                <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold py-2 small" data-bs-dismiss="modal">ENTENDIDO</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalPedidoDetalhes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="fw-bold mb-0 text-dark" id="detalhe-titulo">Gestão de Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pb-4">
                <div class="row g-3">
                    <div class="col-12"><h6 class="text-danger fw-bold small text-uppercase mb-0">Dados do Chat</h6><hr class="my-1 opacity-10"></div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">PEDIDO</label>
                        <input type="text" id="det-pedido-id" class="form-control form-control-sm border-0 bg-light fw-bold" readonly>
                    </div>
                    <div class="col-md-5">
                        <label class="small text-muted fw-bold">SOLICITANTE</label>
                        <input type="text" id="det-solicitante" class="form-control form-control-sm border-0 bg-light" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted fw-bold">MOTOBOY</label>
                        <input type="text" id="det-motoboy" class="form-control form-control-sm border-0 bg-white shadow-sm" placeholder="Nome do Motoboy">
                    </div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">STATUS ATUAL</label>
                        <select id="det-status" class="form-select form-select-sm border-0 bg-white shadow-sm">
                            <option value="⏳">⏳ Aguardando Motoboy</option>
                            <option value="📦">📦 Em Rota</option>
                            <option value="✅">✅ Concluído</option>
                            <option value="⭕">⭕ Cancelado</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="small text-muted fw-bold">MERCADORIA</label>
                        <input type="text" id="det-mercadoria" class="form-control form-control-sm border-0 bg-light" readonly>
                    </div>
                    
                    <div class="col-12 mt-4"><h6 class="text-danger fw-bold small text-uppercase mb-0">Dados Técnicos</h6><hr class="my-1 opacity-10"></div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">KM</label>
                        <input type="text" id="det-km" class="form-control form-control-sm border-0 bg-white shadow-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">TAXA/LOCALIDADE</label>
                        <input type="text" id="det-taxa" class="form-control form-control-sm border-0 bg-white shadow-sm">
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">VALOR FINAL</label>
                        <input type="text" id="det-valor" class="form-control form-control-sm border-0 bg-light fw-bold text-success" readonly>
                    </div>
                    <div class="col-md-3">
                        <label class="small text-muted fw-bold">PRIORIDADE</label>
                        <select id="det-prioridade" class="form-select form-select-sm border-0 bg-white shadow-sm">
                            <option value="Normal">Normal</option>
                            <option value="Urgente + 7">Urgente + 7</option>
                            <option value="Agendado + 10">Agendado + 10</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="small text-muted fw-bold">OBSERVAÇÕES DE ENTREGA</label>
                        <textarea id="det-obs" class="form-control form-control-sm border-0 bg-white shadow-sm" rows="2"></textarea>
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button id="btn-salvar" class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow" onclick="window.RDO_PEDIDOS.salvarSincronizado()">SALVAR ALTERAÇÕES</button>
                    <button class="btn btn-light w-100 rounded-pill fw-bold py-2 border" data-bs-dismiss="modal">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>
</div>
