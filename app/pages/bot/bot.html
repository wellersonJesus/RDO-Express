<div class="container-fluid p-0">
    <div class="col-12 mb-3">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express</h5>
                <div class="d-flex gap-2 align-items-center">
                    <select id="filtro-tipo" class="form-select form-select-sm" style="width: 150px;" onchange="window.reloadBot()">
                        <option value="TODOS">Toda a lista</option>
                        <option value="Atendente">Atendente</option>
                    </select>
                    <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="window.abrirModalCadastro()"><i class="bi bi-plus-lg"></i> Novo</button>
                    <button id="btn-status-bot" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="window.toggleMaster()">MASTER OFF</button>
                    <button class="btn btn-outline-danger btn-sm rounded-circle" style="width:32px; height:32px;" onclick="window.initBot()"><i id="sync-icon-bot" class="bi bi-arrow-repeat"></i></button>
                </div>
            </div>
        </div>
    </div>
    <div class="table-responsive p-3"><table class="table"><thead><tr><th>Status</th><th>Nome</th><th>Tipo</th><th>Ações</th></tr></thead><tbody id="bot-list"></tbody></table></div>
</div>
