<div class="row g-3">
    <!-- Cabeçalho de Pedidos -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-box-seam fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span> - Gestão de Pedidos</h5>
                        <small class="text-muted">Monitoramento de entregas e logística</small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <div class="input-group input-group-sm" style="width: 250px;">
                        <span class="input-group-text border-0 bg-light"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="filtro-pedido" class="form-control border-0 bg-light" placeholder="Buscar..." onkeyup="renderizarTabela()">
                    </div>
                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 border-0 bg-light" onclick="carregarPedidos()">
                        <i id="sync-pedidos" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabela de Pedidos -->
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead style="background-color: #f8f9fa;">
                        <tr>
                            <th class="border-0 px-4 py-3 small fw-bold text-muted">ID / DATA</th>
                            <th class="border-0 py-3 small fw-bold text-muted">CLIENTE</th>
                            <th class="border-0 py-3 small fw-bold text-muted">DESTINO</th>
                            <th class="border-0 py-3 small fw-bold text-muted">MOTOBOY</th>
                            <th class="border-0 py-3 small fw-bold text-muted">STATUS</th>
                            <th class="border-0 px-4 py-3 text-end small fw-bold text-muted">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pedidos-body" class="bg-white">
                        <!-- Conteúdo dinâmico -->
                    </tbody>
                </table>
            </div>
            <div id="loading-pedidos" class="text-center py-5">
                <div class="spinner-border text-secondary opacity-25" role="status"></div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilos de Status */
    .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .bg-status-pending { background-color: #fef3c7; color: #92400e; }
    .bg-status-route { background-color: #e0f2fe; color: #075985; }
    .bg-status-done { background-color: #dcfce7; color: #166534; }
    .bg-status-cancel { background-color: #fee2e2; color: #991b1b; }

    /* Botões Minimalistas Cinza */
    .btn-minimal { 
        background: #f1f3f5; 
        border: none; 
        color: #6c757d; 
        padding: 5px 10px; 
        border-radius: 8px; 
        transition: all 0.2s;
        font-size: 0.9rem;
    }
    .btn-minimal:hover { background: #e9ecef; color: #343a40; }
    
    .loading-spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    tr:hover { background-color: #fafafa; }
</style>

<script>
    let todosPedidos = [];

    async function carregarPedidos() {
        const icon = document.getElementById('sync-pedidos');
        const loader = document.getElementById('loading-pedidos');
        icon.classList.add('loading-spin');
        
        try {
            const res = await API.call('getmensagens_chat') || [];
            // Filtra apenas mensagens enviadas via Checkout (finalizado: true)
            todosPedidos = res.filter(m => String(m.finalizado) === "true");
            loader.style.display = 'none';
            renderizarTabela();
        } catch (e) {
            console.error("Erro:", e);
        } finally {
            setTimeout(() => icon.classList.remove('loading-spin'), 600);
        }
    }

    function extrairInfo(texto, rotulo) {
        const regex = new RegExp(`${rotulo}:\\s*(.*)`, 'i');
        const match = texto.match(regex);
        return match ? match[1].trim() : '---';
    }

    function renderizarTabela() {
        const filtro = document.getElementById('filtro-pedido').value.toLowerCase();
        const body = document.getElementById('tabela-pedidos-body');
        
        const filtered = todosPedidos.filter(p => {
            const id = extrairInfo(p.texto, 'ID').toLowerCase();
            const cliente = extrairInfo(p.texto, 'Solicitante').toLowerCase();
            const motoboy = (p.motoboy || '').toLowerCase();
            return id.includes(filtro) || cliente.includes(filtro) || motoboy.includes(filtro);
        });

        body.innerHTML = filtered.map(p => {
            const statusMap = {
                "⏳": { class: "bg-status-pending", label: "Pendente" },
                "📦": { class: "bg-status-route", label: "Em Rota" },
                "✅": { class: "bg-status-done", label: "Concluído" },
                "⭕": { class: "bg-status-cancel", label: "Cancelado" }
            };
            const st = statusMap[p.status_emoji] || { class: "bg-light", label: "Aguardando" };
            
            const pedidoId = extrairInfo(p.texto, 'ID');
            const cliente = extrairInfo(p.texto, 'Solicitante');
            const destino = extrairInfo(p.texto, 'Para');
            const dataPed = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '--/--';

            return `
                <tr>
                    <td class="px-4">
                        <span class="fw-bold text-dark d-block">${pedidoId}</span>
                        <small class="text-muted" style="font-size: 0.65rem;">${dataPed} • ${p.hora}</small>
                    </td>
                    <td>
                        <span class="fw-bold small text-dark">${cliente}</span>
                    </td>
                    <td class="small text-muted" style="max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${destino}
                    </td>
                    <td>
                        <span class="badge bg-light text-dark border fw-normal" style="font-size: 0.7rem;">
                            <i class="bi bi-person me-1"></i>${p.motoboy || 'Pendente'}
                        </span>
                    </td>
                    <td>
                        <span class="status-badge ${st.class}">${st.label}</span>
                    </td>
                    <td class="px-4 text-end">
                        <div class="d-flex justify-content-end gap-2">
                            <button class="btn-minimal" onclick="visualizarPedido('${p.id}')" title="Ver Detalhes">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn-minimal" onclick="abrirEdicaoStatus('${p.id}', '${p.status_emoji}', '${p.motoboy}')" title="Alterar Logística">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted small">Nenhum registro encontrado.</td></tr>`;
        }
    }

    function visualizarPedido(id) {
        const p = todosPedidos.find(x => x.id == id);
        if(p) alert(p.texto); 
    }

    carregarPedidos();
    setInterval(carregarPedidos, 20000); // Atualiza a cada 20s
</script>
