<div class="card shadow-sm border-0 bg-white">
    <div class="card-header bg-white py-3 border-0">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold text-dark mb-1 d-flex align-items-center">
                    <i class="bi bi-lightning-charge-fill text-danger me-2"></i> RDO <span class="text-dark ms-1">Bot Express</span>
                </h4>
                <p class="text-muted mb-0" style="font-size: 0.75rem;">Gerenciamento de instâncias e permissões em tempo real.</p>
            </div>
            <div class="d-flex gap-2">
                <button id="btn-bulk-action" class="btn btn-outline-danger btn-sm px-3 rounded-pill d-none" onclick="confirmarMassa()">
                    AÇÃO EM MASSA (<span id="selected-count">0</span>)
                </button>
                <button class="btn btn-dark btn-sm px-3 fw-bold shadow-sm rounded-pill" onclick="abrirModalForm()">
                    <i class="bi bi-plus-lg"></i> NOVO
                </button>
                <button id="btn-status-bot" class="btn btn-sm px-3 fw-bold shadow-sm rounded-pill" onclick="confirmarToggleMaster()"></button>
            </div>
        </div>
    </div>
    
    <div class="table-responsive px-3 pb-3">
        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
            <thead class="table-light">
                <tr class="text-secondary" style="font-size: 0.75rem;">
                    <th class="border-0" width="40"><input class="form-check-input" type="checkbox" id="check-all" onclick="toggleSelectAll(this)"></th>
                    <th class="border-0">STATUS</th>
                    <th class="border-0">AVATAR</th>
                    <th class="border-0">NOME</th>
                    <th class="border-0">CARGO / TIPO</th>
                    <th class="border-0 text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="bot-list"></tbody>
        </table>
    </div>
</div>

<!-- Modal Confirmação (Atenção Premium) -->
<div class="modal fade" id="modalConfirmacao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg text-center p-4" style="border-radius:20px">
            <div class="mb-3"><i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i></div>
            <h5 class="fw-bold" id="confirm-title">Atenção</h5>
            <p class="small text-muted mb-4" id="confirm-text"></p>
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-light w-100 rounded-pill fw-bold" data-bs-dismiss="modal">CANCELAR</button>
                </div>
                <div class="col-6">
                    <button id="btn-confirm-execute" class="btn btn-danger w-100 rounded-pill fw-bold">CONFIRMAR</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Formulário Clean -->
<div class="modal fade" id="modalBotForm" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0"><h5 class="fw-bold px-2 pt-2" id="modalBotTitle">Configurar Registro</h5></div>
            <div class="modal-body p-4">
                <form id="form-bot-config" novalidate>
                    <input type="hidden" id="bot-id">
                    <style>
                        .field-error { border: 1.5px solid #dc3545 !important; background-color: #fff5f5 !important; }
                    </style>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted">Username</label>
                            <input type="text" id="bot-username" class="form-control bg-light border-0 py-2 shadow-none" required>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted">JID / Número</label>
                            <input type="text" id="bot-jid" class="form-control bg-light border-0 py-2 shadow-none" required>
                        </div>
                        <div class="col-12">
                            <label class="small fw-bold text-muted">URL Avatar</label>
                            <input type="url" id="bot-imagem" class="form-control bg-light border-0 py-2 shadow-none" required>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted">Tipo/Cargo</label>
                            <select id="bot-tipo" class="form-select bg-light border-0 py-2 shadow-none" required>
                                <option value="">Selecione...</option>
                                <option value="SRE Architect">SRE Architect</option>
                                <option value="atendente">Atendente</option>
                                <option value="comercial">Comercial</option>
                                <option value="financeiro">Financeiro</option>
                                <option value="grupo">Grupo</option>
                                <option value="rdoMotoboy">rdoMotoboy</option>
                                <option value="ADMINISTRADOR">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted">Status</label>
                            <select id="bot-status-val" class="form-select bg-light border-0 py-2 shadow-none" required>
                                <option value="true">Ativo</option>
                                <option value="false">Inativo</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Sair</button>
                <button id="btn-save-bot" class="btn btn-danger rounded-pill px-4 fw-bold" onclick="validarESalvar()">
                    <span class="btn-text">SALVAR</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    if (!window.botState) { window.botState = { cache: null, modForm: null, modConfirm: null }; }

    async function initBot() {
        window.botState.modForm = new bootstrap.Modal(document.getElementById('modalBotForm'));
        window.botState.modConfirm = new bootstrap.Modal(document.getElementById('modalConfirmacao'));
        renderBotUI(); 
        await reloadBot();
    }

    async function reloadBot() {
        try {
            const data = await API.call('getbotconfig');
            window.botState.cache = Array.isArray(data) ? data : [];
            renderList(window.botState.cache);
        } catch (e) { console.error("Erro ao carregar bots:", e); }
    }

    function renderList(data) {
        document.getElementById('bot-list').innerHTML = data.map(i => `
            <tr>
                <td><input class="form-check-input item-check" type="checkbox" value="${i.id}" onchange="updateBulkUI()"></td>
                <td>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" ${String(i.status) === 'true' ? 'checked' : ''} 
                        onchange="alterarStatusDireto('${i.id}', this.checked)">
                    </div>
                </td>
                <td><img src="${i.imagem}" class="rounded-circle border" width="30" height="30" style="object-fit:cover"></td>
                <td class="fw-bold text-dark">${i.username}</td>
                <td><span class="text-secondary border-bottom border-secondary border-opacity-25" style="font-size: 0.75rem;">${i.tipo}</span></td>
                <td class="text-center">
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-sm btn-link text-secondary p-1" onclick="abrirModalForm('${i.id}')"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-sm btn-link text-secondary p-1" onclick="confirmarRemocao('${i.id}')"><i class="bi bi-trash3"></i></button>
                    </div>
                </td>
            </tr>`).join('');
    }

    window.renderBotUI = () => {
        const btn = document.getElementById('btn-status-bot');
        if (!btn) return;
        const ativo = localStorage.getItem('bot_status') === 'true';
        btn.className = ativo ? "btn btn-danger btn-sm rounded-pill shadow-sm px-3 fw-bold" : "btn btn-outline-secondary btn-sm rounded-pill px-3 fw-bold";
        btn.innerHTML = ativo ? '<i class="bi bi-power me-1"></i> MASTER ON' : '<i class="bi bi-power me-1"></i> MASTER OFF';
    };

    function toggleBtnLoading(btnId, isLoading) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        if (isLoading) {
            btn.disabled = true;
            btn.setAttribute('data-old-text', btn.innerHTML);
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`;
        } else {
            btn.disabled = false;
            if(btn.hasAttribute('data-old-text')) btn.innerHTML = btn.getAttribute('data-old-text');
        }
    }

    // Validação Clean: Apenas borda vermelha, sem ícones
    window.validarESalvar = async () => {
        const form = document.getElementById('form-bot-config');
        const inputs = form.querySelectorAll('input[required], select[required]');
        let isValid = true;

        inputs.forEach(input => {
            if (!input.value.trim() || (input.type === 'url' && !input.checkValidity())) {
                input.classList.add('field-error');
                isValid = false;
            } else {
                input.classList.remove('field-error');
            }
        });

        if (isValid) await salvarBot();
    };

    window.confirmarToggleMaster = () => {
        const ativo = localStorage.getItem('bot_status') === 'true';
        exibirConfirmacao(ativo ? "Desativar Master?" : "Ativar Master?", 
            ativo ? "Isso pausará as automações." : "Isso ativará as automações.", 
            () => toggleMasterFinal(!ativo));
    };

    window.confirmarRemocao = (id) => {
        exibirConfirmacao("Remover Registro?", "Ação irreversível.", async () => {
            toggleBtnLoading('btn-confirm-execute', true);
            await API.call('deletebotconfig', { id });
            await reloadBot();
            toggleBtnLoading('btn-confirm-execute', false);
            window.botState.modConfirm.hide();
        });
    };

    function exibirConfirmacao(titulo, texto, acao) {
        document.getElementById('confirm-title').innerText = titulo;
        document.getElementById('confirm-text').innerText = texto;
        const btn = document.getElementById('btn-confirm-execute');
        const novoBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(novoBtn, btn);
        novoBtn.onclick = acao;
        window.botState.modConfirm.show();
    }

    window.toggleMasterFinal = (status) => {
        localStorage.setItem('bot_status', status);
        window.botState.modConfirm.hide();
        renderBotUI();
        window.dispatchEvent(new Event('storage'));
    };

    window.alterarStatusDireto = async (id, novoStatus) => {
        exibirConfirmacao("Alterar Status?", `Mudar para ${novoStatus ? 'Ativo' : 'Inativo'}?`, async () => {
            toggleBtnLoading('btn-confirm-execute', true);
            await API.call('updatebotconfig', { id, status: String(novoStatus) });
            await reloadBot();
            toggleBtnLoading('btn-confirm-execute', false);
            window.botState.modConfirm.hide();
        });
    };

    window.abrirModalForm = (id = null) => {
        const f = document.getElementById('form-bot-config');
        f.reset();
        f.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
        document.getElementById('bot-id').value = id || '';
        document.getElementById('modalBotTitle').innerText = id ? 'Editar Registro' : 'Novo Registro';
        
        if(id) {
            const item = window.botState.cache.find(x => x.id == id);
            if(item) {
                document.getElementById('bot-username').value = item.username || '';
                document.getElementById('bot-jid').value = item.jid_numero || '';
                document.getElementById('bot-imagem').value = item.imagem || '';
                document.getElementById('bot-tipo').value = item.tipo || '';
                document.getElementById('bot-status-val').value = String(item.status);
            }
        }
        window.botState.modForm.show();
    };

    window.salvarBot = async () => {
        toggleBtnLoading('btn-save-bot', true);
        const id = document.getElementById('bot-id').value;
        const payload = {
            id,
            username: document.getElementById('bot-username').value,
            jid_numero: document.getElementById('bot-jid').value,
            imagem: document.getElementById('bot-imagem').value,
            tipo: document.getElementById('bot-tipo').value,
            status: document.getElementById('bot-status-val').value
        };
        await API.call(id ? 'updatebotconfig' : 'addbotconfig', payload);
        await reloadBot();
        toggleBtnLoading('btn-save-bot', false);
        window.botState.modForm.hide();
    };

    initBot();
</script>
