<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-danger { border-radius: 50px; padding: 12px; font-weight: bold; background: #dc3545; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card login-card p-4 animate-in">
        <div class="text-center mb-4">
            <h3 class="fw-bold"><span class="text-danger">RDO</span> EXPRESS</h3>
            <p class="text-muted small">SRE Management System</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <input type="text" id="user" class="form-control" placeholder="Usuário" required>
            </div>
            <div class="mb-4">
                <input type="password" id="pass" class="form-control" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 shadow">ENTRAR NO SISTEMA</button>
            <div id="login-msg" class="text-center mt-3 text-danger small fw-bold"></div>
        </form>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('login-msg');

            // Valida contra as credenciais do config.js
            if(u === window.MASTER_USER && p === window.MASTER_PASS) {
                localStorage.setItem('rdo_auth', 'true');
                window.location.href = 'index.html';
            } else {
                msg.innerText = "Credenciais inválidas!";
            }
        };
    </script>
</body>
</html>
