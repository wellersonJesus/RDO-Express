<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0 text-dark"><span class="text-danger">RDO</span> Express - Chat</h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Gestão de Pedidos em Tempo Real</small>
                    </div>
                </div>
                <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="window.carregarDados()"
                    title="Atualizar"><i id="sync-icon-header" class="bi bi-arrow-repeat"></i></button>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 bg-white d-flex flex-column" style="height: 600px;">
            <div class="p-3 border-bottom d-flex align-items-center gap-2">
                <div class="input-group bg-light rounded-pill px-2 flex-grow-1">
                    <span class="input-group-text bg-transparent border-0"><i
                            class="bi bi-search text-secondary"></i></span>
                    <input type="text" id="chat-search" class="form-control border-0 bg-transparent shadow-none"
                        placeholder="Pesquisar..." onkeyup="window.filtrarContatos()">
                </div>
                <button id="btn-sync-search" class="btn btn-link text-secondary p-2 border-0"
                    onclick="window.carregarDados()" title="Sincronizar"><i id="sync-icon-search"
                        class="bi bi-arrow-repeat"></i></button>
            </div>
            <div id="lista-contatos-chat" class="list-group list-group-flush overflow-auto flex-grow-1"></div>
        </div>
    </div>

    <div class="col-md-8">
        <div id="dynamic-content-area" class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column"
            style="height: 600px;">
            <div id="step-chat" class="d-flex flex-column h-100">
                <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center">
                    <img id="chat-header-logo" src="" class="rounded-circle d-none"
                        style="width: 40px; height: 40px; object-fit: cover;" alt="Logo">
                    <div class="ms-3">
                        <h6 id="chat-header-name" class="fw-bold mb-0">Selecione um contato</h6>
                    </div>
                </div>
                <div id="chat-messages-container"
                    class="flex-grow-1 p-4 whatsapp-bg overflow-auto d-flex flex-column gap-2"></div>
                <div class="p-3 bg-white border-top">
                    <div class="input-group bg-light rounded-pill p-1">
                        <textarea id="msg-input" class="form-control border-0 bg-transparent px-3 shadow-none" rows="1"
                            placeholder="Digite o pedido..." style="resize: none;"></textarea>
                        <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="window.iniciarFluxoCheckout()"><i
                                class="bi bi-send-fill"></i></button>
                    </div>
                </div>
            </div>
            <div id="step-mapa" class="d-none"></div>
            <div id="step-formulario" class="d-none"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalStatus" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Alterar Status do Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="box-botoes-status">
                    <button class="btn btn-primary w-100 mb-2" onclick="window.selecionarStatus('EM_ROTA')">Em
                        Rota</button>
                    <button class="btn btn-success w-100 mb-2"
                        onclick="window.confirmarStatusFinal('CONCLUIDO')">Concluído</button>
                    <button class="btn btn-danger w-100"
                        onclick="window.confirmarStatusFinal('CANCELADO')">Cancelado</button>
                </div>
                <div id="box-selecao-motoboy" class="d-none">
                    <h6 class="fw-bold mt-3">Selecione o Motoboy:</h6>
                    <select id="select-motoboy" class="form-select mb-3"></select>
                    <button class="btn btn-primary w-100" onclick="window.confirmarStatusComMotoboy()">Confirmar
                        Envio</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalMensagemPadrao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">MODELO MENSAGENS CLIENTES</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="texto-modelo" class="form-control bg-light" rows="12" readonly
                    style="font-size: 0.85rem;">📦 Olá! Para agilizarmos o pedido, por favor preencha os dados abaixo:

SOLICITANTE: 
CONATO: 
HORÁRIO ESTIMADO P/ COLETA:  
MERCADORIA: (Sacola, Coleta, Bolsa, Envelope)
ROTA(s): 
📍1. De: ... | 
        Para: ...
📍2. De: ... | 
     Para: ... 
📍3. De: ... | 
     Para: ... 
RETORNO:  (SIM /NÃO)
PRIORIDADE: (Normal, Agendado, Urgente) 
OBSERVAÇÃO: Descreva a observação aqui se necessario

Assim que enviar esta mensagem preenchida, 
calcularemos á sua taxa! 🏁                    
                    </textarea>
            </div>
            <div class="modal-footer border-0"><button class="btn btn-danger w-100 rounded-pill"
                    onclick="window.copiarModelo()">Copiar Modelo</button></div>
        </div>
    </div>
</div>
