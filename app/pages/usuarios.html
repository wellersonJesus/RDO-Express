<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3"><h5>Gerenciamento de Usuários</h5></div>
    <div class="table-responsive"><table class="table"><tbody id="usuarios-body"><tr><td>Carregando...</td></tr></tbody></table></div>
</div>
<script>
    window.carregarUsuarios = async () => {
        const tbody = document.getElementById('usuarios-body');
        const data = await API.call('getusuarios');
        tbody.innerHTML = data.map(u => `<tr><td>${u.id}</td><td>${u.nome}</td></tr>`).join('');
    };
</script>
