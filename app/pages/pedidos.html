<div class="row g-3">
    <!-- Cabeçalho de Pedidos -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-clipboard2-check fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span> - Pedidos
                        </h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Logística e Controle de Entregas</small>
                    </div>
                </div>
                
                <div class="d-flex gap-2 align-items-center">
                    <!-- 1. Buscar -->
                    <div class="input-group input-group-sm" style="width: 200px;">
                        <span class="input-group-text border-0 bg-light"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="filtro-pedido" class="form-control border-0 bg-light" placeholder="Buscar..." onkeyup="renderizarTabela()">
                    </div>

                    <!-- 2. Atualizar -->
                    <button class="btn btn-light btn-sm rounded-pill border-0 px-3" onclick="carregarPedidos()" title="Atualizar">
                        <i id="sync-pedidos" class="bi bi-arrow-repeat"></i>
                    </button>

                    <!-- 3. Hambúrguer (Dropdown) -->
                    <div class="dropdown">
                        <button class="btn btn-light btn-sm rounded-pill border-0 px-3" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-list fs-5"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2">
                            <li><h6 class="dropdown-header small fw-bold">OPÇÕES DE FILTRO</h6></li>
                            <li><a class="dropdown-item active py-2 small" href="#" onclick="setFiltro('TUDO', this)">Ver Tudo</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item py-2 small" href="#" onclick="setFiltro('DATA', this)">Filtrar por Data</a></li>
                            <li><a class="dropdown-item py-2 small" href="#" onclick="setFiltro('ID', this)">Filtrar por ID</a></li>
                            <li><a class="dropdown-item py-2 small" href="#" onclick="setFiltro('MOTOBOY', this)">Filtrar por Motoboy</a></li>
                            <li><a class="dropdown-item py-2 small" href="#" onclick="setFiltro('CLIENTE', this)">Filtrar por Cliente</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabela de Pedidos -->
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead style="background-color: #f8f9fa;">
                        <tr>
                            <th class="border-0 px-4 py-3 small fw-bold text-muted">ID / DATA</th>
                            <th class="border-0 py-3 small fw-bold text-muted">CLIENTE</th>
                            <th class="border-0 py-3 small fw-bold text-muted">DESTINO</th>
                            <th class="border-0 py-3 small fw-bold text-muted">MOTOBOY</th>
                            <th class="border-0 py-3 small fw-bold text-muted">STATUS</th>
                            <th class="border-0 px-4 py-3 text-end small fw-bold text-muted">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pedidos-body" class="bg-white"></tbody>
                </table>
            </div>
            <div id="loading-pedidos" class="text-center py-5">
                <div class="spinner-border text-secondary opacity-25" role="status"></div>
            </div>
        </div>
    </div>
</div>

<style>
    .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .bg-status-pending { background-color: #fef3c7; color: #92400e; }
    .bg-status-route { background-color: #e0f2fe; color: #075985; }
    .bg-status-done { background-color: #dcfce7; color: #166534; }
    .bg-status-cancel { background-color: #fee2e2; color: #991b1b; }

    .btn-minimal { background: #f8f9fa; border: none; color: #adb5bd; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; }
    .btn-minimal:hover { background: #e9ecef; color: #495057; }
    
    .loading-spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    tr:hover { background-color: #fafafa; cursor: default; }
    .dropdown-item.active { background-color: #dc3545 !important; color: white !important; }
</style>

<script>
    let todosPedidos = [];
    let tipoFiltro = 'TUDO';

    function setFiltro(tipo, element) {
        tipoFiltro = tipo;
        document.querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('filtro-pedido').placeholder = `Buscar ${tipo.toLowerCase()}...`;
        document.getElementById('filtro-pedido').focus();
        renderizarTabela();
    }

    async function carregarPedidos() {
        const icon = document.getElementById('sync-pedidos');
        const loader = document.getElementById('loading-pedidos');
        icon.classList.add('loading-spin');
        try {
            const res = await API.call('getmensagens_chat') || [];
            // Apenas pedidos finalizados
            todosPedidos = res.filter(m => String(m.finalizado) === "true");
            loader.style.display = 'none';
            renderizarTabela();
        } catch (e) {
            console.error("Erro ao carregar:", e);
        } finally {
            setTimeout(() => icon.classList.remove('loading-spin'), 600);
        }
    }

    function extrairInfo(texto, rotulo) {
        const regex = new RegExp(`${rotulo}:\\s*(.*)`, 'i');
        const match = texto.match(regex);
        return match ? match[1].trim() : '---';
    }

    function renderizarTabela() {
        const query = document.getElementById('filtro-pedido').value.toLowerCase();
        const body = document.getElementById('tabela-pedidos-body');
        
        const filtered = todosPedidos.filter(p => {
            const id = extrairInfo(p.texto, 'ID').toLowerCase();
            const cliente = extrairInfo(p.texto, 'Solicitante').toLowerCase();
            const motoboy = (p.motoboy || '').toLowerCase();
            const dataPed = p.data ? new Date(p.data).toLocaleDateString('pt-BR') : '';

            if (tipoFiltro === 'ID') return id.includes(query);
            if (tipoFiltro === 'CLIENTE') return cliente.includes(query);
            if (tipoFiltro === 'MOTOBOY') return motoboy.includes(query);
            if (tipoFiltro === 'DATA') return dataPed.includes(query);
            
            return id.includes(query) || cliente.includes(query) || motoboy.includes(query) || dataPed.includes(query);
        });

        body.innerHTML = filtered.map(p => {
            const statusMap = { 
                "⏳": { c: "bg-status-pending", l: "Pendente" }, 
                "📦": { c: "bg-status-route", l: "Em Rota" }, 
                "✅": { c: "bg-status-done", l: "Concluído" }, 
                "⭕": { c: "bg-status-cancel", l: "Cancelado" } 
            };
            const st = statusMap[p.status_emoji] || { c: "bg-light", l: "Aguardando" };
            
            // Formatação de data 00/00/0000
            const dataSimples = p.data ? new Date(p.data).toLocaleDateString('pt-BR', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            }) : '00/00/0000';

            return `
                <tr>
                    <td class="px-4">
                        <span class="fw-bold text-dark d-block">${extrairInfo(p.texto, 'ID')}</span>
                        <small class="text-muted" style="font-size: 0.65rem;">${dataSimples}</small>
                    </td>
                    <td><span class="fw-bold small text-dark">${extrairInfo(p.texto, 'Solicitante')}</span></td>
                    <td class="small text-muted" style="max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${extrairInfo(p.texto, 'Para')}</td>
                    <td><span class="badge bg-light text-dark border fw-normal" style="font-size: 0.7rem;"><i class="bi bi-person me-1"></i>${p.motoboy || 'Pendente'}</span></td>
                    <td><span class="status-badge ${st.c}">${st.l}</span></td>
                    <td class="px-4 text-end">
                        <div class="d-flex justify-content-end gap-2">
                            <button class="btn-minimal" onclick="visualizarPedido('${p.id}')"><i class="bi bi-eye"></i></button>
                            <button class="btn-minimal" onclick="abrirEdicaoStatus('${p.id}', '${p.status_emoji}', '${p.motoboy}')"><i class="bi bi-pencil-fill" style="font-size: 0.8rem;"></i></button>
                        </div>
                    </td>
                </tr>`;
        }).join('');

        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted small">Nenhum registro encontrado.</td></tr>`;
        }
    }

    function visualizarPedido(id) { const p = todosPedidos.find(x => x.id == id); if(p) alert(p.texto); }

    carregarPedidos();
    setInterval(carregarPedidos, 20000);
</script>
