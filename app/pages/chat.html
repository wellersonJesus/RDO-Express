<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span>
                        </h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Atendimento Profissional</small>
                    </div>
                </div>
                <div class="text-end">
                    <span id="sync-text" class="fw-bold text-dark me-2" style="font-size: 0.75rem;">Serviço Ativo</span>
                    <i id="sync-icon" class="bi bi-arrow-repeat fs-4 text-danger" style="cursor:pointer;" onclick="carregarDados()"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="accordion shadow-sm rounded-4 overflow-hidden bg-white" id="accordionChat" style="height: 600px; overflow-y: auto;">
            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button class="accordion-button no-arrow bg-light fw-bold text-secondary small py-3 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collAtendentes">ATENDENTES</button>
                </h2>
                <div id="collAtendentes" class="accordion-collapse collapse show"><div id="lista-atendentes-chat" class="list-group list-group-flush"></div></div>
            </div>
            <div class="accordion-item border-0 border-top">
                <h2 class="accordion-header">
                    <button class="accordion-button no-arrow bg-light fw-bold text-secondary small py-3 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collGrupos">GRUPOS / OUTROS</button>
                </h2>
                <div id="collGrupos" class="accordion-collapse collapse show"><div id="lista-grupos-chat" class="list-group list-group-flush"></div></div>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 600px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div id="chat-header-avatar"></div>
                    <div class="ms-3">
                        <h6 id="chat-header-name" class="fw-bold mb-0">Selecione um contato</h6>
                        <small id="chat-header-status" class="text-muted" style="font-size: 0.7rem;"></small>
                    </div>
                </div>
            </div>
            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto d-flex flex-column gap-2"></div>
            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <textarea id="msg-input" class="form-control border-0 bg-transparent px-3" rows="1" placeholder="Cole a solicitação aqui..." style="resize: none;"></textarea>
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemManual()"><i class="bi bi-send-fill"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalStatusMensagem" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0"><h6 class="fw-bold mb-0">Atualizar Logística</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body py-3">
                <input type="hidden" id="edit-msg-id">
                <div class="mb-3">
                    <label class="small fw-bold text-muted">STATUS (EMOJI)</label>
                    <select id="edit-msg-emoji" class="form-select border-0 bg-light">
                        <option value="⏳">⏳ Aguardando</option>
                        <option value="🏍️">🏍️ Em Coleta</option>
                        <option value="📦">📦 Em Rota</option>
                        <option value="✅">✅ Entregue</option>
                        <option value="❌">❌ Cancelado</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted">MOTOBOY</label>
                    <select id="edit-msg-motoboy" class="form-select border-0 bg-light">
                        <option value="Aguardando">Aguardando...</option>
                    </select>
                </div>
                <button class="btn btn-danger w-100 rounded-pill fw-bold" onclick="atualizarStatusNoBanco()">SALVAR E LIMPAR BANCO</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalPedido" tabindex="-1" aria-hidden="true" data-bs-backdrop="static"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content border-0 shadow rounded-4"><div class="modal-header border-0 pb-0"><h5 class="fw-bold mb-0">RDO <span class="text-danger">Express</span> - Checkout</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div id="passo-conferencia"><div class="rounded-4 overflow-hidden border mb-3 shadow-sm" style="height: 250px;"><iframe id="mapa-iframe" width="100%" height="100%" frameborder="0"></iframe></div><div class="row g-2 mb-3"><div class="col-md-6"><label class="small fw-bold text-muted">COLETA</label><input type="text" id="p-origem" class="form-control border-0 bg-light shadow-sm"></div><div class="col-md-6"><label class="small fw-bold text-muted">ENTREGA</label><input type="text" id="p-destino" class="form-control border-0 bg-light shadow-sm"></div></div><button class="btn btn-danger w-100 rounded-pill fw-bold" onclick="proximoPassoPedido()">PREENCHER FORMULÁRIO</button></div><div id="passo-finalizacao" style="display:none;"><div class="row g-2"><div class="col-md-6"><label class="small fw-bold text-muted">SOLICITANTE</label><input type="text" id="p-solicitante" class="form-control border-0 bg-light"></div><div class="col-md-6"><label class="small fw-bold text-muted">HORÁRIO COLETA</label><input type="text" id="p-horario-manual" class="form-control border-0 bg-light"></div><div class="col-12 mt-3"><div class="p-3 rounded-4 text-center bg-danger text-white"><h1 class="mb-0 fw-bold" id="view-valor-final">R$ 0,00</h1></div></div></div><div class="d-flex gap-2 mt-4"><button class="btn btn-light w-50 rounded-pill" onclick="voltarPasso()">VOLTAR</button><button class="btn btn-dark w-50 rounded-pill fw-bold" onclick="salvarPedidoAPI()">FINALIZAR</button></div></div></div></div></div></div>

<style>
    .no-arrow::after { display: none !important; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 2px solid white; position: absolute; bottom: 1px; right: 12px; }
    .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .msg-bubble { background: white; padding: 10px 14px; border-radius: 12px; max-width: 85%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
    .msg-mine { align-self: flex-end; background-color: #dcf8c6; border: 1px solid #c7e5b0; }
    .msg-pedido { cursor: pointer; transition: transform 0.2s; }
    .msg-pedido:hover { background-color: #f1f1f1; transform: scale(1.005); }
    .status-footer { font-size: 1.2rem; position: absolute; left: 10px; bottom: 5px; cursor: help; }
    
    /* Película clarinha conforme solicitado */
    .modal-backdrop.show { opacity: 0.15 !important; }
</style>

<script>
    if (!window.chatState) window.chatState = { currentName: null };

    function removerPelicula() {
        document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
        document.body.classList.remove('modal-open');
        document.body.style = '';
    }

    async function carregarDados() {
        const configs = await API.call('getbotconfig');
        const botStatus = localStorage.getItem('bot_status') === 'true';
        const renderItem = (u) => {
            const online = botStatus && (String(u.status) === 'true');
            return `<button onclick="selecionarChat('${u.username}', '${u.imagem}')" class="list-group-item list-group-item-action border-0 ${window.chatState.currentName === u.username ? 'bg-danger text-white' : ''}">
                <div class="d-flex align-items-center px-2"><div class="position-relative"><img src="${u.imagem}" class="rounded-circle border me-3" width="38" height="38"><span class="status-dot ${online ? 'bg-success' : 'bg-secondary'}"></span></div><span class="fw-bold small">${u.username}</span></div></button>`;
        };
        document.getElementById('lista-atendentes-chat').innerHTML = configs.filter(c => c.tipo !== 'grupo').map(renderItem).join('');
        document.getElementById('lista-grupos-chat').innerHTML = configs.filter(c => c.tipo === 'grupo').map(renderItem).join('');
        if(window.chatState.currentName) await carregarMensagensBanco(window.chatState.currentName);
    }

    async function selecionarChat(n, i) { window.chatState.currentName = n; document.getElementById('chat-header-name').innerText = n; document.getElementById('chat-header-avatar').innerHTML = `<img src="${i}" class="rounded-circle border" width="40" height="40">`; await carregarMensagensBanco(n); }

    async function carregarMensagensBanco(nome) {
        const res = await API.call('getmensagens_chat');
        const filtradas = (res || []).filter(m => String(m.jid_numero).includes(nome));
        let html = '';
        filtradas.forEach(m => {
            const isPedido = String(m.finalizado).toUpperCase() === 'TRUE';
            const emoji = m.status_emoji || '⏳';
            const motoboy = m.motoboy || 'Aguardando';
            html += `<div class="msg-bubble ${isPedido ? 'msg-mine msg-pedido' : ''} mb-2" ${isPedido ? `onclick="abrirEdicaoStatus('${m.id}', '${emoji}', '${motoboy}')"` : ''}>
                <div class="text-dark" style="white-space: pre-wrap; font-size: 0.85rem; margin-bottom: 8px;">${m.texto}</div>
                ${isPedido ? `<div class="status-footer" title="${motoboy}">${emoji}</div>` : ''}
                <div class="text-end text-muted" style="font-size: 0.6rem;">${m.hora}</div>
            </div>`;
        });
        document.getElementById('chat-messages-container').innerHTML = html;
        document.getElementById('chat-messages-container').scrollTop = document.getElementById('chat-messages-container').scrollHeight;
    }

    async function abrirEdicaoStatus(id, emoji, motoboy) {
        document.getElementById('edit-msg-id').value = id;
        document.getElementById('edit-msg-emoji').value = emoji;
        const colab = await API.call('getcolaboradores') || [];
        const select = document.getElementById('edit-msg-motoboy');
        select.innerHTML = '<option value="Aguardando">Aguardando...</option>';
        colab.filter(c => c.cargo?.toLowerCase() === 'motoboy').forEach(m => {
            select.innerHTML += `<option value="${m.username}" ${m.username === motoboy ? 'selected' : ''}>${m.username}</option>`;
        });
        new bootstrap.Modal(document.getElementById('modalStatusMensagem')).show();
    }

    async function atualizarStatusNoBanco() {
        const idAntigo = document.getElementById('edit-msg-id').value;
        const msgs = await API.call('getmensagens_chat') || [];
        const msgAntiga = msgs.find(m => String(m.id) === String(idAntigo));
        
        if(msgAntiga) {
            // 1. Prepara a nova mensagem (Copia a antiga e muda os dados)
            const novaMsg = { ...msgAntiga };
            novaMsg.id = Date.now().toString(); // Novo ID para garantir salvamento
            novaMsg.status_emoji = document.getElementById('edit-msg-emoji').value;
            novaMsg.motoboy = document.getElementById('edit-msg-motoboy').value;
            
            // 2. SALVA PRIMEIRO a nova mensagem
            const saveRes = await API.call('addmensagens_chat', novaMsg);
            
            if(saveRes.status === 'success') {
                // 3. SE SALVOU COM SUCESSO, ENTÃO DELETA A ANTIGA
                await API.call('deletemensagens_chat', { id: idAntigo });
                
                // Fecha modal e limpa tudo
                bootstrap.Modal.getInstance(document.getElementById('modalStatusMensagem')).hide();
                setTimeout(() => {
                    removerPelicula();
                    carregarMensagensBanco(window.chatState.currentName);
                }, 300);
            }
        }
    }

    async function salvarPedidoAPI() {
        const pid = "RDO-" + Math.floor(1000 + Math.random() * 9000);
        const corpo = `📦 *LOGÍSTICA RDO*\n\nID: ${pid}\nSolicitante: ${document.getElementById('p-solicitante').value}\nDe: ${document.getElementById('p-origem').value}\nPara: ${document.getElementById('p-destino').value}`;
        await API.call('addmensagens_chat', { id: Date.now().toString(), jid_numero: window.chatState.currentName, texto: corpo, hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), data: new Date().toLocaleDateString('pt-BR'), finalizado: "true", status_emoji: "⏳", motoboy: "Aguardando" });
        bootstrap.Modal.getInstance(document.getElementById('modalPedido')).hide();
        setTimeout(removerPelicula, 300);
        await carregarMensagensBanco(window.chatState.currentName);
    }

    function proximoPassoPedido() { document.getElementById('passo-conferencia').style.display='none'; document.getElementById('passo-finalizacao').style.display='block'; }
    function voltarPasso() { document.getElementById('passo-conferencia').style.display='block'; document.getElementById('passo-finalizacao').style.display='none'; }

    function enviarMensagemManual() {
        const input = document.getElementById('msg-input');
        const t = input.value.trim(); if(!t) return;
        if(t.toUpperCase().includes('SOLICITANTE:')) {
            const getF = (label) => (t.match(new RegExp(`${label}:\\s*(.*)`, 'i')) || [null, ''])[1].trim();
            document.getElementById('p-solicitante').value = getF('SOLICITANTE');
            document.getElementById('p-origem').value = getF('COLETA');
            document.getElementById('p-destino').value = getF('ENTREGA');
            input.value = '';
            new bootstrap.Modal(document.getElementById('modalPedido')).show();
        } else {
            API.call('addmensagens_chat', { id: Date.now().toString(), jid_numero: window.chatState.currentName, texto: t, hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), data: new Date().toLocaleDateString('pt-BR'), finalizado: "false" }).then(() => { input.value = ''; carregarMensagensBanco(window.chatState.currentName); });
        }
    }
    carregarDados();
</script>
