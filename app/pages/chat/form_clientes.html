<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

            <div class="modal-header border-0 pb-0 px-4 pt-4 flex-column align-items-start">
                <h5 class="modal-title fw-bold"><span class="text-danger">RDO</span> Express - Checkout</h5>
                <!-- Mantido como d-none para não exibir nada -->
                <div id="form-error-msg" class="text-danger small mt-2 d-none fw-bold"></div>
                <div class="mt-1 text-muted small">
                    Cliente: <span id="header-nome-cliente" class="fw-bold text-dark">Carregando...</span>
                </div>
            </div>

            <div class="modal-body p-4">
                <form id="form-checkout" novalidate>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="text-muted small">SOLICITANTE*</label>
                            <input type="text" id="p-solicitante" class="form-control form-control-sm border-0 bg-light"
                                readonly required>
                        </div>
                        <div class="col-md-3">
                            <label class="text-muted small">CONTATO</label>
                            <input type="text" id="p-contato" class="form-control form-control-sm border-0 bg-light">
                        </div>
                        <div class="col-md-3">
                            <label class="text-muted small">MERCADORIA*</label>
                            <select id="p-mercadoria" class="form-select form-select-sm border-0 bg-light" required>
                                <option value="">Selecione...</option>
                                <option value="Sacola">Sacola</option>
                                <option value="Coleta">Coleta</option>
                                <option value="Bolsa">Bolsa</option>
                                <option value="Envelope">Envelope</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="text-muted small">HORÁRIO</label>
                            <input type="text" id="p-horario" class="form-control form-control-sm border-0 bg-light">
                        </div>
                        <div class="col-md-4">
                            <label class="text-muted small">DISTÂNCIA (KM)*</label>
                            <input type="number" id="p-distancia" class="form-control form-control-sm border-0 bg-light"
                                oninput="window.calcularTudo()" required>
                        </div>
                        <div class="col-md-4">
                            <label class="text-muted small">TEMPO</label>
                            <input type="text" id="p-tempo" class="form-control form-control-sm border-0 bg-light">
                        </div>
                        <div class="col-12">
                            <label class="text-muted small">ROTA (DE/PARA)*</label>
                            <textarea id="p-rotas" class="form-control form-control-sm border-0 bg-light" rows="2"
                                required></textarea>
                        </div>
                        <div class="col-md-3">
                            <label class="text-muted small">VALOR KM*</label>
                            <select id="p-valor-km" class="form-select form-select-sm border-0 bg-light"
                                onchange="window.calcularTudo()" required>
                                <option value="">Selecione...</option>
                                <option value="2.02">2,02</option>
                                <option value="2.20" selected>2,20</option>
                                <option value="3.00">3,00</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="text-muted small">RETORNO</label>
                            <select id="p-retorno" class="form-select form-select-sm border-0 bg-light"
                                onchange="window.calcularTudo()">
                                <option value="0">Não</option>
                                <option value="0.6">Sim (60%)</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="text-muted small">DINÂMICA</label>
                            <select id="p-dinamica" class="form-select form-select-sm border-0 bg-light"
                                onchange="window.calcularTudo()">
                                <option value="0">R$ 0.00</option>
                                <option value="5">R$ 5.00</option>
                                <option value="7">R$ 7.00</option>
                                <option value="10">R$ 10.00</option>
                                <option value="15">R$ 15.00</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="text-muted small">PRIORIDADE</label>
                            <select id="p-prioridade" class="form-select form-select-sm border-0 bg-light"
                                onchange="window.calcularTudo()">
                                <option value="0">Normal</option>
                                <option value="5">Agendado</option>
                                <option value="7">Urgente</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="text-muted small">OBSERVAÇÃO</label>
                            <input type="text" id="p-obs" class="form-control form-control-sm border-0 bg-light">
                        </div>
                    </div>
                </form>
                <div class="mt-4 d-flex align-items-center justify-content-between p-3 bg-light rounded-3">
                    <span class="text-muted small">TOTAL ESTIMADO</span>
                    <span id="view-valor-final" class="fs-4 fw-bold text-dark">R$ 0,00</span>
                </div>
            </div>

            <div class="modal-footer border-0 px-4 pb-4">
                <button class="btn btn-light" onclick="window.voltarParaMapa()">Voltar</button>
                <button id="btn-emitir-pedido" class="btn btn-danger px-4" onclick="window.salvarPedidoAPI()">EMITIR
                    PEDIDO</button>
            </div>
        </div>
    </div>
</div>
