<div class="animate-in">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="fw-bold m-0 text-dark">Gestão de Coletas</h4>
            <p class="text-muted small m-0">Operações registradas no sistema</p>
        </div>
        <button class="btn btn-danger btn-sm rounded-pill px-3 fw-bold shadow-sm" onclick="novaColeta()">
            <i class="bi bi-plus-lg me-1"></i> NOVO
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" style="font-size: 0.88rem;">
                <thead class="bg-light">
                    <tr id="h-col" class="text-muted small text-uppercase">
                        </tr>
                </thead>
                <tbody id="b-col" class="border-top-0">
                    <tr><td colspan="5" class="text-center p-4">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function renderColetas() {
        const data = await fetchSheetData('coletas');
        const tbody = document.getElementById('b-col');
        const thead = document.getElementById('h-col');
        
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4">Nenhum registro.</td></tr>';
            return;
        }

        const colunasVisiveis = ['data', 'cliente', 'solicitacao', 'tipo_de_servico'];
        
        thead.innerHTML = `
            ${colunasVisiveis.map(c => `<th class="px-3 py-2">${c.replace(/_/g, ' ')}</th>`).join('')}
            <th class="text-end px-3">Ações</th>
        `;

        tbody.innerHTML = data.map(row => {
            let dt = row.data;
            if (dt) {
                const d = new Date(dt);
                dt = !isNaN(d) ? d.toLocaleDateString('pt-BR') : dt;
            }

            return `
            <tr>
                <td class="px-3 text-secondary" style="white-space: nowrap;">${dt}</td>
                <td class="px-3 fw-bold text-dark">${row.cliente || '-'}</td>
                <td class="px-3 text-muted" style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${row.solicitacao || '-'}</td>
                <td class="px-3">
                    <span class="badge rounded-pill bg-light text-dark border fw-normal" style="font-size: 0.75rem;">${row.tipo_de_servico || '-'}</span>
                </td>
                <td class="text-end px-3">
                    <div class="d-flex justify-content-end gap-1">
                        <button class="btn btn-icon" title="Visualizar" onclick="acao('view', ${row.row_index})"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-icon" title="Editar" onclick="acao('edit', ${row.row_index})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-icon" title="Copiar" onclick="acao('copy', ${row.row_index})"><i class="bi bi-copy"></i></button>
                        <button class="btn btn-icon text-danger" title="Excluir" onclick="acao('delete', ${row.row_index})"><i class="bi bi-trash3"></i></button>
                    </div>
                </td>
            </tr>
        `}).join('');
    }

    renderColetas();
</script>

<style>
    .btn-icon {
        padding: 4px 8px;
        border: none;
        background: #f8f9fa;
        border-radius: 6px;
        color: #495057;
        font-size: 1rem;
        transition: 0.2s;
    }
    .btn-icon:hover { background: #e9ecef; color: #000; }
    .table thead th { font-size: 0.7rem; border-bottom: none; }
    .table tbody td { border-bottom: 1px solid #f8f9fa; }
</style>
