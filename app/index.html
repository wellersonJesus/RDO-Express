<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>RDO Express</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"><link rel="stylesheet" href="css/global.css"></head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="logo-box p-3 text-center">
            <span class="logo-full text-danger fw-bold">RDO <span class="text-dark">Express</span></span>
            <span class="logo-icon text-danger fw-bold">RDO</span>
        </div>
        
        <div class="menu-group">
            <div class="menu-title"><i class="bi bi-speedometer2"></i> <span class="menu-text">Painel</span></div>
            <div class="submenu">
                <a class="nav-link" href="#" onclick="loadPage('dashboard', 'Dashboard', 'Visão geral operacional')"><span class="menu-text">Dashboard</span></a>
                <a class="nav-link" href="#" onclick="loadPage('chat', 'Chat', 'Comunicação interna')"><span class="menu-text">Chat</span></a>
            </div>
        </div>
        <div class="menu-group">
            <div class="menu-title"><i class="bi bi-people"></i> <span class="menu-text">Gestão</span></div>
            <div class="submenu">
                <a class="nav-link" href="#" onclick="loadPage('usuarios', 'Usuários', 'Controle de acesso')"><span class="menu-text">Usuários</span></a>
                <a class="nav-link" href="#" onclick="loadPage('clientes', 'Clientes', 'Gerenciamento de base')"><span class="menu-text">Clientes</span></a>
                <a class="nav-link" href="#" onclick="loadPage('coleta', 'Coleta', 'Monitoramento')"><span class="menu-text">Coleta</span></a>
            </div>
        </div>
        <div class="menu-group">
            <div class="menu-title"><i class="bi bi-bank"></i> <span class="menu-text">Administração</span></div>
            <div class="submenu">
                <a class="nav-link" href="#" onclick="loadPage('financeiro', 'Financeiro', 'Controle de fluxo')"><span class="menu-text">Financeiro</span></a>
                <a class="nav-link" href="#" onclick="loadPage('relatorio', 'Relatório', 'Dados operacionais')"><span class="menu-text">Relatório</span></a>
            </div>
        </div>
        <div class="menu-group">
            <div class="menu-title"><i class="bi bi-gear-wide-connected"></i> <span class="menu-text">Automatização</span></div>
            <div class="submenu">
                <a class="nav-link" href="#" onclick="loadPage('seguranca', 'Segurança', 'Definições do sistema')"><span class="menu-text">Segurança</span></a>
                <a class="nav-link" href="#" onclick="loadPage('logs', 'Logs', 'Histórico de eventos')"><span class="menu-text">Logs</span></a>
            </div>
        </div>
        <div class="p-4 mt-auto">
            <button class="btn-circular-hover" onclick="logout()"><i class="bi bi-box-arrow-left"></i> <span class="menu-text">Sair</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-navbar">
            <div class="d-flex align-items-center">
                <button id="toggle-btn" class="btn btn-light me-3"><i class="bi bi-list"></i></button>
                <div><h1 id="page-title" class="h6 mb-0">Dashboard</h1><p id="page-subtitle" class="small text-muted mb-0">Visão geral operacional</p></div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold small">Wellerson</div>
                    <div class="text-muted small">SRE Architect</div>
                </div>
                <button class="profile-btn" onclick="logout()"><i class="bi bi-person-circle"></i></button>
            </div>
        </header>
        <div class="p-4" id="router-view"></div>
    </main>
    <script src="js/ui.js"></script><script src="js/app.js"></script>
</body>
</html>
