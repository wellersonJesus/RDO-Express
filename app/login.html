<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #dc3545; }
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #000; }
        .bg-image { width: 100%; height: 100%; background-image: url('https://img.freepik.com/fotos-gratis/ainda-vida-da-representacao-da-cadeia-de-suprimentos_23-2149827282.jpg?w=740&q=80'); background-size: cover; background-position: center; filter: brightness(0.4); animation: zoomMovement 20s infinite alternate; }
        @keyframes zoomMovement { from { transform: scale(1); } to { transform: scale(1.1); } }
        .login-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .form-control { border-radius: 12px; padding: 14px; border: 1px solid #e0e0e0; transition: all 0.3s; }
        .btn-login { border-radius: 12px; padding: 14px; font-weight: 700; background: var(--primary-color); border: none; color: #fff; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg-image"></div></div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="text-center mb-5">
                <div class="d-inline-block p-3 rounded-circle mb-3" style="background: #fff5f5;">
                    <i class="bi bi-lightning-charge-fill text-danger" style="font-size: 2rem;"></i>
                </div>
                <h2 class="m-0"><span class="text-danger">RDO</span> EXPRESS</h2>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" id="user" class="form-control" placeholder="Usuário" required>
                </div>
                <div class="mb-4">
                    <input type="password" id="pass" class="form-control" placeholder="Senha" required>
                </div>
                <button type="submit" class="btn btn-danger btn-login w-100">Acessar Painel</button>
                <div id="login-msg" class="text-center mt-3 text-danger small fw-bold"></div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('login-msg');
            msg.innerText = "Autenticando...";
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('rdo_auth', 'true');
                    localStorage.setItem('user_name', data.user.name);
                    localStorage.setItem('user_role', data.user.role);
                    localStorage.setItem('user_img', data.user.imagem);
                    window.location.href = '/index.html';
                } else { throw new Error(); }
            } catch(err) {
                msg.innerText = "Acesso negado!";
                const card = document.querySelector('.login-card');
                card.style.animation = 'shake 0.4s';
                setTimeout(() => card.style.animation = '', 400);
            }
        };
    </script>
</body>
</html>
