<div class="animate-in">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-bold m-0 text-dark">Relatório de Entregas</h5>
            <p class="text-muted small m-0" id="rel-count-info">Carregando dados...</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-bold" onclick="exportarRelatorio()">
                <i class="bi bi-download me-1"></i> EXPORTAR
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr class="text-muted small text-uppercase" style="font-size: 0.7rem; letter-spacing: 0.5px;">
                        <th class="px-3 py-2" style="width: 50px;">Qtd</th>
                        <th class="px-3 py-2">Data</th>
                        <th class="px-3 py-2">Cliente</th>
                        <th class="px-3 py-2">Serviço / Endereço</th>
                        <th class="text-end px-3 py-2">Ações</th>
                    </tr>
                </thead>
                <tbody id="b-rel" class="border-top-0" style="font-size: 0.82rem;">
                    </tbody>
            </table>
        </div>
        
        <div class="d-flex justify-content-between align-items-center px-3 py-2 bg-light border-top">
            <div style="font-size: 0.75rem;" class="text-muted" id="rel-page-label">Página 1</div>
            <nav>
                <ul class="pagination pagination-sm mb-0 gap-1" id="rel-pagination">
                    </ul>
            </nav>
        </div>
    </div>
</div>

<script>
    let relData = [];
    let relCurrentPage = 1;
    const relRowsPerPage = 15;

    async function initRelatorio() {
        // Chamada cirúrgica para a aba 'relatorios' conforme sua planilha
        const raw = await fetchSheetData('relatorios');
        if (!raw || raw.length === 0) {
            document.getElementById('b-rel').innerHTML = '<tr><td colspan="5" class="text-center p-4">Nenhum relatório encontrado.</td></tr>';
            return;
        }
        relData = raw;
        renderRelTable();
    }

    function renderRelTable() {
        const tbody = document.getElementById('b-rel');
        const start = (relCurrentPage - 1) * relRowsPerPage;
        const end = start + relRowsPerPage;
        const paginatedItems = relData.slice(start, end);

        document.getElementById('rel-count-info').innerText = `${relData.length} registros no período`;
        document.getElementById('rel-page-label').innerText = `${start + 1}-${Math.min(end, relData.length)} de ${relData.length}`;

        tbody.innerHTML = paginatedItems.map(row => {
            // Mapeamento baseado no seu Apps Script:
            // Quantidade -> quantidade | Datas -> datas | Tipos de serviços -> tipos_de_servicos | Endereços -> enderecos | Cliente -> cliente
            const qtd = row.quantidade || '1';
            const dataRel = row.datas || '-';
            const cliente = row.cliente || '---';
            const servico = row.tipos_de_servicos || '-';
            const endereco = row.enderecos || '-';
            
            return `
            <tr>
                <td class="px-3 py-1 fw-bold text-danger text-center">${qtd}</td>
                <td class="px-3 py-1 text-secondary">${dataRel}</td>
                <td class="px-3 py-1 fw-bold text-dark">${cliente}</td>
                <td class="px-3 py-1 text-muted">
                    <div style="max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        <span class="badge bg-light text-dark border-0 me-1" style="font-size: 0.65rem;">${servico.toUpperCase()}</span>
                        ${endereco}
                    </div>
                </td>
                <td class="text-end px-3 py-1">
                    <div class="d-flex justify-content-end gap-1">
                        <button class="btn btn-link btn-sm text-secondary p-0 mx-1" onclick="acao('edit', ${row.row_index})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-link btn-sm text-danger p-0 mx-1" onclick="acao('delete', ${row.row_index})"><i class="bi bi-trash3"></i></button>
                    </div>
                </td>
            </tr>
            `;
        }).join('');

        renderRelPagination();
    }

    function renderRelPagination() {
        const totalPages = Math.ceil(relData.length / relRowsPerPage);
        const nav = document.getElementById('rel-pagination');
        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<li class="page-item ${i === relCurrentPage ? 'active' : ''}"><a class="page-link border-0 rounded-1 mx-1" href="javascript:void(0)" onclick="changeRelPage(${i})">${i}</a></li>`;
        }
        nav.innerHTML = html;
    }

    function changeRelPage(p) { relCurrentPage = p; renderRelTable(); }
    
    function exportarRelatorio() {
        console.log("Iniciando exportação de CSV...");
        // Lógica de exportação pode ser adicionada aqui
    }

    initRelatorio();
</script>

<style>
    .table > :not(caption) > * > * { 
        padding-top: 0.4rem !important; 
        padding-bottom: 0.4rem !important; 
        border-bottom-color: #f1f5f9; 
    }
    .pagination .page-link { 
        padding: 0.25rem 0.5rem;
        font-size: 0.7rem; 
        color: #64748b; 
    }
    .pagination .active .page-link { 
        background-color: var(--accent-red) !important; 
        color: #fff !important; 
    }
    .bg-light { background-color: #f8f9fa !important; }
</style>
