<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3"><h5>Gerenciamento de Clientes</h5></div>
    <div class="table-responsive"><table class="table"><tbody id="clientes-body"><tr><td>Carregando...</td></tr></tbody></table></div>
</div>
<script>
    window.carregarClientes = async () => {
        const tbody = document.getElementById('clientes-body');
        const data = await API.call('getclientes');
        if (data.status === 'error') return tbody.innerHTML = `<tr><td>Erro: ${data.message}</td></tr>`;
        tbody.innerHTML = data.map(c => `<tr><td>${c.id}</td><td>${c.nome}</td></tr>`).join('');
    };
</script>
