<div class="admin-page-wrapper">

    <div class="admin-content-area">

        <div class="col-12">
            <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
                <div class="card-body p-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-shield-lock fs-3 text-danger"></i>
                        <div>
                            <h5 class="fw-bold mb-0 text-dark">
                                <span class="text-danger">RDO</span> Express - Administração
                            </h5>
                            <small class="text-muted admin-subtitle">Controle administrativo</small>
                        </div>
                    </div>
                    <button id="btn-sync-admin" class="btn-sync-admin" title="Atualizar dados">
                        <i id="sync-icon-admin" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-0">
            <div class="col-12">
                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body pb-0">
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                            <nav class="admin-tabs-nav">
                                <a href="#" class="admin-tab active" data-origem="clientes">Clientes</a>
                                <a href="#" class="admin-tab" data-origem="colaboradores">Colaboradores</a>
                            </nav>
                            <div class="d-flex align-items-center gap-2">
                                <div class="dropdown-filtro-wrapper">
                                    <button class="btn-filtro-inteligente" id="btn-filtro-admin" onclick="window.toggleDropdownFiltroAdmin()">
                                        <i class="bi bi-funnel-fill"></i>
                                        <span id="label-filtro-admin">Todos</span>
                                        <i class="bi bi-chevron-down chevron-filtro"></i>
                                    </button>
                                    <div class="dropdown-filtro-menu" id="dropdown-filtro-menu-admin">
                                        <div class="dropdown-filtro-item active" data-filtro="todos" onclick="window.selecionarFiltroAdmin('todos', 'Todos', this)">
                                            <i class="bi bi-grid-3x3-gap"></i> Todos
                                        </div>
                                        <div class="dropdown-filtro-item" data-filtro="nome" onclick="window.selecionarFiltroAdmin('nome', 'Nome', this)">
                                            <i class="bi bi-person"></i> Nome
                                        </div>
                                        <div class="dropdown-filtro-item dropdown-filtro-item-has-sub" data-filtro="status">
                                            <div class="dropdown-filtro-item-label" onclick="window.toggleSubMenuStatusAdmin(event)">
                                                <i class="bi bi-flag"></i> Status
                                                <i class="bi bi-chevron-right chevron-sub"></i>
                                            </div>
                                            <div class="dropdown-filtro-submenu" id="submenu-status-admin">
                                                <div class="dropdown-filtro-subitem" data-status="todos" onclick="window.selecionarFiltroStatusAdmin('todos', 'Status', this)">
                                                    <i class="bi bi-grid-3x3-gap"></i> Todos
                                                </div>
                                                <div class="dropdown-filtro-subitem" data-status="ativo" onclick="window.selecionarFiltroStatusAdmin('ativo', 'Ativo', this)">
                                                    <i class="bi bi-check-circle"></i> Ativo
                                                </div>
                                                <div class="dropdown-filtro-subitem" data-status="inativo" onclick="window.selecionarFiltroStatusAdmin('inativo', 'Inativo', this)">
                                                    <i class="bi bi-x-circle"></i> Inativo
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <input type="text" id="filtro-admin" class="form-control form-control-sm rounded-pill input-filtro-admin" placeholder="Buscar..." autocomplete="off">
                                <button class="btn btn-danger btn-sm rounded-pill px-3 btn-novo-admin" id="btn-novo-admin">
                                    <i class="bi bi-plus-lg"></i> Novo
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive p-3">
                        <table class="table table-hover align-middle border-0 mb-0" id="tabela-admin">
                            <thead class="text-uppercase tabela-admin-head">
                                <tr>
                                    <th class="ps-3 border-0 fw-normal">Avatar</th>
                                    <th class="border-0 fw-normal">Nome</th>
                                    <th class="border-0 fw-normal">Status</th>
                                    <th class="text-end pe-3 border-0 fw-normal">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="admin-list">
                                <tr>
                                    <td colspan="4" class="text-center text-muted py-4">
                                        <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
                                        <div class="mt-2 admin-loading-text">Buscando dados<span class="admin-dots"></span></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="card-footer bg-white border-0 d-flex justify-content-end pb-3 pe-3">
                        <div class="btn-group shadow-sm">
                            <button class="btn btn-light" id="btn-pag-prev-admin">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <button class="btn btn-light" id="info-paginacao-admin" disabled>Pág 1</button>
                            <button class="btn btn-light" id="btn-pag-next-admin">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <div id="admin-modal-container"></div>

    <div class="modal fade" id="modalBloqueioMaster" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 p-3">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
                    <h5 class="fw-bold mt-3 mb-2">Sistema Master RDO desligado</h5>
                    <p class="text-muted mb-4">Faça um contato com a gestão para liberar o registro.</p>
                    <button type="button" class="btn btn-dark w-100 rounded-pill" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

</div>
