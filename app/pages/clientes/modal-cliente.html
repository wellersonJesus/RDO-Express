<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Cliente</h5>
                <input type="text" id="c-username" class="form-control mb-2" placeholder="Nome do Cliente">
                <input type="text" id="c-tipo" class="form-control mb-2" placeholder="Tipo (ex: VIP, Comum)">
                <input type="text" id="c-responsavel" class="form-control mb-2" placeholder="Responsável">
                <input type="text" id="c-cnpj" class="form-control mb-2" placeholder="CNPJ">
                <input type="text" id="c-contato" class="form-control mb-2" placeholder="Contato">
                <input type="email" id="c-email" class="form-control mb-2" placeholder="E-mail">
                <input type="text" id="c-endereco" class="form-control mb-2" placeholder="Endereço">
                <input type="text" id="c-bairro" class="form-control mb-3" placeholder="Bairro">
                <button id="btn-save-cliente" class="btn btn-danger w-100 fw-bold" onclick="window.salvarCliente()">Salvar Cliente</button>
            </div>
        </div>
    </div>
</div>
