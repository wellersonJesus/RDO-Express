<div class="admin-page-wrapper">
    <div class="admin-content-area">
        <div class="col-12">
            <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
                <div class="card-body p-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-person-gear fs-3 text-danger"></i>
                        <div>
                            <h5 class="fw-bold mb-0 text-dark">
                                <span class="text-danger">RDO</span> Express - Administração
                            </h5>
                            <small class="text-muted admin-subtitle">Gestão de Clientes e Colaboradores</small>
                        </div>
                    </div>
                    <button id="btn-sync-admin" class="btn-sync-admin" title="Atualizar">
                        <i id="sync-icon-admin" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-0">
            <div class="col-12">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body pb-0">
                        <div class="admin-tabs-nav">
                            <a href="#" class="admin-tab active" data-origem="clientes">Clientes</a>
                            <a href="#" class="admin-tab" data-origem="colaboradores">Colaboradores</a>
                        </div>

                        <div class="d-flex flex-column gap-2">
                            <div class="admin-status-card">
                                <div class="admin-status-card-inner">
                                    <div class="admin-status-action-item active" data-adm-status="todos" id="adm-filter-todos">
                                        <div class="admin-status-action-icon admin-icon-todos">
                                            <i class="bi bi-grid-3x3-gap"></i>
                                        </div>
                                        <div class="admin-status-action-info">
                                            <span class="admin-status-action-label">Todos</span>
                                            <span class="admin-status-action-count" id="adm-count-todos">0</span>
                                            <span class="admin-status-action-pct" id="adm-pct-todos">de 0</span>
                                        </div>
                                    </div>
                                    <div class="admin-status-action-item admin-bloco-pagamento" data-adm-status="diario" id="adm-filter-diario">
                                        <div class="admin-status-action-icon admin-icon-diario">
                                            <i class="bi bi-calendar-day"></i>
                                        </div>
                                        <div class="admin-status-action-info">
                                            <span class="admin-status-action-label">Diário</span>
                                            <span class="admin-status-action-count" id="adm-count-diario">0</span>
                                            <span class="admin-status-action-pct" id="adm-pct-diario">0%</span>
                                        </div>
                                    </div>
                                    <div class="admin-status-action-item admin-bloco-pagamento" data-adm-status="semanal" id="adm-filter-semanal">
                                        <div class="admin-status-action-icon admin-icon-semanal">
                                            <i class="bi bi-calendar-week"></i>
                                        </div>
                                        <div class="admin-status-action-info">
                                            <span class="admin-status-action-label">Semanal</span>
                                            <span class="admin-status-action-count" id="adm-count-semanal">0</span>
                                            <span class="admin-status-action-pct" id="adm-pct-semanal">0%</span>
                                        </div>
                                    </div>
                                    <div class="admin-status-action-item admin-bloco-pagamento" data-adm-status="quinzenal" id="adm-filter-quinzenal">
                                        <div class="admin-status-action-icon admin-icon-quinzenal">
                                            <i class="bi bi-calendar2-range"></i>
                                        </div>
                                        <div class="admin-status-action-info">
                                            <span class="admin-status-action-label">Quinzenal</span>
                                            <span class="admin-status-action-count" id="adm-count-quinzenal">0</span>
                                            <span class="admin-status-action-pct" id="adm-pct-quinzenal">0%</span>
                                        </div>
                                    </div>
                                    <div class="admin-status-action-item admin-bloco-pagamento" data-adm-status="mensal" id="adm-filter-mensal">
                                        <div class="admin-status-action-icon admin-icon-mensal">
                                            <i class="bi bi-calendar-month"></i>
                                        </div>
                                        <div class="admin-status-action-info">
                                            <span class="admin-status-action-label">Mensal</span>
                                            <span class="admin-status-action-count" id="adm-count-mensal">0</span>
                                            <span class="admin-status-action-pct" id="adm-pct-mensal">0%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex align-items-center justify-content-end gap-2 flex-wrap">
                                <div class="dropdown-filtro-wrapper" id="dropdown-filtro-wrapper-admin">
                                    <button class="btn-filtro-inteligente" id="btn-filtro-admin">
                                        <i class="bi bi-funnel-fill"></i>
                                        <span id="label-filtro-admin">Status</span>
                                        <i class="bi bi-chevron-down chevron-filtro"></i>
                                    </button>
                                    <div class="dropdown-filtro-menu" id="dropdown-filtro-menu-admin">
                                        <div class="dropdown-filtro-item active" data-filtro-status="todos"><i class="bi bi-dash-circle"></i> Todos</div>
                                        <div class="dropdown-filtro-item" data-filtro-status="ativo"><i class="bi bi-check-circle text-success"></i> Ativo</div>
                                        <div class="dropdown-filtro-item" data-filtro-status="inativo"><i class="bi bi-x-circle text-secondary"></i> Inativo</div>
                                    </div>
                                </div>

                                <input type="text" id="filtro-admin" class="form-control form-control-sm rounded-pill admin-input-busca" placeholder="Buscar..." autocomplete="off">

                                <button class="btn btn-danger btn-novo-admin" id="btn-novo-admin">
                                    <i class="bi bi-plus-lg me-1"></i> Novo
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive p-3">
                        <table class="table table-hover align-middle border-0 mb-0" id="tabela-admin">
                            <thead class="text-uppercase tabela-admin-head">
                                <tr>
                                    <th class="border-0 fw-normal" style="width:44px;"></th>
                                    <th class="border-0 fw-normal">
                                        Nome
                                        <button class="btn-sort-data" id="btn-sort-nome-admin" title="Ordenar">
                                            <i class="bi bi-arrow-up" id="icon-sort-nome-admin"></i>
                                        </button>
                                    </th>
                                    <th class="border-0 fw-normal" id="th-pagamento-admin">Pagamento</th>
                                    <th class="border-0 fw-normal">Status</th>
                                    <th class="text-end pe-3 border-0 fw-normal">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="admin-list">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
                                        <div class="mt-2 admin-loading-text">Buscando dados<span class="admin-dots"></span></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="card-footer bg-white border-0 d-flex justify-content-end pb-3 pe-3">
                        <div class="btn-group shadow-sm">
                            <button class="btn btn-light" id="btn-pag-prev-admin">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <button class="btn btn-light" id="info-paginacao-admin" disabled>
                                Pág 1 de 1
                            </button>
                            <button class="btn btn-light" id="btn-pag-next-admin">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal-container"></div>

    <div class="modal fade" id="modal-aviso-admin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h6 class="fw-bold mb-0 text-dark" id="aviso-admin-titulo">
                        <i class="bi bi-exclamation-circle text-warning me-2"></i>Atenção
                    </h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2">
                    <p class="mb-0 text-muted" id="aviso-admin-mensagem">Mensagem aqui.</p>
                </div>
                <div class="modal-footer border-0 pt-0 d-flex flex-row flex-nowrap justify-content-center gap-2 w-100">
                    <button type="button" class="btn btn-warning rounded-pill px-4 flex-fill" id="btn-fechar-aviso-admin" data-bs-dismiss="modal">
                        Entendi
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-excluir-admin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h6 class="fw-bold mb-0 text-dark">Excluir registro</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2">
                    <p class="mb-0 text-muted">
                        Deseja realmente excluir <strong id="excluir-admin-nome" class="text-dark">este registro</strong>?
                    </p>
                </div>
                <div class="modal-footer border-0 pt-0 d-flex flex-row flex-nowrap justify-content-center gap-2 w-100">
                    <button type="button" class="btn btn-light rounded-pill px-4 flex-fill" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger rounded-pill px-4 flex-fill" id="btn-confirmar-excluir-admin">
                        <i class="bi bi-trash"></i> Excluir
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
