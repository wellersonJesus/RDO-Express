<div class="row g-3 h-100">
    <!-- Header RDO Express -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex flex-column">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-whatsapp fs-4 me-2 text-white"></i>
                        <h5 class="fw-bold mb-0 text-white tracking-tight">RDO <span class="fw-light opacity-75">Express</span></h5>
                    </div>
                    
                    <!-- Atendente Selecionado -->
                    <div id="atendente-ativo-card" class="d-flex align-items-center mt-2 bg-white text-dark rounded-pill px-2 py-1 shadow-sm" style="width: fit-content; min-width: 180px; border-left: 4px solid #ffc107;">
                        <img id="atendente-foto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="rounded-circle me-2" width="22" height="22" style="object-fit:cover;">
                        <div class="d-flex flex-column" style="line-height: 1;">
                            <span id="atendente-nome" class="fw-bold text-dark" style="font-size: 0.65rem;">Sincronizando...</span>
                            <small id="atendente-num" class="text-muted" style="font-size: 0.6rem;">Atendente Ativo</small>
                        </div>
                    </div>
                </div>

                <!-- Input Minimalista -->
                <div class="d-flex align-items-center gap-2" style="width: 45%;">
                    <div class="input-group bg-white rounded-pill p-1 shadow-lg">
                        <span class="input-group-text bg-transparent border-0"><i class="bi bi-clipboard-check text-danger"></i></span>
                        <input type="text" id="input-colar" class="form-control border-0 shadow-none" placeholder="Cole o conteúdo aqui..." style="font-size: 0.85rem;">
                        <button class="btn btn-danger rounded-pill px-4 fw-bold btn-gerar" onclick="criarPedido()">
                            <i class="bi bi-magic me-1"></i> GERAR
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista Lateral -->
    <div class="col-md-4 h-100">
        <div class="card border-0 shadow-sm overflow-hidden bg-white" style="height: 600px; border-radius: 20px;">
            <div class="p-3 bg-light border-bottom text-center">
                <h6 class="fw-bold text-dark mb-0" style="font-size: 0.75rem; letter-spacing: 1px;">GRUPOS MONITORADOS</h6>
            </div>
            <div id="lista-contatos-chat" class="list-group list-group-flush overflow-auto p-2"></div>
        </div>
    </div>

    <!-- Feed de Mensagens com Fundo WhatsApp Real -->
    <div class="col-md-8 h-100">
        <div id="chat-messages-container" class="card border-0 shadow-sm p-4 overflow-auto d-flex flex-column gap-3 whatsapp-bg" 
             style="height: 600px; border-radius: 20px;">
             <!-- Balões injetados aqui -->
        </div>
    </div>
</div>

<script>
    let jidSelecionado = null;

    async function carregarDados() {
        const [configs, pedidos] = await Promise.all([
            API.call('getbotconfig'),
            API.call('getchatlive')
        ]);

        const atendenteAtivo = configs.find(c => c.tipo === 'atendente' && c.ativo === true);
        if(atendenteAtivo) {
            document.getElementById('atendente-foto').src = atendenteAtivo.logo;
            document.getElementById('atendente-nome').innerText = atendenteAtivo.nome;
            document.getElementById('atendente-num').innerText = atendenteAtivo.valor;
        }

        const lista = document.getElementById('lista-contatos-chat');
        lista.innerHTML = configs.filter(g => g.tipo === 'grupo').map(g => `
            <button onclick="setFiltro('${g.valor}')" class="list-group-item list-group-item-action border-0 rounded-4 mb-1 py-3 ${jidSelecionado === g.valor ? 'bg-danger text-white shadow' : ''}">
                <div class="d-flex align-items-center">
                    <img src="${g.logo}" class="rounded-circle me-3 border" width="40" height="40" style="object-fit:cover;">
                    <div class="flex-grow-1 overflow-hidden">
                        <span class="fw-bold d-block text-truncate" style="font-size: 0.8rem;">${g.nome}</span>
                        <small class="${jidSelecionado === g.valor ? 'text-white-50' : 'text-muted'}" style="font-size: 0.65rem;">ID: ${g.valor}</small>
                    </div>
                </div>
            </button>
        `).join('');

        const container = document.getElementById('chat-messages-container');
        const filtrados = jidSelecionado ? pedidos.filter(p => p.cliente === jidSelecionado) : pedidos;
        
        container.innerHTML = filtrados.reverse().map(p => {
            const grp = configs.find(g => g.valor === p.cliente) || {nome: 'RDO', logo: 'https://cdn-icons-png.flaticon.com/512/124/124034.png'};
            const isConcluido = p.status === 'Concluído';

            return `
                <div class="d-flex flex-column ${isConcluido ? 'align-items-end' : 'align-items-start'} animate__animated animate__fadeIn">
                    <div class="whatsapp-bubble p-2 px-3 shadow-sm position-relative" style="max-width: 75%; border-radius: 12px; background: ${isConcluido ? '#e7ffdb' : '#ffffff'};">
                        <div class="d-flex align-items-center mb-1 gap-2 border-bottom pb-1 mb-1" style="opacity: 0.6;">
                            <img src="${grp.logo}" class="rounded-circle" width="14" height="14">
                            <strong style="font-size: 0.6rem;">${grp.nome}</strong>
                        </div>
                        <p class="mb-1 text-dark" style="font-size: 0.82rem; line-height: 1.4; white-space: pre-wrap;">${p.ultima_msg}</p>
                        <div class="d-flex justify-content-end align-items-center gap-1">
                            <span class="text-muted" style="font-size: 0.55rem;">${p.hora || '12:00'}</span>
                            <div class="dropdown">
                                <i class="bi bi-chevron-down text-muted" style="cursor:pointer; font-size: 0.6rem;" data-bs-toggle="dropdown"></i>
                                <ul class="dropdown-menu shadow border-0 small">
                                    <li><a class="dropdown-item" onclick="setStat('${p.id}','Aberto')">Pendente</a></li>
                                    <li><a class="dropdown-item text-success fw-bold" onclick="setStat('${p.id}','Concluído')">Concluir</a></li>
                                </ul>
                            </div>
                            <i class="bi bi-check2-all ${isConcluido ? 'text-primary' : 'text-muted'}" style="font-size: 0.75rem;"></i>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.setFiltro = (jid) => {
        jidSelecionado = (jidSelecionado === jid) ? null : jid;
        carregarDados();
    };

    window.setStat = async (id, status) => {
        await API.call('updatechatstatus', { id, status });
        carregarDados();
    };

    window.criarPedido = async () => {
        const msg = document.getElementById('input-colar').value.trim();
        if(!msg) return;
        await API.call('addchatlive', {
            id: "MSG-" + Date.now(),
            cliente: jidSelecionado || 'GERAL',
            ultima_msg: msg,
            status: 'Aberto',
            hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
        });
        document.getElementById('input-colar').value = '';
        carregarDados();
    };

    carregarDados();
    setInterval(carregarDados, 5000);
</script>

<style>
    /* Fundo clássico do WhatsApp com o padrão de doodles */
    .whatsapp-bg {
        background-color: #efe7de !important;
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') !important;
        background-repeat: repeat !important;
        background-attachment: local !important;
        position: relative;
    }

    /* Ajuste fino das sombras e bordas dos balões */
    .whatsapp-bubble {
        box-shadow: 0 1px 0.5px rgba(0,0,0,0.13) !important;
    }

    .btn-gerar { 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        font-size: 0.75rem;
        letter-spacing: 1px;
    }
    
    .scrollbar-hidden::-webkit-scrollbar { display: none; }
    
    .list-group-item { transition: all 0.2s ease; border: none !important; margin-bottom: 5px; }
    .list-group-item:hover { background-color: #f1f3f4; transform: translateX(4px); }
</style>
