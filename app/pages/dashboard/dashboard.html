<div class="dashboard-wrapper">

    <div class="dash-block dash-hero">
        <div class="dash-hero-text">
            <h4 class="dash-hero-title">
                <span class="text-danger">RDO</span> Express Dashboard
            </h4>
            <p class="dash-hero-subtitle">Acompanhe em tempo real os indicadores da sua operação</p>
        </div>
    </div>

    <div class="row g-3 mt-3">
        <div class="col-md-12">
            <div class="dash-block dash-bars-block" id="bloco-visao-geral">
                <div class="dash-block-header">
                    <i class="bi bi-eye-fill"></i>
                    <h6>Visão Geral</h6>
                </div>
                <div class="hbars-list" id="dashboard-visao-geral-hbars"></div>
            </div>
        </div>
    </div>

    <div class="row g-3 dash-row-top">
        <div class="col-md-6">
            <div class="dash-block dash-bars-block" id="bloco-chat-pedidos">
                <div class="dash-block-header">
                    <i class="bi bi-chat-dots-fill"></i>
                    <h6>Chat e Pedidos</h6>
                </div>
                <div class="bars-list" id="dashboard-chat-pedidos-ranking"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="dash-block dash-chart-block" id="bloco-administracao">
                <div class="dash-block-header">
                    <i class="bi bi-gear-fill"></i>
                    <h6>Administração</h6>
                </div>
                <div class="admin-chart-legend" id="dashboard-admin-legend"></div>
                <div class="admin-chart-wrapper">
                    <canvas id="chart-admin-bars" height="130"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="dash-block" id="bloco-financeiro">
        <div class="dash-block-header">
            <i class="bi bi-wallet2"></i>
            <h6>Financeiro</h6>
        </div>
        <div id="dashboard-fin-cards" class="indicadores-row"></div>
        <div class="fin-charts-row">
            <div class="fin-chart-card">
                <span class="fin-chart-title">Receita x Despesa (últimos 6 meses)</span>
                <canvas id="chart-fin-linha" height="180"></canvas>
            </div>
            <div class="fin-chart-card fin-chart-card-sm">
                <span class="fin-chart-title">Distribuição de Lançamentos</span>
                <canvas id="chart-fin-pizza" height="180"></canvas>
            </div>
        </div>
    </div>

    <div class="dash-block" id="bloco-relatorio">
        <div class="dash-block-header">
            <i class="bi bi-file-earmark-bar-graph"></i>
            <h6>Relatórios</h6>
        </div>
        <div id="dashboard-relatorio-grid" class="indicadores-row"></div>
        <div class="fin-charts-row">
            <div class="fin-chart-card">
                <span class="fin-chart-title">Volume de Pedidos por Dia (últimos 7 dias)</span>
                <canvas id="chart-relatorio-pedidos" height="180"></canvas>
            </div>
        </div>
    </div>

</div>
