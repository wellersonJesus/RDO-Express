<!-- ═══════════════════════════════════════════════════
     MODAL: Editar Pedido
════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalEditarPedido" tabindex="-1" aria-hidden="true"
    data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered modal-pedido-edit-dialog">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

            <div class="modal-pedido-header d-flex align-items-center gap-3">
                <div class="modal-pedido-icon">
                    <i class="bi bi-pencil-square"></i>
                </div>
                <div>
                    <div class="modal-pedido-title">Editar Pedido</div>
                    <div class="modal-pedido-subtitle" id="editar-titulo">RDO000</div>
                </div>
                <button type="button" class="btn-close btn-close-white ms-auto"
                    data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>

            <div class="modal-pedido-body">

                <input type="hidden" id="edit-pedido-id">

                <div id="edit-error-msg"
                    class="alert alert-danger d-none rounded-3 py-2 px-3 mb-3"
                    style="font-size:0.8rem;"></div>

                <div class="modal-pedido-section-label">
                    <i class="bi bi-person-fill me-1 text-danger"></i>Dados do Solicitante
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Cliente / Solicitante</label>
                        <input type="text" id="edit-solicitante"
                            class="form-control form-control-sm modal-pedido-input"
                            placeholder="Nome do solicitante">
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Contato</label>
                        <input type="text" id="edit-contato"
                            class="form-control form-control-sm modal-pedido-input"
                            placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Mercadoria</label>
                        <select id="edit-mercadoria"
                            class="form-select form-select-sm modal-pedido-input">
                            <option value="">Selecione...</option>
                            <option value="Sacola">Sacola</option>
                            <option value="Coleta">Coleta</option>
                            <option value="Bolsa">Bolsa</option>
                            <option value="Envelope">Envelope</option>
                        </select>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Horário de Coleta</label>
                        <input type="text" id="edit-horario"
                            class="form-control form-control-sm modal-pedido-input"
                            placeholder="Ex: 14:30">
                    </div>
                </div>

                <div class="modal-pedido-section-label mt-3">
                    <i class="bi bi-signpost-split-fill me-1 text-danger"></i>Rota
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Origem (De)</label>
                        <input type="text" id="edit-de"
                            class="form-control form-control-sm modal-pedido-input"
                            placeholder="Endereço de origem">
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Destino (Para)</label>
                        <input type="text" id="edit-para"
                            class="form-control form-control-sm modal-pedido-input"
                            placeholder="Endereço de destino">
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Retorno</label>
                        <select id="edit-retorno"
                            class="form-select form-select-sm modal-pedido-input">
                            <option value="Não">Não</option>
                            <option value="Sim">Sim</option>
                        </select>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="modal-pedido-field-label">Prioridade</label>
                        <select id="edit-prioridade"
                            class="form-select form-select-sm modal-pedido-input">
                            <option value="0">Normal</option>
                            <option value="5">Agendado</option>
                            <option value="10">Urgente</option>
                        </select>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="modal-pedido-field-label">Observação</label>
                    <textarea id="edit-obs" rows="2"
                        class="form-control form-control-sm modal-pedido-input"
                        placeholder="Observações adicionais..."></textarea>
                </div>

                <div class="modal-pedido-section-label mt-3">
                    <i class="bi bi-clock-history me-1 text-danger"></i>Tempo de Espera
                </div>

                <div class="modal-pedido-espera-box">

                    <div class="mb-2">
                        <label class="modal-pedido-field-label">Tipo de Espera</label>
                        <select id="edit-tempo-espera-tipo"
                            class="form-select form-select-sm modal-pedido-input"
                            onchange="window.RDO_PEDIDOS.calcularEspera()">
                            <option value="sem_espera">Sem espera</option>
                            <option value="coleta">Espera na Coleta</option>
                            <option value="entrega">Espera na Entrega</option>
                            <option value="ambos">Espera na Coleta + Entrega</option>
                        </select>
                        <div class="modal-pedido-espera-hint mt-1">
                            <i class="bi bi-info-circle me-1"></i>
                            Franquia de <strong>10 min</strong> em cada ponto.
                            Excedente cobrado a <strong>R$ 0,60/min</strong>.
                        </div>
                    </div>

                    <div id="box-minutos-espera" style="display:none;" class="mb-2">
                        <label class="modal-pedido-field-label">Minutos reais de espera</label>
                        <input type="number" id="edit-minutos-espera" min="0" step="1"
                            class="form-control form-control-sm modal-pedido-input"
                            placeholder="Ex: 25"
                            oninput="window.RDO_PEDIDOS.calcularEspera()">
                    </div>

                    <div id="box-resultado-espera"
                        style="display:none;"
                        class="modal-pedido-espera-resultado align-items-center gap-3 flex-wrap">
                        <div class="modal-pedido-espera-col">
                            <span class="modal-pedido-espera-col-label">Valor Original</span>
                            <input type="text" id="edit-valor-original"
                                class="form-control form-control-sm modal-pedido-input text-center"
                                readonly>
                        </div>
                        <div class="modal-pedido-espera-arrow">
                            <i class="bi bi-arrow-right-circle-fill text-danger"></i>
                        </div>
                        <div class="modal-pedido-espera-col">
                            <span class="modal-pedido-espera-col-label">Valor Ajustado</span>
                            <div id="edit-valor-ajustado"
                                class="modal-pedido-espera-valor-ajustado">
                            </div>
                        </div>
                    </div>

                </div>

                <div class="d-flex flex-column gap-2 mt-3">
                    <button type="button" id="btn-salvar-edicao"
                        class="btn btn-salvar-pedido w-100"
                        onclick="window.RDO_PEDIDOS.salvarEdicao()">
                        SALVAR
                    </button>
                    <button type="button"
                        class="btn btn-cancelar-pedido w-100"
                        data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-2"></i>Cancelar
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
