<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | High-End SRE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="admin-panel">
        <aside class="sidebar">
            <div class="py-4 text-center mb-2">
                <h4 class="fw-bold m-0" style="letter-spacing: -1px;"><span class="text-danger">RDO</span> EXPRESS</h4>
            </div>
            <nav class="flex-grow-1">
                <div class="nav-item">
                    <a class="nav-link" onclick="toggleMenu('m-gestao')">
                        <i class="bi bi-stack main-icon"></i> <span>Gestão</span>
                    </a>
                    <ul class="submenu" id="m-gestao">
                        <li><a class="nav-link" onclick="loadModule('gestao', 'coletas', 'Gestão / Coletas')">Coletas</a></li>
                    </ul>
                </div>
                <div class="nav-item">
                    <a class="nav-link" onclick="toggleMenu('m-relat')">
                        <i class="bi bi-clipboard-data main-icon"></i> <span>Relatórios</span>
                    </a>
                    <ul class="submenu" id="m-relat">
                        <li><a class="nav-link" onclick="loadModule('relatorios', 'relatorio', 'Relatórios / Geral')">Visão Geral</a></li>
                    </ul>
                </div>
            </nav>
            <div class="pb-3 px-2 text-center">
                <small class="text-muted" style="font-size: 10px;">v2.0.26-SRE</small>
            </div>
        </aside>

        <header class="top-header">
            <h5 class="fw-bold m-0 text-dark" id="dynamic-title">Dashboard</h5>
            <div class="user-profile d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small lh-1">Wellerson Jesus</div>
                    <small class="text-danger fw-bold" style="font-size: 0.65rem;">SRE MASTER</small>
                </div>
                <div class="user-avatar" style="width:40px; height:40px; border:2px solid #dc3545; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#dc3545; font-weight:bold; background:#fff;">W</div>
            </div>
        </header>

        <main class="main-content">
            <div id="router-view"></div>
        </main>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleMenu(id) {
            document.querySelectorAll('.submenu').forEach(m => {
                if(m.id !== id) m.classList.remove('show');
            });
            document.getElementById(id).classList.toggle('show');
        }
    </script>
</body>
</html>
