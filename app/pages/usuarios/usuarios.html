<div class="card shadow-sm border-0 bg-white">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-0">
        <h4 class="mb-0 fw-bold text-dark d-flex align-items-center">
            <i class="bi bi-person-badge text-danger me-2"></i> Usuários do Sistema
        </h4>
        <button class="btn btn-dark btn-sm shadow-sm" onclick="novoUsuario()">
            <i class="bi bi-plus-lg me-1"></i> NOVO ACESSO
        </button>
    </div>
    <div class="table-responsive px-3 pb-3">
        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
            <thead class="table-light">
                <tr class="text-secondary" style="font-size: 0.75rem;">
                    <th>AVATAR</th>
                    <th>USERNAME</th>
                    <th>TIPO (CARGO)</th>
                    <th>SENHA</th>
                    <th class="text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="usuarios-body"></tbody>
        </table>
    </div>
</div>

<script>
    (function() {
        async function carregarUsuarios() {
            const tbody = document.getElementById('usuarios-body');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4"><div class="spinner-border spinner-border-sm text-danger"></div></td></tr>';
            
            const data = await API.call('getusuarios');
            if (!data || data.status === 'error') return;

            tbody.innerHTML = data.map(u => `
                <tr>
                    <td><img src="${u.imagem || 'https://via.placeholder.com/30'}" class="rounded-circle border" width="30" height="30"></td>
                    <td class="fw-bold">${u.username}</td>
                    <td><span class="badge bg-light text-danger border">${u.tipo.toUpperCase()}</span></td>
                    <td class="text-muted small">••••••••</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-link text-secondary"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-link text-danger"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        carregarUsuarios();
    })();
</script>
