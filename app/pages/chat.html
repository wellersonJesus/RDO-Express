<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <i class="bi bi-whatsapp fs-4 me-2"></i>
                    <div>
                        <h6 class="fw-bold mb-0">Chat RDO Express</h6>
                        <small class="opacity-75" style="font-size: 0.7rem;">Operação de Pedidos</small>
                    </div>
                </div>
                <div class="input-group w-50">
                    <input type="text" id="input-colar" class="form-control border-0" placeholder="Cole a mensagem aqui..." style="border-radius: 12px 0 0 12px;">
                    <button class="btn btn-white text-danger fw-bold shadow-sm" style="border-radius: 0 12px 12px 0; background: white;" onclick="criarPedido()">GERAR PEDIDO</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4 h-100">
        <div class="card border-0 shadow-sm overflow-hidden" style="height: 600px; border-radius: 15px;">
            <div class="p-2 bg-white border-bottom">
                <div class="d-flex gap-1 overflow-auto pb-1 scrollbar-hidden">
                    <button class="btn btn-light btn-sm rounded-pill fw-bold active-filter">Tudo</button>
                    <button class="btn btn-light btn-sm rounded-pill fw-bold text-nowrap">Não lidas</button>
                    <button class="btn btn-light btn-sm rounded-pill fw-bold text-nowrap">Favoritos</button>
                    <button class="btn btn-light btn-sm rounded-pill fw-bold text-nowrap">Arquivados</button>
                </div>
            </div>
            <div id="lista-contatos-chat" class="list-group list-group-flush overflow-auto"></div>
        </div>
    </div>

    <div class="col-md-8 h-100">
        <div id="chat-messages-container" class="card border-0 shadow-sm p-4 overflow-auto d-flex flex-row flex-wrap gap-3 align-content-start" 
             style="height: 600px; border-radius: 15px; background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay;">
            
            <div id="empty-state" class="m-auto text-center" style="max-width: 300px; opacity: 0.7;">
                <div class="bg-white p-4 rounded-4 shadow-sm">
                    <i class="bi bi-chat-dots-fill text-danger fs-1"></i>
                    <h6 class="fw-bold mt-2">Chat RDO Express</h6>
                    <p class="small text-muted mb-0">Selecione um grupo ao lado para gerenciar as ordens de serviço.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let jidSelecionado = null;

    async function carregarChat() {
        const [grupos, pedidos] = await Promise.all([
            API.call('getbotconfig'),
            API.call('getchatlive')
        ]);

        const lista = document.getElementById('lista-contatos-chat');
        lista.innerHTML = grupos.map(g => `
            <button onclick="setFiltro('${g.valor}')" class="list-group-item list-group-item-action py-3 ${jidSelecionado === g.valor ? 'bg-light' : ''} ${!g.ativo ? 'opacity-50' : ''}">
                <div class="d-flex align-items-center">
                    <div class="position-relative">
                        <img src="${g.logo}" class="rounded-circle me-3" width="40" height="40" style="object-fit:cover; filter: ${!g.ativo ? 'grayscale(1)' : 'none'};">
                        ${g.ativo ? '<span class="position-absolute bottom-0 end-0 bg-success border border-white rounded-circle" style="width:10px;height:10px;margin-right:12px"></span>' : ''}
                    </div>
                    <div class="flex-grow-1 overflow-hidden">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold small text-truncate ${!g.ativo ? 'text-muted' : ''}">${g.nome}</span>
                        </div>
                        <small class="text-muted text-truncate d-block" style="font-size: 0.65rem;">${!g.ativo ? 'Silenciado' : 'Disponível'}</small>
                    </div>
                </div>
            </button>
        `).join('');

        const container = document.getElementById('chat-messages-container');
        const filtrados = jidSelecionado ? pedidos.filter(p => p.cliente === jidSelecionado) : pedidos;

        if(filtrados.length > 0) {
            document.getElementById('empty-state').style.display = 'none';
            container.innerHTML = filtrados.reverse().map(p => {
                const grp = grupos.find(g => g.valor === p.cliente) || {nome: 'RDO', logo: 'https://cdn-icons-png.flaticon.com/512/124/124034.png'};
                return `
                    <div class="card border-0 shadow-sm animate__animated animate__fadeIn" style="width: 260px; border-radius: 12px; height: fit-content;">
                        <div class="card-header bg-white border-0 py-2 d-flex align-items-center">
                            <img src="${grp.logo}" class="rounded-circle me-2" width="20" height="20">
                            <span class="small fw-bold text-truncate">${grp.nome}</span>
                        </div>
                        <div class="card-body py-2">
                            <p class="small mb-2" style="white-space: pre-wrap; font-size: 0.8rem;">${p.ultima_msg}</p>
                            <div class="d-flex justify-content-between align-items-center border-top pt-2">
                                <span class="badge ${p.status === 'Concluído' ? 'bg-success' : 'bg-danger'}" style="font-size:0.6rem">${p.status}</span>
                                <div class="dropdown">
                                    <button class="btn btn-sm btn-light p-0 px-1" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                                    <ul class="dropdown-menu shadow border-0 small">
                                        <li><a class="dropdown-item" onclick="setStat('${p.id}','Aberto')">Aberto</a></li>
                                        <li><a class="dropdown-item text-success" onclick="setStat('${p.id}','Concluído')">Concluído</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    }

    window.setFiltro = (jid) => {
        jidSelecionado = (jidSelecionado === jid) ? null : jid;
        carregarChat();
    };

    window.setStat = async (id, status) => {
        await API.call('updatechatstatus', { id, status });
        carregarChat();
    };

    window.criarPedido = async () => {
        const msg = document.getElementById('input-colar').value.trim();
        if(!msg) return;
        await API.call('addchatlive', {
            id: "MSG-" + Date.now(),
            cliente: jidSelecionado || 'GERAL',
            ultima_msg: msg,
            status: 'Aberto',
            hora: new Date().toLocaleTimeString('pt-BR')
        });
        document.getElementById('input-colar').value = '';
        carregarChat();
    };

    carregarChat();
    setInterval(carregarChat, 5000);
</script>

<style>
    .active-filter { background-color: #dc3545 !important; color: white !important; }
    .btn-sm.rounded-pill { font-size: 0.65rem; padding: 4px 10px; border: 1px solid #eee; }
    .scrollbar-hidden::-webkit-scrollbar { display: none; }
</style>
