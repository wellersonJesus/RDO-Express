<div class="row g-3 h-100">
    <!-- Header do Card -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express - Chat</h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Atendimento em Tempo Real</small>
                    </div>
                </div>
                <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="carregarDados()">
                    <i id="sync-icon-chat" class="bi bi-arrow-repeat"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Lista de Contatos -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 bg-white d-flex flex-column" style="height: 600px;">
            <div class="p-3 border-bottom">
                <div class="input-group bg-light rounded-pill px-2">
                    <span class="input-group-text bg-transparent border-0"><i class="bi bi-search text-secondary"></i></span>
                    <input type="text" id="chat-search" class="form-control border-0 bg-transparent shadow-none" 
                           placeholder="Pesquisar contatos..." onkeyup="filtrarContatos()">
                </div>
            </div>
            <!-- Container de contatos com scroll -->
            <div id="lista-contatos-chat" class="list-group list-group-flush overflow-auto flex-grow-1">
                <!-- Dados injetados aqui -->
            </div>
        </div>
    </div>

    <!-- Área de Mensagens -->
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 600px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center">
                <div id="chat-header-avatar"></div>
                <div class="ms-3">
                    <h6 id="chat-header-name" class="fw-bold mb-0">Selecione um contato</h6>
                </div>
            </div>

            <!-- Fundo estilo WhatsApp -->
            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto d-flex flex-column gap-2">
                <div class="text-center text-muted my-auto">
                    <i class="bi bi-chat-dots fs-1 d-block mb-2"></i>
                    <p>Selecione um contato para conversar</p>
                </div>
            </div>

            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <textarea id="msg-input" class="form-control border-0 bg-transparent px-3" rows="1" placeholder="Digite uma mensagem..."></textarea>
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemManual()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilo de fundo do WhatsApp */
    .whatsapp-bg {
        background-color: #E5DDD5 !important;
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
    }
</style>
