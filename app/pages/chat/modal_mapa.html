<div class="modal fade" id="modalMapa" tabindex="-1" aria-labelledby="modalMapaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

            <div class="modal-header border-0 pb-0 px-4 pt-4 flex-column align-items-start">
                <h5 class="modal-title fw-bold" id="modalMapaLabel">
                    <span class="text-danger">RDO</span> Express - Rota(s)
                </h5>

                <div class="mt-1 text-muted" style="font-size: 0.85rem; font-weight: normal;">
                    Solicitante: <span id="header-nome-solicitante">Carregando...</span>
                </div>
            </div>

            <div class="modal-body p-4">
                <div id="container-mapa-visual" class="rounded-3 mb-3 border shadow-sm"
                    style="height: 250px; background: #e5e5e5; display: flex; align-items: center; justify-content: center;">
                    <span class="text-muted">Carregando mapa...</span>
                </div>

                <div class="bg-white border rounded-3 p-3 mb-3">
                    <p class="fw-bold mb-2">Rotas:</p>
                    <div id="lista-rotas-detalhada" class="small text-secondary" style="line-height: 1.6;"></div>
                </div>

                <button class="btn btn-danger w-100 rounded-pill py-2 fw-bold"
                    onclick="window.prosseguirParaFormulario()">
                    Confirmar Rota
                </button>
            </div>
        </div>
    </div>
</div>
