<div class="container-fluid p-0">
    <div class="col-12 mb-3">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-gear-wide-connected" style="font-size: 1.5rem; color: #FF0000;"></i>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express</h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Gestão de acesso</small>
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <select id="filtro-tipo" class="form-select form-select-sm" style="width: 150px;" onchange="window.reloadBot()">
                        <option value="TODOS">Toda a lista</option>
                        <option value="atendente">Atendente</option>
                        <option value="cliente">Clientes</option>
                        <option value="colaborador">Colaborador</option>
                    </select>
                    <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="window.abrirModalCadastro()"><i class="bi bi-plus-lg"></i> Novo</button>
                    <button id="btn-status-bot" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="window.toggleMaster()">MASTER OFF</button>
                    <button class="btn btn-outline-danger btn-sm rounded-circle" style="width:32px; height:32px;" onclick="window.initBot()"><i id="sync-icon-bot" class="bi bi-arrow-repeat"></i></button>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12"><div class="card border-0 shadow-sm bg-white rounded-4"><div class="table-responsive p-3"><table class="table table-hover align-middle border-0"><thead class="text-uppercase" style="font-size: 0.65rem; color: #999; letter-spacing: 1px;"><tr><th class="ps-3">Status</th><th>Avatar</th><th>Nome</th><th>Tipo</th><th class="text-end pe-3">Ações</th></tr></thead><tbody id="bot-list"></tbody></table></div></div></div>
</div>

<div class="modal fade" id="modalEscolhaTipo" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-4 text-center"><h5>Novo Registro</h5><button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('usuarios')">Usuário</button><button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('clientes')">Cliente</button><button class="btn btn-outline-danger w-100" onclick="window.abrirModalEspecifico('colaboradores')">Colaborador</button></div></div></div></div>

<!-- Modal Usuário -->
<div class="modal fade" id="modalUsuario" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg rounded-4"><div class="modal-body p-4"><h5>Cadastrar Usuário</h5><input type="text" id="u-username" class="form-control mb-2" placeholder="Nome"><input type="password" id="u-password" class="form-control mb-2" placeholder="Senha"><input type="text" id="u-imagem" class="form-control mb-2" placeholder="URL"><select id="u-tipo" class="form-select mb-3"><option value="Atendente">Atendente</option><option value="TI">TI</option></select><button id="btn-save-modal" class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalUsuario')">Salvar</button></div></div></div></div>

<!-- Modal Cliente -->
<div class="modal fade" id="modalCliente" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow-lg rounded-4"><div class="modal-body p-4"><h5>Cadastrar Cliente</h5><input type="text" id="c-username" class="form-control mb-2" placeholder="Nome do Cliente"><input type="text" id="c-tipo" class="form-control mb-2" placeholder="Tipo"><input type="text" id="c-responsavel" class="form-control mb-2" placeholder="Responsável"><input type="text" id="c-cnpj" class="form-control mb-2" placeholder="CNPJ"><input type="text" id="c-contato" class="form-control mb-2" placeholder="Contato"><input type="text" id="c-email" class="form-control mb-2" placeholder="E-mail"><input type="text" id="c-endereco" class="form-control mb-2" placeholder="Endereço"><input type="text" id="c-bairro" class="form-control mb-3" placeholder="Bairro"><button id="btn-save-cliente" class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalCliente')">Salvar Cliente</button></div></div></div></div>

<div class="modal fade" id="modalEdicao" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-4"><h5>Editar</h5><input type="text" id="edit-user" class="form-control mb-2" placeholder="Nome"><button class="btn btn-danger w-100" onclick="window.confirmarEdicao()">Salvar</button></div></div></div></div>
<div class="modal fade" id="modalExclusao" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body text-center p-4"><h5>Confirmar Exclusão?</h5><button class="btn btn-danger" onclick="window.confirmarExclusao()">Sim, Remover</button></div></div></div></div>
