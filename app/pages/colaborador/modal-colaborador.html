<div class="modal fade" id="modalColaborador" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Colaborador</h5>
                <div class="row g-2 mb-2">
                    <div class="col-4"><label class="small fw-bold text-muted">Nome</label><input type="text" id="col-username" class="form-control" placeholder="Nome completo"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">Tipo</label><select id="col-tipo" class="form-select"><option value="">Selecione...</option><option value="Atendente">Atendente</option><option value="Motoboy">Motoboy</option><option value="Financeiro">Financeiro</option></select></div>
                    <div class="col-4"><label class="small fw-bold text-muted">CNPJ</label><input type="text" id="col-cnpj" class="form-control" placeholder="00.000.000/0000-00"></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-4"><label class="small fw-bold text-muted">Placa Moto</label><input type="text" id="col-moto_placa" class="form-control" placeholder="ABC-1234"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">E-mail</label><input type="email" id="col-email" class="form-control" placeholder="contato@empresa.com"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">Chave PIX</label><input type="text" id="col-chave_pix" class="form-control" placeholder="Chave para pagamento"></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="small fw-bold text-muted">Endereço</label><input type="text" id="col-endereco" class="form-control" placeholder="Logradouro"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">Bairro</label><input type="text" id="col-bairro" class="form-control" placeholder="Bairro"></div>
                    <div class="col-4"><label class="small fw-bold text-muted">Comissão</label><select id="col-tipo_comissao" class="form-select"><option value="">Selecione...</option><option value="50%">50%</option><option value="70%">70%</option><option value="80%">80%</option></select></div>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted">Status Contrato</label>
                    <select id="col-status_contrato" class="form-select"><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option></select>
                </div>
                <input type="hidden" id="c-status" value="TRUE">
                <button class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalColaborador')">Salvar Colaborador</button>
            </div>
        </div>
    </div>
</div>
