<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow rounded-4 bg-white">
            
            <!-- Cabeçalho Minimalista -->
            <div class="modal-header border-0 pb-0 px-4 pt-4 d-flex justify-content-between align-items-start">
                <div>
                    <h5 class="modal-title fw-bold mb-1">
                        <span class="text-danger">RDO</span><span class="text-dark"> Express</span>
                    </h5>
                    <div class="text-muted small">
                        Checkout de pedido para: <span id="form-nome-solicitante" class="fw-semibold text-dark"></span>
                    </div>
                </div>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body p-4 pt-3">
                <!-- Formulário com classe de validação do Bootstrap -->
                <form id="form-checkout" class="needs-validation" novalidate>
                    <!-- Seção 1: Identificação -->
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1">Solicitante</label>
                            <input type="text" id="p-solicitante" class="form-control form-control-sm bg-light border-0 rounded-3 px-3 text-secondary" readonly style="height: 38px;" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1">Contato</label>
                            <input type="text" id="p-contato" class="form-control form-control-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" style="height: 38px;" required>
                        </div>
                    </div>

                    <!-- Seção 2: Métricas de Entrega -->
                    <div class="row g-3 mt-1">
                        <div class="col-md-4">
                            <label class="form-label small text-muted mb-1">Horário</label>
                            <input type="text" id="p-horario" class="form-control form-control-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" style="height: 38px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted mb-1">Distância (KM)</label>
                            <input type="number" id="p-distancia" class="form-control form-control-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" oninput="window.calcularTudo()" placeholder="0" step="any" style="height: 38px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted mb-1">Tempo Estimado</label>
                            <input type="text" id="p-tempo" class="form-control form-control-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" placeholder="30 min" style="height: 38px;" required>
                        </div>
                    </div>

                    <!-- Seção 3: Regras e Parâmetros Financeiros -->
                    <div class="row g-3 mt-1">
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">Prioridade</label>
                            <select id="p-prioridade" class="form-select form-select-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" onchange="window.calcularTudo()" style="height: 38px;" required>
                                <option value="0">Normal</option>
                                <option value="5">Agendado (+R$5)</option>
                                <option value="8">Urgente (+R$8)</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">Retorno</label>
                            <select id="p-retorno" class="form-select form-select-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" onchange="window.calcularTudo()" style="height: 38px;" required>
                                <option value="0">Não (0%)</option>
                                <option value="0.6">Sim (+60%)</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">Taxa Dinâmica</label>
                            <select id="p-dinamica" class="form-select form-select-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" onchange="window.calcularTudo()" style="height: 38px;" required>
                                <option value="0">Tx 01 (R$ 0)</option>
                                <option value="5">Tx 02 (R$ 5)</option>
                                <option value="15">Tx 03 (R$ 15)</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">Custo por KM</label>
                            <select id="p-valor-km" class="form-select form-select-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" onchange="window.calcularTudo()" style="height: 38px;" required>
                                <option value="1.10">R$ 1,10</option>
                                <option value="2.02">R$ 2,02</option>
                                <option value="2.20" selected>R$ 2,20</option>
                                <option value="3.00">R$ 3,00</option>
                            </select>
                        </div>
                    </div>

                    <!-- Seção 4: Detalhes Técnicos e Rota -->
                    <div class="row g-3 mt-1">
                        <div class="col-12">
                            <label class="form-label small text-muted mb-1">Mercadoria</label>
                            <select id="p-mercadoria" class="form-select form-select-sm border-light-subtle bg-white rounded-3 px-3 shadow-sm" style="height: 38px;" required>
                                <option value="Sacola">Sacola</option>
                                <option value="Coleta">Coleta</option>
                                <option value="Bolsa">Bolsa</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label small text-muted mb-1">Itinerário Completo das Rotas</label>
                        <textarea id="p-rotas" class="form-control border-light-subtle bg-white rounded-3 px-3 shadow-sm" rows="2" placeholder="Trajeto das paradas..." style="font-size: 0.875rem;" required></textarea>
                    </div>
                    
                    <div class="mt-3">
                        <label class="form-label small text-muted mb-1">Observações Internas</label>
                        <textarea id="p-obs" class="form-control border-light-subtle bg-white rounded-3 px-3 shadow-sm" rows="1" style="font-size: 0.875rem;"></textarea>
                    </div>
                </form>

                <!-- Box de Valor Final Premium Clean -->
                <div class="mt-4 p-3 bg-body-tertiary border border-light-subtle rounded-3 text-center">
                    <span class="text-muted small fw-medium">Total Estimado do Atendimento</span>
                    <div class="fs-3 fw-bold text-danger mt-1" id="view-valor-final">R$ 0,00</div>
                </div>

                <!-- Botões de Ação Simplificados -->
                <div class="row g-2 mt-4">
                    <div class="col-4">
                        <button type="button" class="btn btn-light text-muted btn-sm w-100 rounded-3 fw-semibold border border-light-subtle" onclick="window.voltarParaMapa()" style="height: 40px;">
                            <i class="bi bi-arrow-left me-1"></i> Voltar
                        </button>
                    </div>
                    <div class="col-8">
                        <button type="button" id="btn-finalizar" class="btn btn-danger btn-sm w-100 rounded-3 fw-semibold shadow-sm" onclick="window.salvarPedidoAPI()" style="height: 40px;">
                            <span id="btn-text">EMITIR PEDIDO</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
