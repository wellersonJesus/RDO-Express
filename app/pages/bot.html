<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold text-secondary">
            <i class="bi bi-cpu text-danger me-2"></i>Bot
        </h4>
    </div>
    <div class="card-body">
        <!-- Formulário de Cadastro -->
        <div class="p-3 mb-4 border rounded bg-light">
            <h6 class="fw-bold mb-3 small text-uppercase text-muted">Cadastrar Novo Monitoramento</h6>
            <div class="row g-2">
                <div class="col-md-5">
                    <input type="text" id="bot-val" class="form-control form-control-sm" placeholder="ID do WhatsApp (ex: 120363...)">
                </div>
                <div class="col-md-3">
                    <select id="bot-tipo" class="form-select form-select-sm">
                        <option value="grupo">Grupo</option>
                        <option value="atendente">Atendente</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-danger btn-sm w-100" onclick="salvarBot()">
                        <i class="bi bi-plus-lg me-1"></i>Salvar
                    </button>
                </div>
            </div>
        </div>

        <!-- Lista de Configurações -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="small text-uppercase" style="width: 20%">Tipo</th>
                        <th class="small text-uppercase">Identificador do WhatsApp</th>
                        <th class="small text-uppercase text-end" style="width: 15%">Ações</th>
                    </tr>
                </thead>
                <tbody id="bot-list">
                    <!-- Dados carregados via API -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        window.salvarBot = async () => {
            const valor = document.getElementById('bot-val').value;
            const tipo = document.getElementById('bot-tipo').value;
            
            if (!valor) {
                alert("Por favor, insira o ID do WhatsApp.");
                return;
            }

            const res = await API.call('addbotconfig', { 
                id: Date.now().toString(), // Gerando um ID simples caso o backend precise
                tipo: tipo, 
                valor: valor 
            });

            if (res.status === 'success') {
                document.getElementById('bot-val').value = '';
                carregarBot();
            }
        };

        window.carregarBot = async () => {
            const listContainer = document.getElementById('bot-list');
            listContainer.innerHTML = '<tr><td colspan="3" class="text-center py-3"><div class="spinner-border spinner-border-sm text-danger"></div></td></tr>';
            
            const data = await API.call('getbotconfig');
            
            if (!data || data.length === 0) {
                listContainer.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-3">Nenhuma configuração encontrada.</td></tr>';
                return;
            }

            listContainer.innerHTML = data.map(i => `
                <tr>
                    <td>
                        <span class="badge ${i.tipo === 'grupo' ? 'bg-info' : 'bg-dark'} text-uppercase" style="font-size: 0.65rem;">
                            ${i.tipo}
                        </span>
                    </td>
                    <td class="fw-medium text-secondary small">${i.valor}</td>
                    <td class="text-end">
                        <button class="btn btn-outline-danger btn-sm border-0" title="Excluir" onclick="excluirBot('${i.id}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        };

        window.excluirBot = async (id) => {
            if (confirm('Deseja remover este monitoramento?')) {
                await API.call('deletebotconfig', { id: id });
                carregarBot();
            }
        };

        carregarBot();
    })();
</script>
