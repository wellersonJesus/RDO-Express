<div class="row g-3 h-100">
    <!-- Topo Sincronizado com Status Master -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3"></i>
                    <div>
                        <h5 id="master-status-title" class="fw-bold mb-0">RDO Express</h5>
                        <small class="opacity-75" style="font-size: 0.75rem;">Entregas Inteligentes</small>
                    </div>
                </div>
                <!-- Status e Sync alinhados à direita -->
                <div class="text-end d-flex align-items-center gap-3">
                    <div class="d-flex flex-column align-items-end">
                        <span id="sync-text" class="fw-bold" style="font-size: 0.75rem;">Verificando status...</span>
                        <small id="status-offline-text" class="text-white-50 d-none" style="font-size: 0.65rem;">SISTEMA OFFLINE</small>
                    </div>
                    <i id="sync-icon" class="bi bi-arrow-repeat fs-4" style="cursor:pointer;" onclick="carregarDados(true)"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar com Accordion (Sem setinhas) -->
    <div class="col-md-4">
        <div class="accordion shadow-sm rounded-4 overflow-hidden bg-white" id="accordionChat" style="height: 580px; overflow-y: auto;">
            <!-- Seção Atendente -->
            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-light fw-bold text-secondary small py-3 shadow-none" type="button" style="pointer-events: none;">
                        ATENDENTE
                    </button>
                </h2>
                <div class="accordion-collapse collapse show">
                    <div id="lista-atendentes-chat" class="list-group list-group-flush"></div>
                </div>
            </div>
            
            <!-- Seção Grupos -->
            <div class="accordion-item border-0 border-top">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-light fw-bold text-secondary small py-3 shadow-none" type="button" style="pointer-events: none;">
                        GRUPOS
                    </button>
                </h2>
                <div class="accordion-collapse collapse show">
                    <div id="lista-grupos-chat" class="list-group list-group-flush"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Área do Chat -->
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 580px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div id="chat-header-avatar">
                        <div class="rounded-circle bg-light d-flex align-items-center justify-content-center border" style="width: 45px; height: 45px;">
                            <i class="bi bi-person text-muted"></i>
                        </div>
                    </div>
                    <div class="ms-3">
                        <h6 id="chat-header-name" class="fw-bold mb-0" style="font-size: 0.9rem;">Selecione uma conversa</h6>
                        <small id="chat-header-status" class="text-muted" style="font-size: 0.7rem;">Offline</small>
                    </div>
                </div>
                
                <!-- Menu de Opções (Três Pontinhos) -->
                <div id="acoes-header" style="display: none;">
                    <div class="dropdown">
                        <button class="btn btn-light rounded-pill shadow-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2" style="border-radius: 15px;">
                            <li><a class="dropdown-item rounded-3 py-2" href="#" onclick="criarPedido()"><i class="bi bi-magic me-2 text-danger"></i> Gerar Pedido</a></li>
                            <li><a class="dropdown-item rounded-3 py-2" href="#" onclick="alert('Relatório Diário em desenvolvimento')"><i class="bi bi-file-earmark-bar-graph me-2 text-primary"></i> Relatório Diário</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto">
                <div class="text-center my-5 text-muted small">Aguardando seleção...</div>
            </div>

            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <button class="btn btn-link text-secondary"><i class="bi bi-emoji-smile"></i></button>
                    <textarea id="msg-input" class="form-control border-0 bg-transparent px-2" rows="1" placeholder="Cole o conteúdo ou digite..." style="resize: none;"></textarea>
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemChat()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Remove a setinha padrão do Bootstrap Accordion */
    .accordion-button::after { display: none !important; }
    .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; opacity: 0.9; }
    .spin { animation: rotation 1s infinite linear; }
    @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(359deg); } }
</style>

<script>
    if (!window.chatState) {
        window.chatState = { jidSelecionado: sessionStorage.getItem('last_jid'), cacheDados: null, lastHeader: null };
    }

    async function carregarDados(force = false) {
        const icon = document.getElementById('sync-icon');
        const masterOn = localStorage.getItem('bot_status') === 'true';
        
        // Atualiza UI baseada no Master
        document.getElementById('master-status-title').innerHTML = masterOn ? 'RDO <span class="fw-light opacity-75">Express sincronizado</span>' : 'RDO <span class="fw-light opacity-75">Express desativado</span>';
        document.getElementById('sync-text').innerText = masterOn ? 'Cache Ativo' : 'Sistema Offline';
        document.getElementById('status-offline-text').classList.toggle('d-none', masterOn);

        if (window.chatState.cacheDados && !force) {
            renderizar(window.chatState.cacheDados.configs, window.chatState.cacheDados.pedidos);
            restaurarHeader();
            return;
        }
        
        if(icon) icon.classList.add('spin');
        try {
            const [configs, pedidos] = await Promise.all([API.call('getbotconfig'), API.call('getchatlive')]);
            window.chatState.cacheDados = { configs, pedidos };
            renderizar(configs, pedidos);
        } finally { if(icon) icon.classList.remove('spin'); }
    }

    function renderizar(configs, pedidos) {
        const masterOn = localStorage.getItem('bot_status') === 'true';
        
        // Render Atendente
        document.getElementById('lista-atendentes-chat').innerHTML = configs
            .filter(c => c.tipo && c.tipo.toLowerCase() !== 'grupo')
            .map(u => {
                const isOnline = masterOn && String(u.status) === 'true';
                const sel = window.chatState.jidSelecionado === u.jid_numero;
                return `<button onclick="selecionarJid('${u.jid_numero}', '${u.username}', '${u.imagem}', ${isOnline})" class="list-group-item list-group-item-action border-0 ${sel ? 'bg-danger text-white' : ''}">
                    <div class="d-flex align-items-center px-2">
                        <img src="${u.imagem}" class="rounded-circle border me-3" width="35" height="35" style="object-fit:cover">
                        <div class="flex-grow-1 text-truncate">
                            <span class="fw-bold d-block small ${sel ? 'text-white' : ''}">${u.username}</span>
                            <small class="${sel ? 'text-white-50' : 'text-muted'}" style="font-size:0.6rem">${u.tipo}</small>
                        </div>
                        <span class="status-dot ${isOnline ? 'bg-success' : 'bg-secondary'}"></span>
                    </div></button>`;
            }).join('');

        // Render Grupos
        document.getElementById('lista-grupos-chat').innerHTML = configs
            .filter(c => c.tipo && c.tipo.toLowerCase() === 'grupo')
            .map(g => {
                const sel = window.chatState.jidSelecionado === g.jid_numero;
                return `<button onclick="selecionarJid('${g.jid_numero}', '${g.username}', '${g.imagem}', true)" class="list-group-item list-group-item-action border-0 ${sel ? 'bg-danger text-white' : ''}">
                    <div class="d-flex align-items-center px-2">
                        <img src="${g.imagem}" class="rounded-circle border me-3" width="35" height="35" style="object-fit:cover">
                        <span class="fw-bold small ${sel ? 'text-white' : ''}">${g.username}</span>
                    </div></button>`;
            }).join('');

        if (window.chatState.jidSelecionado) {
            document.getElementById('acoes-header').style.display = 'block';
            atualizarMensagens(pedidos);
        }
    }

    function restaurarHeader() {
        const h = window.chatState.lastHeader;
        if(!h) return;
        document.getElementById('chat-header-name').innerText = h.nome;
        document.getElementById('chat-header-status').innerText = h.online ? 'Online' : 'Offline';
        document.getElementById('chat-header-avatar').innerHTML = `<img src="${h.imagem}" class="rounded-circle border" width="40" height="40" style="object-fit:cover">`;
        document.getElementById('acoes-header').style.display = 'block';
    }

    window.selecionarJid = (jid, nome, imagem, online) => {
        window.chatState.jidSelecionado = jid;
        window.chatState.lastHeader = { nome, imagem, online };
        sessionStorage.setItem('last_jid', jid);
        restaurarHeader();
        renderizar(window.chatState.cacheDados.configs, window.chatState.cacheDados.pedidos);
    };

    window.criarPedido = async () => {
        const content = document.getElementById('msg-input').value;
        if(!content) return alert("Cole o texto do pedido antes!");
        await API.call('createorder', { content, jid: window.chatState.jidSelecionado });
        alert("Pedido Gerado!");
        document.getElementById('msg-input').value = '';
    };

    carregarDados();
</script>
