<div class="row g-3">
    <div class="col-12">
        <div id="global-error-fin" class="alert alert-danger d-none rounded-4 shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="global-error-fin-msg"></span>
        </div>
    </div>
    <div class="col-12">
        <div class="row g-2" id="cards-resumo-fin">
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4 h-100 fin-card-receita">
                    <div class="card-body p-3 d-flex align-items-center gap-3">
                        <div class="fin-card-icon-wrap fin-card-icon-receita">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>
                        <div>
                            <div class="fin-card-label">RECEITAS</div>
                            <div id="total-entradas" class="fw-bold fin-card-valor" style="color:#198754;">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4 h-100 fin-card-despesa">
                    <div class="card-body p-3 d-flex align-items-center gap-3">
                        <div class="fin-card-icon-wrap fin-card-icon-despesa">
                            <i class="bi bi-graph-down-arrow"></i>
                        </div>
                        <div>
                            <div class="fin-card-label">DESPESAS</div>
                            <div id="total-saidas" class="fw-bold fin-card-valor" style="color:#dc3545;">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4 h-100 fin-card-saldo">
                    <div class="card-body p-3 d-flex align-items-center gap-3">
                        <div class="fin-card-icon-wrap fin-card-icon-saldo">
                            <i class="bi bi-wallet2"></i>
                        </div>
                        <div>
                            <div class="fin-card-label">SALDO</div>
                            <div id="total-saldo" class="fw-bold fin-card-valor">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4 h-100 fin-card-registros">
                    <div class="card-body p-3 d-flex align-items-center gap-3">
                        <div class="fin-card-icon-wrap fin-card-icon-registros">
                            <i class="bi bi-journal-text"></i>
                        </div>
                        <div>
                            <div class="fin-card-label">REGISTROS</div>
                            <div id="total-registros" class="fw-bold fin-card-valor" style="color:#6f42c1;">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body pb-0">
                <div class="d-flex align-items-center justify-content-end flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <div class="dropdown">
                            <button class="btn btn-light btn-sm rounded-pill px-3 dropdown-toggle fin-filter-btn" type="button" id="dropdownFiltroFin" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-funnel me-1"></i> <span id="filtro-label-fin">Todos</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 rounded-3 fin-dropdown-menu" aria-labelledby="dropdownFiltroFin">
                                <li><a class="dropdown-item fin-dropdown-item active" href="#" data-tab="todos"><i class="bi bi-grid me-2"></i>Todos</a></li>
                                <li><a class="dropdown-item fin-dropdown-item" href="#" data-tab="entrada"><i class="bi bi-arrow-down-circle me-2 text-success"></i>Receitas</a></li>
                                <li><a class="dropdown-item fin-dropdown-item" href="#" data-tab="saida"><i class="bi bi-arrow-up-circle me-2 text-danger"></i>Despesas</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item fin-dropdown-item" href="#" data-tab="extrato"><i class="bi bi-list-ul me-2 text-primary"></i>Extrato</a></li>
                            </ul>
                        </div>
                        <input type="month" id="filtro-mes-fin" class="form-control form-control-sm rounded-pill input-filtro-fin" title="Filtrar por m&ecirc;s" style="width:150px;">
                        <button id="btn-novo-fin" class="btn btn-danger btn-sm rounded-pill px-3" title="Novo lan&ccedil;amento">
                            <i class="bi bi-plus-lg"></i> Novo
                        </button>
                        <button id="btn-toggle-valores" class="btn-toggle-fin" title="Mostrar/Ocultar Valores">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                        <button class="btn-sync-fin" id="btn-refresh-fin" title="Atualizar tudo">
                            <i id="sync-icon-fin" class="bi bi-arrow-repeat"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="table-responsive p-3">
                <table class="table table-hover align-middle border-0 mb-0" id="tabela-fin">
                    <thead id="tabela-fin-head" class="text-uppercase tabela-fin-head">
                        <tr></tr>
                    </thead>
                    <tbody id="tabela-fin-body">
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
                                <div class="mt-2 fin-loading-text">Buscando dados<span class="fin-dots"></span></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center px-3 pb-3">
                <small id="fin-pag-info" class="text-muted" style="font-size:0.72rem;">0 registros</small>
                <div class="btn-group shadow-sm" id="fin-pag-controls">
                    <button class="btn btn-light btn-sm" id="fin-pag-prev"><i class="bi bi-chevron-left"></i></button>
                    <button class="btn btn-light btn-sm" id="fin-pag-label" disabled style="min-width:100px;font-size:0.75rem;">P&aacute;g 1</button>
                    <button class="btn btn-light btn-sm" id="fin-pag-next"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modal-fin-view" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow-lg modal-fin-content" style="border-radius:14px;">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h6 class="fw-bold mb-0" style="font-size:.88rem;"><i class="bi bi-receipt text-danger me-2"></i>Detalhes do Lan&ccedil;amento</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-3 pb-4" id="modal-fin-view-body"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalFormFin" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow-lg" style="border-radius:14px;">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h6 id="form-fin-titulo" class="fw-bold mb-0" style="font-size:.88rem;"><i class="bi bi-plus-circle text-danger me-2"></i>Novo Lan&ccedil;amento</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-3 pb-4">
                <div id="form-fin-erro" class="alert alert-danger d-none py-2 px-3 rounded-3" style="font-size:.74rem;"></div>
                <input type="hidden" id="fin-id">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Data</label>
                        <input type="date" id="fin-data" class="form-control form-control-sm rounded-3">
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Tipo</label>
                        <select id="fin-tipo" class="form-select form-select-sm rounded-3">
                            <option value="">Selecione...</option>
                            <option value="entrada">Receita</option>
                            <option value="saida">Despesa</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Categoria</label>
                        <input type="text" id="fin-categoria" class="form-control form-control-sm rounded-3" placeholder="Ex: Corrida, Combust&iacute;vel...">
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Valor (R$)</label>
                        <input type="text" id="fin-valor" class="form-control form-control-sm rounded-3" placeholder="0,00" inputmode="numeric">
                    </div>
                    <div class="col-12">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Descri&ccedil;&atilde;o</label>
                        <input type="text" id="fin-descricao" class="form-control form-control-sm rounded-3" placeholder="Descri&ccedil;&atilde;o do lan&ccedil;amento">
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Situa&ccedil;&atilde;o</label>
                        <select id="fin-status" class="form-select form-select-sm rounded-3">
                            <option value="pendente">Pendente</option>
                            <option value="pago">Pago</option>
                            <option value="recebido">Recebido</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Forma Pagto</label>
                        <select id="fin-pagamento" class="form-select form-select-sm rounded-3">
                            <option value="">Selecione...</option>
                            <option value="pix">PIX</option>
                            <option value="dinheiro">Dinheiro</option>
                            <option value="cartao_credito">Cart&atilde;o Cr&eacute;dito</option>
                            <option value="cartao_debito">Cart&atilde;o D&eacute;bito</option>
                            <option value="boleto">Boleto</option>
                            <option value="transferencia">Transfer&ecirc;ncia</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label" style="font-size:.72rem;font-weight:600;">Observa&ccedil;&atilde;o</label>
                        <textarea id="fin-observacao" class="form-control form-control-sm rounded-3" rows="2" placeholder="Opcional..."></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal" style="font-size:.74rem;">Cancelar</button>
                    <button type="button" class="btn btn-danger btn-sm rounded-pill px-4" id="btn-salvar-form-fin" style="font-size:.74rem;">
                        <span id="spinner-salvar-fin" class="spinner-border spinner-border-sm me-1 d-none"></span>
                        <span id="txt-salvar-fin">Salvar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
