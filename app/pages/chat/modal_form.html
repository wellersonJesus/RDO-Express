<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-sm rounded-4">
            
            <div class="modal-header border-0 pb-0 px-4 pt-4 flex-column align-items-start">
                <h5 class="modal-title fw-bold">
                    <span class="text-danger">RDO</span> <span class="text-dark">Express</span>
                </h5>
                <div class="text-muted small mb-2">
                    Checkout de pedido para: <span id="form-nome-solicitante" class="fw-bold text-dark"></span>
                </div>
            </div>
            
            <div class="modal-body p-4 pt-2">
                <form id="form-checkout">
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="small text-muted fw-bold">Solicitante</label>
                            <input type="text" id="p-solicitante" class="form-control form-control-sm rounded-pill border-secondary" readonly>
                        </div>
                        <div class="col-6">
                            <label class="small text-muted fw-bold">Contato</label>
                            <input type="text" id="p-contato" class="form-control form-control-sm rounded-pill border-secondary">
                        </div>
                    </div>

                    <div class="row g-2 mt-2">
                        <div class="col-4">
                            <label class="small text-muted fw-bold">Horário</label>
                            <input type="text" id="p-horario" class="form-control form-control-sm rounded-pill border-secondary">
                        </div>
                        <div class="col-4">
                            <label class="small text-muted fw-bold">KM</label>
                            <input type="number" id="p-distancia" class="form-control form-control-sm rounded-pill border-secondary" oninput="calcularTudo()" placeholder="0" step="any">
                        </div>
                        <div class="col-4">
                            <label class="small text-muted fw-bold">Tempo</label>
                            <input type="text" id="p-tempo" class="form-control form-control-sm rounded-pill border-secondary" placeholder="30min">
                        </div>
                    </div>

                    <div class="row g-2 mt-2">
                        <div class="col-4">
                            <label class="small text-muted fw-bold">Prioridade</label>
                            <select id="p-prioridade" class="form-select form-select-sm rounded-pill border-secondary" onchange="calcularTudo()">
                                <option value="0">Normal</option>
                                <option value="5">Agendado (+5)</option>
                                <option value="8">Urgente (+8)</option> </select>
                        </div>
                        <div class="col-4">
                            <label class="small text-muted fw-bold">Retorno</label>
                            <select id="p-retorno" class="form-select form-select-sm rounded-pill border-secondary" onchange="calcularTudo()">
                                <option value="0">NÃO (0%)</option>
                                <option value="0.6">SIM (60%)</option>
                            </select>
                        </div>
                        <div class="col-4">
                            <label class="small text-muted fw-bold">Dinâmica</label>
                            <select id="p-dinamica" class="form-select form-select-sm rounded-pill border-secondary" onchange="calcularTudo()">
                                <option value="0">Tx 01 (0)</option>
                                <option value="5">Tx 02 (5)</option>
                                <option value="15">Tx 03 (15)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-2 mt-2">
                        <div class="col-6">
                            <label class="small text-muted fw-bold">Valor KM</label>
                            <select id="p-valor-km" class="form-select form-select-sm rounded-pill border-secondary" onchange="calcularTudo()">
                                <option value="1.10" selected>R$ 1,10</option> <option value="2.02">R$ 2,02</option>
                                <option value="2.20">R$ 2,20</option>
                                <option value="3.00">R$ 3,00</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="small text-muted fw-bold">Mercadoria</label>
                            <select id="p-mercadoria" class="form-select form-select-sm rounded-pill border-secondary">
                                <option value="Sacola">Sacola</option>
                                <option value="Coleta">Coleta</option>
                                <option value="Bolsa">Bolsa</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-2">
                        <label class="small text-muted fw-bold">Rotas (De / Para)</label>
                        <textarea id="p-rotas" class="form-control form-control-sm rounded-3 border-secondary" rows="3" placeholder="Insira o itinerário completo aqui..."></textarea>
                    </div>
                    <div class="mt-2">
                        <label class="small text-muted fw-bold">Observação</label>
                        <textarea id="p-obs" class="form-control form-control-sm rounded-3 border-secondary" rows="2"></textarea>
                    </div>
                </form>

                <div class="mt-3 p-2 bg-light rounded-3 text-center border border-secondary">
                    <small class="text-muted">Valor Final:</small>
                    <div class="fs-4 fw-bold text-danger" id="view-valor-final">R$ 0,00</div>
                </div>

                <div class="row g-2 mt-3">
                    <div class="col-5">
                        <button type="button" class="btn btn-outline-danger btn-sm w-100 rounded-pill fw-bold" onclick="window.voltarParaMapa()">Voltar</button>
                    </div>
                    <div class="col-7">
                        <button type="button" id="btn-finalizar" class="btn btn-danger btn-sm w-100 rounded-pill fw-bold" onclick="salvarPedidoAPI()">
                            <span id="btn-text">FINALIZAR PEDIDO</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
