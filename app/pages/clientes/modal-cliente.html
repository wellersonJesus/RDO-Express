<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Cliente</h5>

                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="small fw-bold text-muted">Nome</label>
                        <input type="text" id="c-username" class="form-control" placeholder="Nome do Cliente">
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold text-muted">Responsável</label>
                        <input type="text" id="c-responsavel" class="form-control" placeholder="Nome do Responsável">
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="small fw-bold text-muted">Contato</label>
                        <input type="text" id="c-contato" class="form-control" placeholder="(00) 90000-0000">
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold text-muted">CPF/CNPJ</label>
                        <input type="text" id="c-cnpj" class="form-control" placeholder="00.000.000/0000-00">
                    </div>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-4">
                        <label class="small fw-bold text-muted">E-mail</label>
                        <input type="email" id="c-email" class="form-control" placeholder="email@exemplo.com">
                    </div>
                    <div class="col-4">
                        <label class="small fw-bold text-muted">Endereço</label>
                        <input type="text" id="c-endereco" class="form-control" placeholder="Rua, Número">
                    </div>
                    <div class="col-4">
                        <label class="small fw-bold text-muted">Bairro</label>
                        <input type="text" id="c-bairro" class="form-control" placeholder="Bairro">
                    </div>
                </div>

                <input type="hidden" id="c-status" value="TRUE">

                <button class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalCliente')">
                    Salvar Cliente
                </button>
            </div>
        </div>
    </div>
</div>
