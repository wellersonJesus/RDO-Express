<div class="modal fade" id="modalModelo" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Preencher Solicitação</h5>
                <input type="text" id="u-username" class="form-control mb-2 rounded-pill" placeholder="Digite o nome completo">
                <input type="password" id="u-password" class="form-control mb-2 rounded-pill" placeholder="Digite sua senha...">
                <input type="text" id="u-imagem" class="form-control mb-3 rounded-pill" placeholder="URL da imagem">
                
                <label class="small text-muted ms-2 mb-1">Selecione o(s) tipo(s) (CTRL para múltiplos):</label>
                <select id="u-tipo" class="form-select mb-3" multiple style="height: 120px;">
                    <option value="Atendente">Atendente</option>
                    <option value="Grupo">Grupo</option>
                    <option value="Motoboy">Motoboy</option>
                    <option value="TI">TI</option>
                    <option value="SRE Architect">SRE Architect</option>
                    <option value="Logistica">Logistica</option>
                    <option value="Financeiro">Financeiro</option>
                    <option value="Comercial">Comercial</option>
                </select>
                
                <button id="btn-save-modal" class="btn btn-danger w-100 rounded-pill fw-bold" onclick="window.salvarNovo()">
                    Enviar Solicitação
                </button>
            </div>
        </div>
    </div>
</div>
