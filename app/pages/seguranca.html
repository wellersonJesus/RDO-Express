<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3">
        <h4 class="mb-0 fw-bold text-secondary"><i class="bi bi-robot text-danger me-2"></i>Configuração do Bot Monitor</h4>
    </div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="small fw-bold">ID do Grupo ou Atendente</label>
                <div class="input-group">
                    <input type="text" id="bot-val" class="form-control" placeholder="ID do WhatsApp">
                    <select id="bot-tipo" class="form-select w-25">
                        <option value="grupo">Grupo</option>
                        <option value="atendente">Atendente</option>
                    </select>
                    <button class="btn btn-dark" onclick="salvarBot()">Salvar</button>
                </div>
            </div>
        </div>
        <hr>
        <table class="table table-sm mt-3">
            <thead><tr><th>Tipo</th><th>Identificador</th><th>Ação</th></tr></thead>
            <tbody id="bot-list"></tbody>
        </table>
    </div>
</div>
<script>
    async function salvarBot() {
        const valor = document.getElementById('bot-val').value;
        const tipo = document.getElementById('bot-tipo').value;
        await API.call('addbotconfig', { tipo, valor });
        carregarBot();
    }
    async function carregarBot() {
        const data = await API.call('getbotconfig');
        document.getElementById('bot-list').innerHTML = data.map(i => `
            <tr><td>${i.tipo}</td><td>${i.valor}</td><td><button class="btn btn-sm text-danger" onclick="API.call('deletebotconfig',{id:'${i.id}'}).then(carregarBot)">Excluir</button></td></tr>
        `).join('');
    }
    carregarBot();
</script>
