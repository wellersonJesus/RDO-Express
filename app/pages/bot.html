<div class="card shadow-sm border-0 bg-white">
    <div class="card-header bg-white py-3 border-0">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold text-dark mb-1 d-flex align-items-center">
                    <i class="bi bi-gear-wide-connected text-danger me-2"></i> Bot RDO Express
                    <button class="btn btn-sm ms-2 rounded-pill shadow-sm d-flex align-items-center gap-1" 
                            style="background: linear-gradient(45deg, #17a2b8, #007bff); color: white; font-size: 0.65rem; border: none; padding: 2px 10px;"
                            data-bs-toggle="modal" data-bs-target="#modalInfoManual">
                        <i class="bi bi-lightbulb-fill"></i> AJUDA RÁPIDA
                    </button>
                </h4>
                <div class="d-flex align-items-center gap-2">
                    <p class="text-muted mb-0" style="font-size: 0.75rem; line-height: 1.2;">
                        Gerencie conexões e monitoramento de grupos.
                    </p>
                    <div id="status-loop" class="d-flex align-items-center gap-1 fw-bold" style="font-size: 0.7rem;">
                        </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button id="btn-status-bot" class="btn btn-sm px-2 fw-bold shadow-sm" style="font-size: 0.7rem;" onclick="toggleStatusBot()"></button>
                <button class="btn btn-dark btn-sm px-2 shadow-sm" style="font-size: 0.7rem;" data-bs-toggle="modal" data-bs-target="#modalNovoGrupo">
                    <i class="bi bi-plus-lg me-1"></i> CADASTRAR
                </button>
            </div>
        </div>
    </div>
    
    <div class="table-responsive px-3 pb-3">
        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
            <thead class="table-light">
                <tr class="text-secondary" style="font-size: 0.75rem;">
                    <th class="border-0">STATUS</th>
                    <th class="border-0">AVATAR</th>
                    <th class="border-0">NOME</th>
                    <th class="border-0">JID/NÚMERO</th>
                    <th class="border-0 text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="bot-list" class="border-top-0"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalInfoManual" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-info text-white border-0">
                <h6 class="modal-title fw-bold"><i class="bi bi-info-circle me-2"></i>Como Configurar</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3 d-flex align-items-start gap-3">
                    <div class="bg-primary text-white rounded-circle p-2 px-3 fw-bold">1</div>
                    <div>
                        <h6 class="fw-bold mb-0">Atendentes</h6>
                        <p class="small text-muted">Use o formato internacional: 55 + DDD + Numero. Ex: 5531988887777</p>
                    </div>
                </div>
                <div class="d-flex align-items-start gap-3">
                    <div class="bg-danger text-white rounded-circle p-2 px-3 fw-bold">2</div>
                    <div>
                        <h6 class="fw-bold mb-0">Grupos</h6>
                        <p class="small text-muted">Cole o ID (JID) que termina em @g.us ou o link de convite.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        let botAtivo = localStorage.getItem('bot_status') === 'true';
        
        window.toggleStatusBot = () => {
            botAtivo = !botAtivo;
            localStorage.setItem('bot_status', botAtivo);
            renderBotUI();
        };

        function renderBotUI() {
            const btn = document.getElementById('btn-status-bot');
            const loop = document.getElementById('status-loop');
            
            if(botAtivo) {
                btn.className = "btn btn-danger btn-sm px-2 shadow-sm";
                btn.innerHTML = '<i class="bi bi-broadcast"></i> ATIVADO';
                loop.innerHTML = '<i class="bi bi-arrow-repeat spin text-success"></i> <span class="text-success">CONECTADO</span>';
            } else {
                btn.className = "btn btn-outline-secondary btn-sm px-2 shadow-sm";
                btn.innerHTML = '<i class="bi bi-power"></i> DESATIVADO';
                loop.innerHTML = '<i class="bi bi-arrow-repeat text-danger"></i> <span class="text-danger">OFFLINE</span>';
            }
        }

        window.carregarBot = async () => {
            const data = await API.call('getbotconfig') || [];
            document.getElementById('bot-list').innerHTML = data.map(i => `
                <tr class="${!i.ativo ? 'opacity-50' : ''}">
                    <td><div class="form-check form-switch"><input class="form-check-input" type="checkbox" ${i.ativo ? 'checked' : ''} onchange="API.call('updatebotstatus',{id:'${i.id}',ativo:this.checked}).then(carregarBot)"></div></td>
                    <td><img src="${i.logo}" class="rounded-circle border" width="30" height="30" style="object-fit:cover"></td>
                    <td class="fw-bold text-dark">${i.nome}</td>
                    <td class="text-muted small">${i.valor}</td>
                    <td class="text-center">
                        <button class="btn btn-sm text-danger" onclick="API.call('deletebotconfig',{id:'${i.id}'}).then(carregarBot)"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        };

        renderBotUI();
        carregarBot();
    })();
</script>

<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 2s linear infinite; }
</style>
