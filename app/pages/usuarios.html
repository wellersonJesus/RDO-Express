<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold text-secondary d-flex align-items-center">
            <i class="bi bi-person-badge text-danger me-3 fs-3"></i>Gerenciamento de Usuários
        </h4>
        <button class="btn btn-dark btn-sm px-3 shadow-sm"><i class="bi bi-plus-lg me-1"></i> Novo Usuário</button>
    </div>
    <div class="table-responsive px-3">
        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
            <thead class="table-light">
                <tr>
                    <th class="py-3 text-secondary">Username</th>
                    <th class="py-3 text-secondary">Cargo</th>
                    <th class="py-3 text-secondary">Senha</th>
                    <th class="text-center py-3 text-secondary">Ações</th>
                </tr>
            </thead>
            <tbody id="usuarios-body">
                <tr><td colspan="4" class="text-center py-4 text-muted">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white py-3 d-flex justify-content-between align-items-center">
        <div id="pagination-info-users" class="small text-muted" style="font-size: 0.75rem;"></div>
        <nav>
            <ul class="pagination pagination-sm mb-0" id="pagination-controls-users"></ul>
        </nav>
    </div>
</div>

<script>
    let usersData = [];
    let currentUsersPage = 1;
    const usersLimit = 20;

    window.carregarUsuarios = async () => {
        const data = await API.call('getusuarios');
        
        if (!data || data.status === 'error') {
            return document.getElementById('usuarios-body').innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">Erro ao carregar dados.</td></tr>`;
        }

        usersData = Array.isArray(data) ? data : [];
        renderizarPaginaUsuarios(1);
    };

    function renderizarPaginaUsuarios(page) {
        currentUsersPage = page;
        const start = (page - 1) * usersLimit;
        const end = start + usersLimit;
        const paginatedItems = usersData.slice(start, end);
        const tbody = document.getElementById('usuarios-body');

        if (paginatedItems.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">Nenhum registro encontrado.</td></tr>`;
            return;
        }

        tbody.innerHTML = paginatedItems.map(u => `
            <tr>
                <td class="fw-medium text-dark">${u.username || u.nome || '-'}</td>
                <td><span class="text-secondary border-bottom border-secondary border-opacity-25">${u.cargo || '-'}</span></td>
                <td class="text-muted" style="letter-spacing: 2px;">***************</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-link text-secondary p-1" title="Visualizar"><i class="bi bi-search"></i></button>
                    <button class="btn btn-sm btn-link text-secondary p-1" title="Editar"><i class="bi bi-pencil-square"></i></button>
                    <button class="btn btn-sm btn-link text-secondary p-1" title="Remover"><i class="bi bi-trash3"></i></button>
                </td>
            </tr>
        `).join('');

        renderPaginationControlsUsers();
    }

    function renderPaginationControlsUsers() {
        const totalPages = Math.ceil(usersData.length / usersLimit);
        const controls = document.getElementById('pagination-controls-users');
        
        let html = `<li class="page-item ${currentUsersPage === 1 ? 'disabled' : ''}">
            <a class="page-link border-0 text-secondary" href="#" onclick="event.preventDefault(); renderizarPaginaUsuarios(${currentUsersPage - 1})">Anterior</a>
        </li>`;
        
        for(let i = 1; i <= totalPages; i++) {
            if(i === currentUsersPage || i === 1 || i === totalPages || (i >= currentUsersPage - 2 && i <= currentUsersPage + 2)) {
                html += `<li class="page-item ${i === currentUsersPage ? 'active' : ''}">
                    <a class="page-link border-0 rounded-circle mx-1 ${i === currentUsersPage ? 'bg-secondary text-white' : 'text-secondary'}" href="#" onclick="event.preventDefault(); renderizarPaginaUsuarios(${i})">${i}</a>
                </li>`;
            }
        }
        
        html += `<li class="page-item ${currentUsersPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
            <a class="page-link border-0 text-secondary" href="#" onclick="event.preventDefault(); renderizarPaginaUsuarios(${currentUsersPage + 1})">Próximo</a>
        </li>`;
        
        controls.innerHTML = html;
        document.getElementById('pagination-info-users').innerText = `Total: ${usersData.length} usuários`;
    }

    // Inicializa a carga ao entrar na página
    carregarUsuarios();
</script>
