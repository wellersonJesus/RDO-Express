<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Usuário</h5>
                <div class="row g-2 mb-2">
                    <div class="col-6"><label class="small fw-bold text-muted">Nome</label><input type="text" id="u-username" class="form-control" placeholder="Nome de usuário"></div>
                    <div class="col-6"><label class="small fw-bold text-muted">Cargo</label><select id="u-tipo" class="form-select"><option value="">Selecione...</option><option value="Atendente">Atendente</option><option value="TI">TI</option><option value="Financeiro">Financeiro</option></select></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="small fw-bold text-muted">URL Imagem</label><input type="text" id="u-imagem" class="form-control" placeholder="https://imagem.com/foto.jpg"></div>
                    <div class="col-6"><label class="small fw-bold text-muted">Senha</label><input type="password" id="u-password" class="form-control" placeholder="******"></div>
                </div>
                <button class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo('modalUsuario')">Salvar Usuário</button>
            </div>
        </div>
    </div>
</div>
