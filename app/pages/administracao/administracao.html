<div class="container-fluid p-0">
    <div class="card border-0 shadow-sm bg-white rounded-4 mb-3">
        <div class="card-body p-3">
            <h5 class="fw-bold mb-3"><i class="bi bi-shield-lock text-danger"></i> Administração</h5>
            <ul id="adminTabs">
                <li><button class="btn-tab-custom active" data-origem="clientes"
                        onclick="window.carregarAdmin('clientes')">Clientes</button></li>
                <li><button class="btn-tab-custom" data-origem="colaboradores"
                        onclick="window.carregarAdmin('colaboradores')">Colaboradores</button></li>
            </ul>
        </div>
    </div>

    <div class="card border-0 shadow-sm bg-white rounded-4">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center p-3">
            <div class="d-flex align-items-center gap-3">
                <small class="text-muted text-uppercase fw-bold" id="titulo-aba">Gerenciando: Clientes</small>
                <button class="btn btn-outline-danger btn-sm rounded-circle" style="width:28px; height:28px; padding:0;"
                    onclick="window.carregarAdmin(window.adminState.origemAtual)">
                    <i id="sync-icon-admin" class="bi bi-arrow-repeat"></i>
                </button>
            </div>
            <button class="btn btn-danger btn-sm rounded-pill px-3" id="btn-novo-admin"
                onclick="window.abrirModalCadastro()">
                <i class="bi bi-plus-lg"></i> Novo Registro
            </button>
        </div>
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle border-0">
                <thead class="text-uppercase" style="font-size: 0.65rem; color: #999;">
                    <tr>
                        <th class="ps-3">Avatar</th>
                        <th>Nome</th>
                        <th>Status</th>
                        <th class="text-end pe-3">Ações</th>
                    </tr>
                </thead>
                <tbody id="admin-list"></tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-center pb-3">
            <div class="btn-group shadow-sm">
                <button class="btn btn-light" onclick="window.mudarPaginaAdmin(-1)"><i
                        class="bi bi-chevron-left"></i></button>
                <button class="btn btn-light" id="info-paginacao-admin" disabled style="min-width: 100px;">Pág
                    1</button>
                <button class="btn btn-light" onclick="window.mudarPaginaAdmin(1)"><i
                        class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>
