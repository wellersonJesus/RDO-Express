<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">RDO <span class="text-danger">Express</span> - Chat</h5>
                        <small class="text-muted d-block small">Painel de Atendimento Profissional</small>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span id="sync-text" class="text-secondary small">Serviço Ativo</span>
                    <i id="sync-icon" class="bi bi-arrow-repeat fs-4 text-danger" style="cursor:pointer;" onclick="carregarDados()"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="shadow-sm rounded-4 overflow-hidden bg-white border" style="height: 600px; display: flex; flex-direction: column;">
            <div class="bg-light p-2 small fw-bold text-secondary text-uppercase border-bottom">Atendentes</div>
            <div id="lista-atendentes-chat" class="list-group list-group-flush border-bottom" style="overflow-y: auto;"></div>
            
            <div class="bg-light p-2 small fw-bold text-secondary text-uppercase border-bottom">Grupos / Outros</div>
            <div id="lista-grupos-chat" class="list-group list-group-flush" style="overflow-y: auto;"></div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 600px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div id="chat-header-avatar"></div>
                    <div class="ms-3">
                        <h6 id="chat-header-name" class="fw-bold mb-0 text-dark">Selecione um contato</h6>
                    </div>
                </div>
                <div class="dropdown" id="menu-opcoes-chat" style="display: none;">
                    <button class="btn border-0 p-1" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical fs-5 text-secondary"></i></button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3">
                        <li><a class="dropdown-item py-2 small fw-bold" href="#" onclick="abrirModalModelo()"><i class="bi bi-file-earmark-text me-2"></i> Modelo de Solicitação</a></li>
                    </ul>
                </div>
            </div>
            
            <div id="chat-messages-container" class="flex-grow-1 p-4 overflow-auto d-flex flex-column gap-2" style="background-color: #f0f2f5;"></div>
            
            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <textarea id="msg-input" class="form-control border-0 bg-transparent px-3" rows="1" placeholder="Cole a solicitação aqui..." style="resize: none;"></textarea>
                    <button id="btn-enviar-manual" class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemManual()"><i class="bi bi-send-fill"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>
