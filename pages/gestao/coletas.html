<div class="animate-in">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-bold m-0 text-dark">Gestão de Coletas</h5>
            <p class="text-muted small m-0" id="col-info-count">Sincronizando...</p>
        </div>
        <button class="btn btn-danger btn-sm rounded-pill px-3 fw-bold" onclick="novaColeta()">
            <i class="bi bi-plus-lg me-1"></i> NOVO
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr class="text-muted small text-uppercase" style="font-size: 0.7rem;">
                        <th class="px-3 py-2">Cliente</th>
                        <th class="px-3 py-2">Solicitação</th>
                        <th class="px-3 py-2">Serviço</th>
                        <th class="text-end px-3 py-2">Ações</th>
                    </tr>
                </thead>
                <tbody id="col-table-body" class="border-top-0" style="font-size: 0.82rem;">
                    <tr><td colspan="4" class="text-center p-4 text-muted">Carregando coletas...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
window.modCol = {
    init: async function() {
        const tbody = document.getElementById('col-table-body');
        try {
            const resp = await fetch(`${API_URL}?sheet=dados`);
            const data = await resp.json();
            
            document.getElementById('col-info-count').innerText = `${data.length} registros`;
            
            tbody.innerHTML = data.slice(0, 20).map(row => `
                <tr>
                    <td class="px-3 py-1 fw-bold text-dark">${row.clientes || row.cliente || '-'}</td>
                    <td class="px-3 py-1 text-muted">${row.solicitacao || '-'}</td>
                    <td class="px-3 py-1">
                        <span class="badge bg-primary bg-opacity-10 text-primary border-0" style="font-size: 0.65rem;">
                            ${(row.tipo_do_servico || 'COLETA').toUpperCase()}
                        </span>
                    </td>
                    <td class="text-end px-3 py-1">
                        <button class="btn btn-link btn-sm text-secondary p-0 mx-1" onclick="acao('edit', ${row.row_index})"><i class="bi bi-pencil-square"></i></button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center p-4 text-danger">Erro de conexão.</td></tr>';
        }
    }
};
modCol.init();
</script>
