<div class="d-flex justify-content-between mb-3 align-items-center">
    <h5>Cadastros</h5>
    <button class="btn btn-primary btn-sm" onclick="alert('Funcionalidade de Novo Usuário')">
        <i class="bi bi-plus-lg"></i> Novo Usuário
    </button>
</div>

<div class="table-responsive">
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>Nome</th>
                <th class="text-end">Ações</th>
            </tr>
        </thead>
        <tbody id="user-list-body">
            <tr><td colspan="2" class="text-center">Carregando usuários...</td></tr>
        </tbody>
    </table>
</div>

<script>
(function() {
    // Mock de dados
    const mockUsers = [{nome: "Wellerson"}, {nome: "Rodrigo Pereira"}];
    const body = document.getElementById('user-list-body');
    
    function renderUsers(users) {
        body.innerHTML = users.map(user => `
            <tr>
                <td>${user.nome}</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-warning me-2"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    setTimeout(() => renderUsers(mockUsers), 300);
})();
</script>
