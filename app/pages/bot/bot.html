<div class="container-fluid p-0">
    <div class="col-12 mb-3">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-gear-wide-connected" style="font-size: 1.5rem; color: #FF0000;"></i>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express</h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Gestão de acesso</small>
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <select id="filtro-tipo" class="form-select form-select-sm" style="width: 150px;" onchange="window.reloadBot()">
                        <option value="TODOS">Toda a lista</option>
                        <option value="atendente">Atendente</option>
                        <option value="grupo">Grupo</option>
                        <option value="SRE Architect">SRE Architect</option>
                        <option value="financeiro">Financeiro</option>
                    </select>
                    <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="window.abrirModalCadastro()"><i class="bi bi-plus-lg"></i> Novo</button>
                    <button id="btn-status-bot" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="window.toggleMaster()">MASTER OFF</button>
                    <button class="btn btn-outline-danger btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width:32px; height:32px;" onclick="window.initBot()"><i id="sync-icon-bot" class="bi bi-arrow-repeat"></i></button>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="table-responsive p-3">
                <table class="table table-hover align-middle border-0">
                    <thead class="text-uppercase" style="font-size: 0.65rem; color: #999; letter-spacing: 1px;">
                        <tr><th class="ps-3">Status</th><th>Avatar</th><th>Nome</th><th>Tipo</th><th class="text-end pe-3">Ações</th></tr>
                    </thead>
                    <tbody id="bot-list"></tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-center pb-3">
                <nav><ul class="pagination pagination-sm" id="bot-pagination"></ul></nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCadastroBot" tabindex="-1"><div class="modal-dialog"><div class="modal-content rounded-4 border-0 shadow"><div class="modal-header border-0"><h5 class="modal-title" id="modal-title">Novo Cadastro</h5></div><div class="modal-body"><input type="hidden" id="edit-id"><input type="text" class="form-control mb-2" id="input-username" placeholder="Username"><input type="text" class="form-control mb-2" id="input-jid" placeholder="JID Numero"><input type="text" class="form-control mb-2" id="input-imagem" placeholder="URL Imagem"><select class="form-select mb-2" id="input-tipo"><option value="atendente">Atendente</option><option value="grupo">Grupo</option><option value="SRE Architect">SRE Architect</option><option value="financeiro">Financeiro</option></select></div><div class="modal-footer border-0"><button class="btn btn-light" data-bs-dismiss="modal">Fechar</button><button class="btn btn-danger" onclick="window.salvarBot()">Salvar</button></div></div></div></div>

<div class="modal fade" id="modalExclusao" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body text-center p-4"><h5>Excluir este bot?</h5><p>Esta ação não pode ser desfeita.</p><button class="btn btn-light me-2" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-danger" onclick="window.confirmarExclusao()">Confirmar</button></div></div></div></div>
