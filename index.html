<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="landing-page">
        <div class="card-gms">
            <h3 class="fw-bold text-center mb-4"><span class="text-danger">RDO</span> EXPRESS</h3>
            <form id="login-form">
                <input type="text" id="user" class="form-control mb-3 py-2" placeholder="Usuário">
                <input type="password" id="pass" class="form-control mb-4 py-2" placeholder="Senha">
                <button class="btn btn-danger w-100 fw-bold py-2">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="p-4 border-bottom text-center text-lg-start">
                <h4 class="fw-bold m-0"><span class="text-danger">RDO</span> <span class="logo-text">EXPRESS</span></h4>
            </div>
            
            <nav class="mt-3 flex-grow-1">
                <div class="nav-item">
                    <a class="nav-link" onclick="toggleDrop('menu-gestao', this)">
                        <i class="bi bi- briefcase me-2"></i> <span class="logo-text">Gestão</span>
                        <i class="bi bi-chevron-down chevron logo-text"></i>
                    </a>
                    <ul class="submenu" id="menu-gestao">
                        <li><a class="nav-link" onclick="loadModule('gestao', 'entregas')">Entrega</a></li>
                        <li><a class="nav-link" onclick="loadModule('gestao', 'coletas')">Coletas</a></li>
                    </ul>
                </div>

                <div class="nav-item">
                    <a class="nav-link" onclick="toggleDrop('menu-relatorio', this)">
                        <i class="bi bi-graph-up-arrow me-2"></i> <span class="logo-text">Relatório</span>
                        <i class="bi bi-chevron-down chevron logo-text"></i>
                    </a>
                    <ul class="submenu" id="menu-relatorio">
                        <li><a class="nav-link" onclick="loadModule('relatorios', 'geral')">Geral</a></li>
                        <li><a class="nav-link" onclick="loadModule('relatorios', 'diario')">Diário</a></li>
                    </ul>
                </div>

                <div class="nav-item">
                    <a class="nav-link" onclick="toggleDrop('menu-admin', this)">
                        <i class="bi bi-shield-lock me-2"></i> <span class="logo-text">Administração</span>
                        <i class="bi bi-chevron-down chevron logo-text"></i>
                    </a>
                    <ul class="submenu" id="menu-admin">
                        <li><a class="nav-link" onclick="loadModule('admin', 'usuarios')">Usuários</a></li>
                        <li><a class="nav-link text-success" href="#"><i class="bi bi-whatsapp me-1"></i> WhatsApp</a></li>
                    </ul>
                </div>
            </nav>

            <div class="logout-section">
                <a href="#" class="nav-link text-danger" onclick="logout()">
                    <i class="bi bi-door-open me-2"></i> <span class="logo-text">Sair</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="d-lg-none mb-4">
                <button class="btn btn-dark" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            </header>
            <div id="router-view"></div>
        </main>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        function toggleDrop(id, el) {
            const menu = document.getElementById(id);
            const allMenus = document.querySelectorAll('.submenu');
            const allLinks = document.querySelectorAll('.nav-link');
            
            // Fecha outros menus para manter o padrão "Accordion"
            allMenus.forEach(m => { if(m.id !== id) m.classList.remove('show'); });
            allLinks.forEach(l => { if(l !== el) l.classList.remove('open'); });

            menu.classList.toggle('show');
            el.classList.toggle('open');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
