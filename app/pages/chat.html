<div class="row g-3 h-100">
    <!-- Topo Status Master -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0">
                            <span style="color: #FF0000;">RDO</span> <span style="color: #000000;">Express</span>
                        </h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Atendimento</small>
                    </div>
                </div>
                <div class="text-end">
                    <span id="sync-text" class="fw-bold text-dark me-2" style="font-size: 0.75rem;">Serviço Ativo</span>
                    <i id="sync-icon" class="bi bi-arrow-repeat fs-4 text-danger" style="cursor:pointer;" onclick="carregarDados()"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Contatos -->
    <div class="col-md-4">
        <div class="accordion shadow-sm rounded-4 overflow-hidden bg-white" id="accordionChat" style="height: 580px; overflow-y: auto;">
            <div class="accordion-item border-0">
                <h2 class="accordion-header">
                    <button class="accordion-button no-arrow bg-light fw-bold text-secondary small py-3 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collAtendentes">
                        ATENDENTES
                    </button>
                </h2>
                <div id="collAtendentes" class="accordion-collapse collapse show">
                    <div id="lista-atendentes-chat" class="list-group list-group-flush"></div>
                </div>
            </div>
            <div class="accordion-item border-0 border-top">
                <h2 class="accordion-header">
                    <button class="accordion-button no-arrow bg-light fw-bold text-secondary small py-3 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#collGrupos">
                        GRUPOS / OUTROS
                    </button>
                </h2>
                <div id="collGrupos" class="accordion-collapse collapse show">
                    <div id="lista-grupos-chat" class="list-group list-group-flush"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Janela de Chat -->
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 580px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center">
                <div id="chat-header-avatar"></div>
                <div class="ms-3">
                    <h6 id="chat-header-name" class="fw-bold mb-0">Selecione um contato</h6>
                    <small id="chat-header-status" class="text-muted" style="font-size: 0.7rem;"></small>
                </div>
            </div>
            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto d-flex flex-column gap-2"></div>
            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <textarea id="msg-input" class="form-control border-0 bg-transparent px-3" rows="1" placeholder="Cole a solicitação aqui..." style="resize: none;"></textarea>
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemManual()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Checkout Refinado -->
<div class="modal fade" id="modalPedido" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold mb-0">RDO <span class="text-danger">Express</span> - Checkout Logístico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="passo-conferencia">
                    <div id="alert-pico-manual" class="alert alert-warning py-2 small border-0 rounded-3 mb-2 d-none">
                        <i class="bi bi-clock-fill me-2"></i> <strong>Aviso:</strong> Horário de pico selecionado (+ R$ 5,00).
                    </div>
                    <div class="rounded-4 overflow-hidden border mb-3" style="height: 300px;">
                        <iframe id="mapa-iframe" width="100%" height="100%" frameborder="0" style="border:0"></iframe>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted text-uppercase">Origem (Coleta)</label>
                            <input type="text" id="p-origem" class="form-control form-control-sm bg-light border-0 shadow-sm">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted text-uppercase">Destino (Entrega)</label>
                            <input type="text" id="p-destino" class="form-control form-control-sm bg-light border-0 shadow-sm">
                        </div>
                    </div>
                    <button class="btn btn-danger w-100 rounded-pill fw-bold" onclick="proximoPassoPedido()">CONFIGURAR VALORES <i class="bi bi-gear-fill ms-2"></i></button>
                </div>

                <div id="passo-finalizacao" style="display:none;">
                    <div class="row g-2">
                        <!-- Tabela KM -->
                        <div class="col-md-4">
                            <label class="small fw-bold text-muted">TABELA KM (R$)</label>
                            <select id="p-tabela-km" class="form-select border-0 bg-light shadow-sm" onchange="atualizarTotal()">
                                <option value="2.20" selected>2,20 (Padrão)</option>
                                <option value="2.40">2,40</option>
                                <option value="3.00">3,00</option>
                            </select>
                        </div>
                        <!-- Localidade / Zonas -->
                        <div class="col-md-4">
                            <label class="small fw-bold text-muted">LOCALIDADE (ZONA)</label>
                            <select id="p-zona" class="form-select border-0 bg-light shadow-sm" onchange="atualizarTotal()">
                                <option value="0">Centro / Base (R$ 0)</option>
                                <option value="5">Zona Sul (+ R$ 5,00)</option>
                                <option value="7">Zona Norte (+ R$ 7,00)</option>
                                <option value="10">Zona Leste (+ R$ 10,00)</option>
                                <option value="12">Zona Oeste (+ R$ 12,00)</option>
                            </select>
                        </div>
                        <!-- Horário de Pico -->
                        <div class="col-md-4">
                            <label class="small fw-bold text-muted">HORÁRIO</label>
                            <select id="p-horario" class="form-select border-0 bg-light shadow-sm" onchange="atualizarTotal()">
                                <option value="0">Horário Normal</option>
                                <option value="5">Pico 16h às 18h (+ R$ 5,00)</option>
                            </select>
                        </div>

                        <!-- Prioridade -->
                        <div class="col-md-6 mt-2">
                            <label class="small fw-bold text-muted">PRIORIDADE</label>
                            <select id="p-prioridade" class="form-select border-0 bg-light shadow-sm" onchange="atualizarTotal()">
                                <option value="0">Comum</option>
                                <option value="5">Programada (+ R$ 5,00)</option>
                                <option value="7.5">Urgência (+ R$ 7,50)</option>
                            </select>
                        </div>
                        <!-- Mercadoria -->
                        <div class="col-md-6 mt-2">
                            <label class="small fw-bold text-muted">MERCADORIA</label>
                            <select id="p-mercadoria" class="form-select border-0 bg-light shadow-sm">
                                <option value="coleta">Coleta</option>
                                <option value="envelope">Envelope</option>
                                <option value="sacola">Sacola</option>
                                <option value="bolsa">Bolsa</option>
                            </select>
                        </div>

                        <div class="col-12 mt-2">
                            <label class="small fw-bold text-muted">OBSERVAÇÕES (LOCALIDADE/REFERENCIAS/DETALHES)</label>
                            <textarea id="p-obs" class="form-control border-0 bg-light shadow-sm" rows="2" placeholder="Ex: Próximo ao mercado, interfone estragado..."></textarea>
                        </div>

                        <div class="col-12 mt-3">
                            <div class="card border-0 rounded-4" style="background-color: #FF0000;">
                                <div class="card-body d-flex justify-content-between align-items-center py-3 text-white">
                                    <div>
                                        <p class="mb-0 small text-uppercase fw-bold opacity-75">Total Final</p>
                                        <h2 class="mb-0 fw-bold" id="view-valor-final">R$ 0,00</h2>
                                    </div>
                                    <div class="text-end small opacity-75" id="detalhe-calculo">Ajuste os valores</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-light w-50 rounded-pill fw-bold" onclick="voltarPasso()">VOLTAR</button>
                        <button class="btn btn-secondary w-50 rounded-pill fw-bold text-white" onclick="salvarPedidoAPI()">FINALIZAR PEDIDO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .no-arrow::after { display: none !important; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 2px solid white; position: absolute; bottom: 2px; right: 12px; }
    .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    .msg-bubble { background: white; padding: 10px 14px; border-radius: 12px; max-width: 85%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
    .msg-mine { align-self: flex-end; background-color: #dcf8c6; border: 1px solid #c7e5b0; }
    .reply-badge { position: absolute; bottom: -10px; right: 10px; background: #FF0000; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: bold; }
</style>

<script>
    if (!window.chatState) window.chatState = { currentName: null, currentLocations: {} };

    async function carregarDados() {
        const configs = await API.call('getbotconfig');
        renderizar(configs);
        if(window.chatState.currentName) await carregarMensagensBanco(window.chatState.currentName);
    }

    function renderizar(configs) {
        const isOnline = (u) => localStorage.getItem('bot_status') === 'true' && String(u.status) === 'true';
        const renderItem = (u) => {
            const sel = window.chatState.currentName === u.username;
            return `<button onclick="selecionarChat('${u.username}', '${u.imagem}', ${isOnline(u)}, '${u.tipo}')" class="list-group-item list-group-item-action border-0 ${sel ? 'bg-danger text-white' : ''}">
                <div class="d-flex align-items-center px-2">
                    <div class="position-relative">
                        <img src="${u.imagem}" class="rounded-circle border me-3" width="38" height="38">
                        ${u.tipo !== 'grupo' ? `<span class="status-dot ${isOnline(u) ? 'bg-success' : 'bg-secondary'}"></span>` : ''}
                    </div>
                    <div class="flex-grow-1 text-truncate">
                        <span class="fw-bold d-block small">${u.username}</span>
                    </div>
                </div>
            </button>`;
        };
        document.getElementById('lista-atendentes-chat').innerHTML = configs.filter(c => c.tipo !== 'grupo').map(renderItem).join('');
        document.getElementById('lista-grupos-chat').innerHTML = configs.filter(c => c.tipo === 'grupo').map(renderItem).join('');
    }

    async function selecionarChat(nome, imagem, online, tipo) {
        window.chatState.currentName = nome;
        document.getElementById('chat-header-name').innerText = nome;
        document.getElementById('chat-header-status').innerText = tipo === 'grupo' ? 'Grupo' : (online ? 'Online' : 'Offline');
        document.getElementById('chat-header-avatar').innerHTML = `<img src="${imagem}" class="rounded-circle border" width="40" height="40">`;
        await carregarMensagensBanco(nome);
    }

    async function carregarMensagensBanco(nome) {
        const todasMsgs = await API.call('getmensagens_chat') || [];
        const filtradas = todasMsgs.filter(m => String(m.jid_numero).includes(nome));
        
        const container = document.getElementById('chat-messages-container');
        container.innerHTML = filtradas.map(m => {
            const isPedido = m.finalizado === 'true' || m.finalizado === true;
            return `
            <div class="msg-bubble ${isPedido ? 'msg-mine' : ''} mb-3">
                <div class="text-dark" style="white-space: pre-wrap; font-size: 0.85rem;">${m.texto}</div>
                <div class="text-end text-muted mt-1" style="font-size: 0.6rem;">${m.hora}</div>
                ${isPedido ? `<div class="reply-badge">ID: ${m.pedido_id}</div>` : ''}
            </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function enviarMensagemManual() {
        const nome = window.chatState.currentName;
        if(!nome) return;
        const input = document.getElementById('msg-input');
        const texto = input.value.trim();
        if(!texto) return;

        if (texto.toUpperCase().includes('COLETA')) {
            prepararPedido(texto);
            input.value = '';
        } else {
            const payload = {
                id: "'" + Date.now(),
                jid_numero: "'" + nome, 
                texto: texto,
                hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                finalizado: "false",
                pedido_id: ""
            };
            await API.call('addmensagens_chat', payload);
            input.value = '';
            await carregarMensagensBanco(nome);
        }
    }

    function prepararPedido(texto) {
        const col = (texto.match(/COLETA:\s*\(([^)]+)\)/i) || [])[1] || 'Não informado';
        const ent = (texto.match(/ENTREGA:\s*\(([^)]+)\)/i) || [])[1] || 'Não informado';
        window.chatState.currentLocations = { col, ent };
        
        document.getElementById('mapa-iframe').src = `https://maps.google.com/maps?saddr=${encodeURIComponent(col)}&daddr=${encodeURIComponent(ent)}&output=embed`;
        document.getElementById('p-origem').value = col;
        document.getElementById('p-destino').value = ent;

        document.getElementById('passo-conferencia').style.display = 'block';
        document.getElementById('passo-finalizacao').style.display = 'none';
        
        new bootstrap.Modal(document.getElementById('modalPedido')).show();
        atualizarTotal();
    }

    function proximoPassoPedido() {
        document.getElementById('passo-conferencia').style.display = 'none';
        document.getElementById('passo-finalizacao').style.display = 'block';
    }

    function voltarPasso() {
        document.getElementById('passo-conferencia').style.display = 'block';
        document.getElementById('passo-finalizacao').style.display = 'none';
    }

    function atualizarTotal() {
        const kmPadrao = 10; // KM simulado
        const vKm = parseFloat(document.getElementById('p-tabela-km').value);
        const vZona = parseFloat(document.getElementById('p-zona').value);
        const vPico = parseFloat(document.getElementById('p-horario').value);
        const vPrio = parseFloat(document.getElementById('p-prioridade').value);
        
        const total = (kmPadrao * vKm) + vZona + vPico + vPrio;
        
        document.getElementById('view-valor-final').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        document.getElementById('detalhe-calculo').innerText = `KM: ${vKm} | Zona: ${vZona} | Pico: ${vPico} | Prio: ${vPrio}`;
        
        const alertPico = document.getElementById('alert-pico-manual');
        if(vPico > 0) alertPico.classList.remove('d-none'); else alertPico.classList.add('d-none');
    }

    async function salvarPedidoAPI() {
        const nome = window.chatState.currentName;
        const pedidoId = "RDO-" + Math.floor(1000 + Math.random() * 9000);
        
        const valorFinal = document.getElementById('view-valor-final').innerText;
        const origem = document.getElementById('p-origem').value;
        const destino = document.getElementById('p-destino').value;
        const mercadoria = document.getElementById('p-mercadoria').value;
        const prioText = document.querySelector('#p-prioridade option:checked').text;
        const zonaText = document.querySelector('#p-zona option:checked').text;
        const obs = document.getElementById('p-obs').value;

        await API.call('addchatlive', {
            id: "'" + pedidoId,
            username: nome,
            coleta: origem,
            entrega: destino,
            status_emoji: "⏳ aguardando ...."
        });

        const msgUnificada = `📦 *PEDIDO RDO EXPRESS*\n\n` +
            `*ID:* ${pedidoId}\n` +
            `*Origem:* ${origem}\n` +
            `*Destino:* ${destino}\n` +
            `*Zona:* ${zonaText}\n` +
            `*Mercadoria:* ${mercadoria.toUpperCase()}\n` +
            `*Prioridade:* ${prioText}\n` +
            `*Valor:* ${valorFinal}\n` +
            `*Obs:* ${obs || 'Sem observações'}\n\n` +
            `⏳ Aguardando confirmação do Motoboy!`;

        await API.call('addmensagens_chat', {
            id: "'" + Date.now(),
            jid_numero: "'" + nome,
            texto: msgUnificada,
            hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            finalizado: "true",
            pedido_id: pedidoId
        });

        bootstrap.Modal.getInstance(document.getElementById('modalPedido')).hide();
        await carregarMensagensBanco(nome);
        Swal.fire('Sucesso', `Pedido ${pedidoId} finalizado!`, 'success');
    }

    carregarDados();
    setInterval(() => { if(window.chatState.currentName) carregarMensagensBanco(window.chatState.currentName); }, 8000);
</script>
