<div class="pedidos-page-wrapper">

    <div class="pedidos-content-area">

        <div class="col-12">
            <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
                <div class="card-body p-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-clipboard2-check fs-3 text-danger"></i>
                        <div>
                            <h5 class="fw-bold mb-0 text-dark">
                                <span class="text-danger">RDO</span> Express - Pedidos
                            </h5>
                            <small class="text-muted pedidos-subtitle">Logística e Controle de Entregas</small>
                        </div>
                    </div>
                    <button id="btn-loop-pedidos" class="btn-sync-pedidos" title="Atualizar pedidos">
                        <i id="icon-loop-pedidos" class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-0">
            <div class="col-12">
                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body pb-0">
                        <div class="d-flex align-items-center justify-content-end gap-2 flex-wrap">
                            <div class="dropdown-filtro-wrapper">
                                <button class="btn-filtro-inteligente" id="btn-filtro-tipo">
                                    <i class="bi bi-funnel-fill"></i>
                                    <span id="label-filtro-tipo">Todos</span>
                                    <i class="bi bi-chevron-down chevron-filtro"></i>
                                </button>
                                <div class="dropdown-filtro-menu" id="dropdown-filtro-menu">
                                    <div class="dropdown-filtro-item active" data-filtro="todos">
                                        <i class="bi bi-grid-3x3-gap"></i> Todos
                                    </div>
                                    <div class="dropdown-filtro-item" data-filtro="servico">
                                        <i class="bi bi-hash"></i> N.Serviço
                                    </div>
                                    <div class="dropdown-filtro-item" data-filtro="cliente">
                                        <i class="bi bi-person"></i> Cliente
                                    </div>
                                    <div class="dropdown-filtro-item dropdown-filtro-item-has-sub" data-filtro="status">
                                        <div class="dropdown-filtro-item-label">
                                            <i class="bi bi-flag"></i> Status
                                            <i class="bi bi-chevron-right chevron-sub"></i>
                                        </div>
                                        <div class="dropdown-filtro-submenu" id="submenu-status">
                                            <div class="dropdown-filtro-subitem" data-status="todos">
                                                <i class="bi bi-grid-3x3-gap"></i> Todos
                                            </div>
                                            <div class="dropdown-filtro-subitem" data-status="PENDENTE">
                                                <i class="bi bi-clock"></i> Pendente
                                            </div>
                                            <div class="dropdown-filtro-subitem" data-status="EM ROTA">
                                                <i class="bi bi-bicycle"></i> Em Rota
                                            </div>
                                            <div class="dropdown-filtro-subitem" data-status="CONCLUIDO">
                                                <i class="bi bi-check-circle"></i> Concluído
                                            </div>
                                            <div class="dropdown-filtro-subitem" data-status="CANCELADO">
                                                <i class="bi bi-x-circle"></i> Cancelado
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <input type="text" id="filtro-pedidos" class="form-control form-control-sm rounded-pill input-filtro-pedidos" placeholder="Buscar..." autocomplete="off">
                            <input type="date" id="filtro-data-pedidos" class="form-control form-control-sm rounded-pill input-filtro-data-pedidos" title="Filtrar por data">
                        </div>
                    </div>

                    <div class="table-responsive p-3">
                        <table class="table table-hover align-middle border-0 mb-0" id="tabela-pedidos">
                            <thead class="text-uppercase tabela-pedidos-head">
                                <tr>
                                    <th class="ps-3 border-0 fw-normal">N.Serviço</th>
                                    <th class="border-0 fw-normal">Data</th>
                                    <th class="border-0 fw-normal">Cliente</th>
                                    <th class="border-0 fw-normal">Status</th>
                                    <th class="text-end pe-3 border-0 fw-normal">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-tabela-pedidos">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <div class="spinner-border spinner-border-sm text-danger opacity-50"></div>
                                        <div class="mt-2 pedidos-loading-text">Buscando pedidos<span class="pedidos-dots"></span></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="card-footer bg-white border-0 d-flex justify-content-end pb-3 pe-3">
                        <div class="btn-group shadow-sm">
                            <button class="btn btn-light" id="btn-pag-prev-pedidos">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <button class="btn btn-light" id="info-paginacao-pedidos" disabled>Pág 1</button>
                            <button class="btn btn-light" id="btn-pag-next-pedidos">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <div id="modal-pedidos-container"></div>

</div>
