<div class="row g-3 h-100">
    <!-- Header RDO Express - Fundo Vermelho Reativado -->
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex flex-column">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-whatsapp fs-4 me-2 text-white"></i>
                        <h5 class="fw-bold mb-0 text-white">RDO <span style="color: #ffcccc;">Express</span></h5>
                    </div>
                    
                    <!-- INFO ATENDENTE (Somente Leitura - Definido no Bot) -->
                    <div id="atendente-ativo-card" class="d-flex align-items-center mt-2 bg-white text-dark rounded-pill px-2 py-1 shadow-sm" style="width: fit-content; min-width: 160px;">
                        <img id="atendente-foto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="rounded-circle me-2" width="22" height="22" style="object-fit:cover;">
                        <div class="d-flex flex-column" style="line-height: 1;">
                            <span id="atendente-nome" class="fw-bold text-dark" style="font-size: 0.65rem;">Carregando...</span>
                            <small id="atendente-num" class="text-muted" style="font-size: 0.6rem;">Aguardando Gestão</small>
                        </div>
                    </div>
                </div>

                <!-- Área de Pedidos -->
                <div class="d-flex align-items-center gap-2 w-50">
                    <div class="input-group">
                        <input type="text" id="input-colar" class="form-control border-0 bg-white shadow-none" placeholder="Cole a mensagem aqui..." style="border-radius: 10px 0 0 10px; font-size: 0.8rem;">
                        <button class="btn btn-dark px-3 shadow-sm btn-gerar" style="border-radius: 0 10px 10px 0;" onclick="criarPedido()">Gerar Pedido</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista Lateral de Grupos -->
    <div class="col-md-4 h-100">
        <div class="card border-0 shadow-sm overflow-hidden bg-white" style="height: 600px; border-radius: 15px;">
            <div class="p-2 bg-white border-bottom">
                <div class="d-flex gap-1 overflow-auto pb-1 scrollbar-hidden">
                    <button class="btn btn-light btn-sm rounded-pill fw-bold active-filter" style="font-size: 0.65rem;">Tudo</button>
                    <button class="btn btn-light btn-sm rounded-pill fw-bold text-nowrap" style="font-size: 0.65rem;">Não lidas</button>
                </div>
            </div>
            <div id="lista-contatos-chat" class="list-group list-group-flush overflow-auto"></div>
        </div>
    </div>

    <!-- Área de Mensagens (WhatsApp Style) -->
    <div class="col-md-8 h-100">
        <div id="chat-messages-container" class="card border-0 shadow-sm p-4 overflow-auto d-flex flex-row flex-wrap gap-3 align-content-start" 
             style="height: 600px; border-radius: 15px; background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay;">
        </div>
    </div>
</div>

<script>
    let jidSelecionado = null;

    async function carregarDados() {
        // Busca as configurações e os pedidos
        const [configs, pedidos] = await Promise.all([
            API.call('getbotconfig'),
            API.call('getchatlive')
        ]);

        // LÓGICA DO ATENDENTE: Busca no banco quem é do tipo atendente e está ATIVO
        const atendenteAtivo = configs.find(c => c.tipo === 'atendente' && c.ativo === true);
        
        if(atendenteAtivo) {
            document.getElementById('atendente-foto').src = atendenteAtivo.logo;
            document.getElementById('atendente-nome').innerText = atendenteAtivo.nome;
            document.getElementById('atendente-num').innerText = atendenteAtivo.valor;
        } else {
            document.getElementById('atendente-nome').innerText = "Nenhum Ativo";
            document.getElementById('atendente-num').innerText = "Configure no Bot";
        }

        // Renderiza lista de GRUPOS na lateral (ignorando atendentes aqui)
        const lista = document.getElementById('lista-contatos-chat');
        lista.innerHTML = configs.filter(g => g.tipo === 'grupo').map(g => `
            <button onclick="setFiltro('${g.valor}')" class="list-group-item list-group-item-action py-3 ${jidSelecionado === g.valor ? 'bg-light border-start border-danger border-3' : ''} ${!g.ativo ? 'opacity-50' : ''}">
                <div class="d-flex align-items-center">
                    <img src="${g.logo}" class="rounded-circle me-3 border" width="38" height="38" style="object-fit:cover;">
                    <div class="flex-grow-1 overflow-hidden">
                        <span class="fw-bold small text-dark d-block text-truncate">${g.nome}</span>
                        <small class="text-muted" style="font-size: 0.65rem;">Monitorando...</small>
                    </div>
                </div>
            </button>
        `).join('');

        // Cards de Pedidos
        const container = document.getElementById('chat-messages-container');
        const filtrados = jidSelecionado ? pedidos.filter(p => p.cliente === jidSelecionado) : pedidos;
        
        container.innerHTML = filtrados.reverse().map(p => {
            const grp = configs.find(g => g.valor === p.cliente) || {nome: 'RDO', logo: 'https://cdn-icons-png.flaticon.com/512/124/124034.png'};
            return `
                <div class="card border-0 shadow-sm animate__animated animate__fadeIn" style="width: 250px; border-radius: 12px; height: fit-content;">
                    <div class="card-header bg-white border-0 py-2 d-flex align-items-center border-bottom">
                        <img src="${grp.logo}" class="rounded-circle me-2" width="18" height="18">
                        <span class="small fw-bold text-truncate" style="font-size: 0.7rem;">${grp.nome}</span>
                    </div>
                    <div class="card-body py-2">
                        <p class="small mb-2" style="font-size: 0.75rem; white-space: pre-wrap;">${p.ultima_msg}</p>
                        <div class="d-flex justify-content-between align-items-center pt-2">
                            <span class="badge ${p.status === 'Concluído' ? 'bg-success' : 'bg-danger'}" style="font-size:0.55rem">${p.status}</span>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-light p-0 px-1" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                                <ul class="dropdown-menu shadow border-0 small">
                                    <li><a class="dropdown-item" onclick="setStat('${p.id}','Aberto')">Aberto</a></li>
                                    <li><a class="dropdown-item text-success" onclick="setStat('${p.id}','Concluído')">Concluído</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.setFiltro = (jid) => {
        jidSelecionado = (jidSelecionado === jid) ? null : jid;
        carregarDados();
    };

    window.setStat = async (id, status) => {
        await API.call('updatechatstatus', { id, status });
        carregarDados();
    };

    window.criarPedido = async () => {
        const msg = document.getElementById('input-colar').value.trim();
        if(!msg) return;
        await API.call('addchatlive', {
            id: "MSG-" + Date.now(),
            cliente: jidSelecionado || 'GERAL',
            ultima_msg: msg,
            status: 'Aberto',
            hora: new Date().toLocaleTimeString('pt-BR')
        });
        document.getElementById('input-colar').value = '';
        carregarDados();
    };

    carregarDados();
    setInterval(carregarDados, 5000);
</script>

<style>
    .btn-gerar { 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        font-weight: 500; 
        font-size: 0.85rem;
    }
    .active-filter { background-color: #212529 !important; color: white !important; }
    .scrollbar-hidden::-webkit-scrollbar { display: none; }
</style>
