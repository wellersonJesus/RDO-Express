<div class="modal fade" id="modalFormFin" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="fin-form-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="fin-form-header-icon" id="fin-form-header-icon">
                        <i class="bi bi-plus-circle"></i>
                    </div>
                    <div>
                        <h6 id="form-fin-titulo" class="fw-bold mb-0">Novo Lançamento</h6>
                        <small class="fin-form-subtitle" id="fin-form-subtitle">Preencha os dados abaixo</small>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4 pb-2">
                <input type="hidden" id="fin-id">
                <div id="form-fin-erro" class="alert alert-danger d-none py-2 px-3 rounded-3 mb-3" style="font-size:.74rem;"></div>
                <div class="fin-form-section">
                    <div class="fin-form-section-label"><i class="bi bi-calendar-event me-1"></i>Informações Principais</div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="fin-field-label">Data <span class="text-danger">*</span></label>
                            <input type="date" id="fin-data" class="form-control form-control-sm fin-field-input">
                        </div>
                        <div class="col-6">
                            <label class="fin-field-label">Tipo <span class="text-danger">*</span></label>
                            <select id="fin-tipo" class="form-select form-select-sm fin-field-input">
                                <option value="">Selecione...</option>
                                <option value="entrada">Entrada (Receita)</option>
                                <option value="saida">Saída (Despesa)</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="fin-field-label">Descrição <span class="text-danger">*</span></label>
                            <input type="text" id="fin-descricao" class="form-control form-control-sm fin-field-input" placeholder="Ex: Pagamento corrida cliente X">
                        </div>
                    </div>
                </div>
                <div class="fin-form-divider"></div>
                <div class="fin-form-section">
                    <div class="fin-form-section-label"><i class="bi bi-currency-dollar me-1"></i>Valores e Pagamento</div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="fin-field-label">Valor (R$) <span class="text-danger">*</span></label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text fin-field-prefix">R$</span>
                                <input type="text" id="fin-valor" class="form-control form-control-sm fin-field-input" placeholder="0,00" inputmode="decimal">
                            </div>
                        </div>
                        <div class="col-6">
                            <label class="fin-field-label">Situação</label>
                            <select id="fin-situacao" class="form-select form-select-sm fin-field-input">
                                <option value="pendente">Pendente</option>
                                <option value="pago">Pago</option>
                                <option value="recebido">Recebido</option>
                                <option value="cancelado">Cancelado</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="fin-field-label">Forma de Pagamento</label>
                            <select id="fin-pagamento" class="form-select form-select-sm fin-field-input">
                                <option value="">Selecione</option>
                                <option value="pix">PIX</option>
                                <option value="dinheiro">Dinheiro</option>
                                <option value="cartao_credito">Cartão Crédito</option>
                                <option value="cartao_debito">Cartão Débito</option>
                                <option value="boleto">Boleto</option>
                                <option value="transferencia">Transferência</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="fin-field-label">Categoria</label>
                            <input type="text" id="fin-categoria" class="form-control form-control-sm fin-field-input" placeholder="Ex: Corrida, Combustível">
                        </div>
                    </div>
                </div>
                <div class="fin-form-divider"></div>
                <div class="fin-form-section">
                    <div class="fin-form-section-label"><i class="bi bi-info-circle me-1"></i>Detalhes Adicionais</div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="fin-field-label">Motoboy</label>
                            <input type="text" id="fin-motoboy" class="form-control form-control-sm fin-field-input" placeholder="Nome do motoboy">
                        </div>
                        <div class="col-6">
                            <label class="fin-field-label">Pedido (ID)</label>
                            <input type="text" id="fin-pedido" class="form-control form-control-sm fin-field-input" placeholder="ID do pedido vinculado">
                        </div>
                        <div class="col-12">
                            <label class="fin-field-label">Observação</label>
                            <textarea id="fin-obs" class="form-control form-control-sm fin-field-input" rows="2" placeholder="Detalhes adicionais..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="fin-form-valor-destaque d-none" id="fin-form-valor-destaque">
                    <div class="d-flex align-items-center justify-content-between">
                        <span class="fin-form-valor-label">VALOR DO LANÇAMENTO</span>
                        <span class="fin-form-valor-total" id="fin-form-valor-preview">R$ 0,00</span>
                    </div>
                </div>
            </div>
            <div class="fin-form-footer">
                <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-salvar-fin" class="btn btn-danger btn-sm rounded-pill px-4">
                    <span id="spinner-salvar-fin" class="spinner-border spinner-border-sm me-1 d-none"></span>
                    <span id="txt-salvar-fin">Salvar</span>
                </button>
            </div>
        </div>
    </div>
</div>
