<div class="container-fluid p-0">

    <div class="d-flex align-items-center justify-content-between px-4 py-3 border-bottom bg-white">
        <div>
            <h5 class="fw-bold mb-0" style="font-size:.95rem;">
                <i class="bi bi-wallet2 text-danger me-2"></i>Financeiro
            </h5>
            <small class="text-muted" style="font-size:.7rem;">Controle de entradas e saídas</small>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button id="btn-novo-fin" class="btn btn-danger btn-sm rounded-pill" style="font-size:.76rem;font-weight:500;padding:5px 18px;">
                <i class="bi bi-plus-lg me-1"></i>Novo
            </button>
            <button id="btn-refresh-fin" class="btn btn-sm p-0 d-flex align-items-center justify-content-center" title="Atualizar" style="width:32px;height:32px;background:none;border:none;">
                <i id="sync-icon-fin" class="bi bi-arrow-clockwise" style="font-size:.95rem;color:#6c757d;"></i>
            </button>
            <button id="btn-toggle-valores" class="btn btn-sm p-0 d-flex align-items-center justify-content-center" title="Mostrar/Ocultar valores" style="width:32px;height:32px;background:none;border:none;">
                <i class="bi bi-eye-slash" style="font-size:.95rem;color:#6c757d;"></i>
            </button>
        </div>
    </div>

    <div class="row g-2 px-4 py-3" id="cards-resumo-fin">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100" style="border-left:3px solid #198754!important;border-radius:12px;">
                <div class="card-body p-2 d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(25,135,84,0.08);flex-shrink:0;">
                        <i class="bi bi-arrow-down-circle" style="color:#198754;font-size:.95rem;"></i>
                    </div>
                    <div>
                        <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Entradas</div>
                        <div id="total-entradas" style="font-size:.82rem;font-weight:400;color:#198754;">****</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100" style="border-left:3px solid #dc3545!important;border-radius:12px;">
                <div class="card-body p-2 d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(220,53,69,0.08);flex-shrink:0;">
                        <i class="bi bi-arrow-up-circle" style="color:#dc3545;font-size:.95rem;"></i>
                    </div>
                    <div>
                        <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Saídas</div>
                        <div id="total-saidas" style="font-size:.82rem;font-weight:400;color:#dc3545;">****</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100" style="border-left:3px solid #0d6efd!important;border-radius:12px;">
                <div class="card-body p-2 d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(13,110,253,0.08);flex-shrink:0;">
                        <i class="bi bi-wallet2" style="color:#0d6efd;font-size:.95rem;"></i>
                    </div>
                    <div>
                        <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Saldo</div>
                        <div id="total-saldo" style="font-size:.82rem;font-weight:400;color:#0d6efd;">****</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm h-100" style="border-left:3px solid #6f42c1!important;border-radius:12px;">
                <div class="card-body p-2 d-flex align-items-center gap-2">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:34px;height:34px;background:rgba(111,66,193,0.08);flex-shrink:0;">
                        <i class="bi bi-receipt" style="color:#6f42c1;font-size:.95rem;"></i>
                    </div>
                    <div>
                        <div style="font-size:.68rem;color:#6c757d;font-weight:500;">Registros</div>
                        <div id="total-registros" style="font-size:.82rem;font-weight:400;color:#6f42c1;">****</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="px-4 pb-2">
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between">
            <div class="d-flex gap-2" id="fin-tabs">
                <button class="btn-tab-fin active" data-tab="todos">Todos</button>
                <button class="btn-tab-fin" data-tab="entrada">Receitas</button>
                <button class="btn-tab-fin" data-tab="saida">Despesas</button>
                <button class="btn-tab-fin" data-tab="extrato">Extrato</button>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <input type="month" id="filtro-mes-fin" class="form-control form-control-sm" style="max-width:170px;font-size:.76rem;font-weight:400;border-radius:8px;">
            </div>
        </div>
    </div>

    <div class="px-4 pt-2">
        <div class="rounded-3 border bg-white overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover table-sm align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;">Data</th>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;">Tipo</th>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;">Categoria</th>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;">Descrição</th>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;" class="text-end">Valor</th>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;">Status</th>
                            <th style="font-weight:600;font-size:.7rem;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;text-align:center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-fin-body">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-3" style="font-size:.78rem;">Clique em atualizar para carregar</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center py-2 px-3 border-top" style="background:#fafafa;">
                <span class="text-muted" id="fin-pag-info" style="font-size:.7rem;font-weight:400;">0 registros</span>
                <div class="d-flex gap-1" id="fin-pag-controls"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-fin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content border-0 shadow-lg" style="border-radius:14px;">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h6 class="fw-bold mb-0" id="modal-fin-title" style="font-size:.88rem;">Novo Lançamento</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 pt-3 pb-2">
                    <form id="form-fin" autocomplete="off">
                        <input type="hidden" id="fin-id">
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Data <span class="text-danger">*</span></label>
                                <input type="date" class="form-control form-control-sm" id="fin-data" required style="font-size:.76rem;font-weight:400;border-radius:8px;">
                            </div>
                            <div class="col-6">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Tipo <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm" id="fin-tipo" required style="font-size:.76rem;font-weight:400;border-radius:8px;">
                                    <option value="">Selecione</option>
                                    <option value="entrada">Entrada</option>
                                    <option value="saida">Saída</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Categoria <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="fin-categoria" required style="font-size:.76rem;font-weight:400;border-radius:8px;" placeholder="Ex: Vendas, Aluguel...">
                            </div>
                            <div class="col-6">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Valor <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="fin-valor" required style="font-size:.76rem;font-weight:400;border-radius:8px;" placeholder="0,00" inputmode="decimal">
                            </div>
                            <div class="col-12">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Descrição</label>
                                <input type="text" class="form-control form-control-sm" id="fin-descricao" style="font-size:.76rem;font-weight:400;border-radius:8px;" placeholder="Descrição do lançamento">
                            </div>
                            <div class="col-6">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Status</label>
                                <select class="form-select form-select-sm" id="fin-status" style="font-size:.76rem;font-weight:400;border-radius:8px;">
                                    <option value="pendente">Pendente</option>
                                    <option value="pago">Pago</option>
                                    <option value="recebido">Recebido</option>
                                    <option value="cancelado">Cancelado</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Forma Pagto</label>
                                <select class="form-select form-select-sm" id="fin-pagamento" style="font-size:.76rem;font-weight:400;border-radius:8px;">
                                    <option value="">Selecione</option>
                                    <option value="pix">PIX</option>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="cartao_credito">Cartão Crédito</option>
                                    <option value="cartao_debito">Cartão Débito</option>
                                    <option value="boleto">Boleto</option>
                                    <option value="transferencia">Transferência</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label mb-1" style="font-size:.7rem;font-weight:400;color:#555;">Observação</label>
                                <textarea class="form-control form-control-sm" id="fin-observacao" rows="2" style="font-size:.76rem;font-weight:400;border-radius:8px;" placeholder="Detalhes adicionais..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 px-4 pb-4 pt-2">
                    <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal" style="font-size:.74rem;">Cancelar</button>
                    <button type="button" class="btn btn-danger btn-sm rounded-pill px-4" id="btn-salvar-fin" style="font-size:.74rem;">
                        <span class="spinner-border spinner-border-sm d-none me-1" id="spinner-salvar-fin"></span>
                        <span id="txt-salvar-fin">Salvar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
