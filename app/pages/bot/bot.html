<div class="container-fluid p-0">
    <div class="col-12 mb-3">
        <div class="card border-0 shadow-sm bg-white rounded-4">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-gear-wide-connected" style="font-size: 1.5rem; color: #FF0000;"></i>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express</h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Painel de Gestão de acesso</small>
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <select id="filtro-tipo" class="form-select form-select-sm" style="width: 150px;" onchange="window.reloadBot()">
                        <option value="TODOS">Toda a lista</option>
                        <option value="atendente">Atendente</option>
                        <option value="grupo">Grupo</option>
                        <option value="SRE Architect">SRE Architect</option>
                        <option value="ti">TI</option>
                        <option value="financeiro">Financeiro</option>
                        <option value="motoboy">Motoboy</option>
                    </select>
                    <button type="button" class="btn btn-danger btn-sm rounded-pill px-3" onclick="window.abrirModalCadastro()"><i class="bi bi-plus-lg"></i> Novo</button>
                    <button type="button" id="btn-status-bot" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="window.toggleMaster()">MASTER OFF</button>
                    <button type="button" class="btn btn-outline-danger btn-sm rounded-circle" style="width:32px; height:32px;" onclick="window.initBot()"><i id="sync-icon-bot" class="bi bi-arrow-repeat"></i></button>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12"><div class="card border-0 shadow-sm bg-white rounded-4"><div class="table-responsive p-3"><table class="table table-hover align-middle border-0"><thead class="text-uppercase" style="font-size: 0.65rem; color: #999; letter-spacing: 1px;"><tr><th class="ps-3">Status</th><th>Avatar</th><th>Nome</th><th>Tipo</th><th class="text-end pe-3">Ações</th></tr></thead><tbody id="bot-list"></tbody></table></div><div class="card-footer bg-white border-0 d-flex justify-content-center pb-3"><nav><ul class="pagination pagination-sm" id="bot-pagination"></ul></nav></div></div></div>
</div>

<div class="modal fade" id="modalEscolhaTipo" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-4 text-center"><h5 class="mb-3">Novo Registro</h5><button type="button" class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('usuario')">Usuário</button><button type="button" class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('cliente')">Cliente</button><button type="button" class="btn btn-outline-danger w-100" onclick="window.abrirModalEspecifico('colaborador')">Colaborador</button></div></div></div></div>

<div class="modal fade" id="modalEdicao" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body"><h5>Editar</h5><input type="text" id="edit-user" class="form-control mb-2" placeholder="Username"><button type="button" class="btn btn-danger w-100" onclick="window.confirmarEdicao()">Salvar</button></div></div></div></div>

<div class="modal fade" id="modalExclusao" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body text-center p-4"><h5>Confirmar exclusão?</h5><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-danger" onclick="window.confirmarExclusao()">Sim, Remover</button></div></div></div></div>

<div class="modal fade" id="modalUsuario" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 rounded-4 shadow-lg"><div class="modal-body p-4">
    <h5 class="fw-bold mb-3 text-secondary">Novo Usuário</h5>
    <div class="row g-2">
        <div class="col-6"><input type="text" id="u-username" class="form-control rounded-3" placeholder="Nome" required></div>
        <div class="col-6">
            <select id="u-tipo" class="form-select rounded-3" required>
                <option value="" disabled selected>Cargo</option>
                <option value="atendente">Atendente</option>
                <option value="grupo">Grupo</option>
                <option value="SRE Architect">SRE Architect</option>
                <option value="ti">TI</option>
                <option value="financeiro">Financeiro</option>
                <option value="motoboy">Motoboy</option>
            </select>
        </div>
        <div class="col-12"><input type="text" id="u-imagem" class="form-control rounded-3" placeholder="URL da Imagem" required></div>
        <div class="col-12"><input type="password" id="u-password" class="form-control rounded-3" placeholder="Senha" required></div>
    </div>
    <button type="button" class="btn btn-danger w-100 mt-3 rounded-pill" onclick="window.salvarRegistro('usuarios', 'u-', ['username','tipo','imagem','password'])">Salvar Registro</button>
</div></div></div></div>

<div class="modal fade" id="modalCliente" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body">
    <h5>Cadastro de Cliente</h5>
    <input type="text" id="c-username" class="form-control mb-2" placeholder="Username" required>
    <input type="text" id="c-responsavel" class="form-control mb-2" placeholder="Responsável" required>
    <input type="text" id="c-cnpj" class="form-control mb-2" placeholder="CNPJ" required>
    <input type="text" id="c-contato" class="form-control mb-2" placeholder="Contato" required>
    <input type="text" id="c-email" class="form-control mb-2" placeholder="Email" required>
    <input type="text" id="c-endereco" class="form-control mb-2" placeholder="Endereço" required>
    <input type="text" id="c-bairro" class="form-control mb-2" placeholder="Bairro" required>
    <button type="button" class="btn btn-danger w-100" onclick="window.salvarRegistro('clientes', 'c-', ['username','responsavel','cnpj','contato','email','endereco','bairro'])">Salvar</button>
</div></div></div></div>

<div class="modal fade" id="modalColaborador" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body">
    <h5>Cadastro de Colaborador</h5>
    <input type="text" id="col-username" class="form-control mb-2" placeholder="Username" required>
    <input type="text" id="col-cargo" class="form-control mb-2" placeholder="Cargo" required>
    <input type="text" id="col-cnpj" class="form-control mb-2" placeholder="CNPJ" required>
    <input type="text" id="col-moto_placa" class="form-control mb-2" placeholder="Placa Moto" required>
    <input type="text" id="col-email" class="form-control mb-2" placeholder="Email" required>
    <input type="text" id="col-endereco" class="form-control mb-2" placeholder="Endereço" required>
    <input type="text" id="col-bairro" class="form-control mb-2" placeholder="Bairro" required>
    <input type="text" id="col-chave_pix" class="form-control mb-2" placeholder="Chave PIX" required>
    <input type="text" id="col-tipo_comissao" class="form-control mb-2" placeholder="Tipo Comissão" required>
    <input type="text" id="col-valor_base_comissao" class="form-control mb-2" placeholder="Valor Base" required>
    <input type="text" id="col-status_contrato" class="form-control mb-2" placeholder="Status Contrato" required>
    <button type="button" class="btn btn-danger w-100" onclick="window.salvarRegistro('colaboradores', 'col-', ['username','cargo','cnpj','moto_placa','email','endereco','bairro','chave_pix','tipo_comissao','valor_base_comissao','status_contrato'])">Salvar</button>
</div></div></div></div>
