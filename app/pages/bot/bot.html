<div class="container-fluid p-0">
    <div class="card border-0 shadow-sm bg-white rounded-4 mb-3">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-gear-wide-connected" style="font-size: 1.5rem; color: #FF0000;"></i>
                <div>
                    <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express</h5>
                    <small class="text-muted" style="font-size: 0.75rem;">Painel de Gestão e Automatização</small>
                </div>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <select id="filtro-tipo" class="form-select form-select-sm" style="width: 150px;" onchange="window.reloadBot()">
                    <option value="TODOS">Todos</option>
                    <option value="usuarios">Usuários</option>
                    <option value="clientes">Clientes</option>
                    <option value="colaboradores">Colaboradores</option>
                </select>
                <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="window.abrirModalCadastro()"><i class="bi bi-plus-lg"></i> Novo</button>
                <button id="btn-status-bot" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="window.toggleMaster()">MASTER OFF</button>
                <button class="btn btn-outline-danger btn-sm rounded-circle" style="width:32px; height:32px;" onclick="window.initBot()"><i id="sync-icon-bot" class="bi bi-arrow-repeat"></i></button>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm bg-white rounded-4">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle border-0">
                <thead class="text-uppercase" style="font-size: 0.65rem; color: #999; letter-spacing: 1px;">
                    <tr><th class="ps-3">Status</th><th>Avatar</th><th>Nome</th><th>Tipo</th><th class="text-end pe-3">Ações</th></tr>
                </thead>
                <tbody id="bot-list"></tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-center pb-3">
            <div class="btn-group shadow-sm">
                <button class="btn btn-light" onclick="window.mudarPagina(-1)"><i class="bi bi-chevron-left"></i></button>
                <button class="btn btn-light" id="info-paginacao" disabled style="min-width: 100px;">Pág 1</button>
                <button class="btn btn-light" onclick="window.mudarPagina(1)"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEscolhaTipo" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-bold mb-4">Novo Registro</h5>
                <button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('usuarios')">Usuário</button>
                <button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('clientes')">Cliente</button>
                <button class="btn btn-outline-danger w-100" onclick="window.abrirModalEspecifico('colaboradores')">Colaborador</button>
            </div>
        </div>
    </div>
</div>
