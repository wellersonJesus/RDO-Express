<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #dc3545; }
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #000; }
        .bg-image { width: 100%; height: 100%; background-image: url('https://img.freepik.com/fotos-gratis/ainda-vida-da-representacao-da-cadeia-de-suprimentos_23-2149827282.jpg?w=740&q=80'); background-size: cover; background-position: center; filter: brightness(0.4); animation: zoomMovement 20s infinite alternate; }
        @keyframes zoomMovement { from { transform: scale(1); } to { transform: scale(1.1); } }
        .login-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .form-control { border-radius: 12px; padding: 14px; border: 1px solid #e0e0e0; background: #fdfdfd; transition: all 0.3s; }
        .form-control:focus { box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.1); border-color: var(--primary-color); }
        .btn-login { border-radius: 12px; padding: 14px; font-weight: 700; text-transform: uppercase; background: var(--primary-color); border: none; transition: transform 0.2s; }
        .btn-login:hover { background: #c82333; transform: translateY(-2px); }
        .animate-up { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg-image"></div></div>
    <div class="login-wrapper">
        <div class="login-card animate-up">
            <div class="text-center mb-5">
                <div class="d-inline-block p-3 rounded-circle mb-3" style="background: #fff5f5;">
                    <i class="bi bi-lightning-charge-fill text-danger" style="font-size: 2rem;"></i>
                </div>
                <h2 class="m-0"><span class="text-danger">RDO</span> EXPRESS</h2>
                <p class="text-muted small fw-bold">SRE LOGISTICS SYSTEM</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" id="user" class="form-control border-start-0" placeholder="Usuário" required style="border-radius: 0 12px 12px 0;">
                    </div>
                </div>
                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="pass" class="form-control border-0" placeholder="Senha" required>
                        <span class="input-group-text bg-white border-start-0" style="border-radius: 0 12px 12px 0; cursor: pointer;" onclick="togglePass()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger btn-login w-100 shadow-lg">Acessar Painel <i class="bi bi-arrow-right ms-2"></i></button>
                <div id="login-msg" class="text-center mt-3 text-danger small fw-bold"></div>
            </form>
            <div class="mt-5 text-center"><small class="text-muted">v2.6.0 | © 2026 High-End SRE</small></div>
        </div>
    </div>
    <script src="assets/js/config.js"></script>
    <script>
        function togglePass() {
            const p = document.getElementById('pass');
            const icon = document.getElementById('toggleIcon');
            if (p.type === 'password') { p.type = 'text'; icon.classList.replace('bi-eye', 'bi-eye-slash'); }
            else { p.type = 'password'; icon.classList.replace('bi-eye-slash', 'bi-eye'); }
        }
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('login-msg');
            if(typeof window.MASTER_USER === 'undefined') { msg.innerText = "Erro: Configurações não carregadas."; return; }
            if(u === window.MASTER_USER && p === window.MASTER_PASS) { localStorage.setItem('rdo_auth', 'true'); window.location.href = 'index.html'; }
            else { msg.innerText = "Usuário ou senha incorretos!"; const card = document.querySelector('.login-card'); card.style.animation = 'none'; setTimeout(() => card.style.animation = 'shake 0.4s', 10); }
        };
    </script>
</body>
</html>
