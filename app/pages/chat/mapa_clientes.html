<div class="modal fade" id="modalMapa" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 rounded-4 shadow overflow-hidden">

      <!-- HEADER -->
      <div class="fin-form-header">
        <div class="d-flex align-items-center justify-content-between w-100">
          <div class="d-flex align-items-center gap-3">
            <div class="fin-form-header-icon"><i class="bi bi-map-fill"></i></div>
            <div>
              <h6 class="fw-bold mb-0 text-white" style="font-size:.88rem;">
                <span style="color:rgba(255,255,255,.7);">RDO</span> Express — Rota(s)
              </h6>
              <small class="fin-form-subtitle">
                <i class="bi bi-person-fill me-1"></i>Solicitante:
                <span id="header-nome-solicitante" class="fw-bold text-white">Carregando...</span>
              </small>
            </div>
          </div>
          <button
            type="button"
            class="d-flex align-items-center justify-content-center rounded-circle border-0"
            style="width:28px;height:28px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;transition:background .2s;flex-shrink:0;"
            onmouseover="this.style.background='rgba(255,255,255,.28)'"
            onmouseout="this.style.background='rgba(255,255,255,.15)'"
            onclick="window.fecharParaChat('modalMapa')"
            title="Cancelar e voltar ao chat">
            <i class="bi bi-x-lg" style="font-size:.8rem;"></i>
          </button>
        </div>
      </div>

      <!-- BODY -->
      <div class="modal-body px-3 pb-3 pt-3">
        
        <!-- LOADER -->
        <div id="mapa-loader" class="text-center py-5" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div class="spinner-border text-danger mb-3" style="width:3rem;height:3rem;opacity:.6;"></div>
          <div class="fin-loading-text" style="font-size:.85rem;color:#6c757d;font-weight:500;">
            Calculando rotas<span class="fin-dots"></span>
          </div>
        </div>

        <!-- MAPA -->
        <div id="container-mapa-visual" class="rounded-3 shadow-sm mb-3"
          style="height:400px;width:100%;display:none;border:2px solid #e9ecef;"></div>

        <!-- ⚠️ REMOVIDO: Lista de Rotas Editável -->
        <!-- A lista de rotas 1, 2, 3... foi removida conforme solicitado -->

        <!-- FOOTER: Resumo KM + Tempo + Valor -->
        <div id="footer-resumo-dados" class="mt-3 rounded-3 shadow-sm" 
          style="background:linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);border:1px solid #e9ecef;padding:1rem;">
          <div class="text-center py-2 text-muted small">
            <div class="spinner-border spinner-border-sm text-danger me-2"></div>
            Calculando...
          </div>
        </div>

        <!-- BOTÃO AVANÇAR -->
        <div class="d-flex justify-content-end mt-3">
          <button
            class="btn btn-danger btn-sm rounded-pill px-4 d-flex align-items-center gap-2 shadow-sm"
            style="font-size:.78rem;font-weight:600;padding:.65rem 1.5rem;"
            onclick="window.prosseguirParaFormulario()">
            <i class="bi bi-cart-check-fill"></i>
            Avançar para Checkout
            <i class="bi bi-arrow-right"></i>
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
