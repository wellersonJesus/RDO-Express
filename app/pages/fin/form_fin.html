<div class="modal fade" id="modalFormFin" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h6 id="form-fin-titulo" class="fw-bold mb-0" style="font-size:.88rem;">Novo Lançamento</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-3 pb-2">
                <input type="hidden" id="fin-id">
                <div id="form-fin-erro" class="alert alert-danger small py-2 d-none"></div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fin-label mb-1">Data <span class="text-danger">*</span></label>
                        <input type="date" id="fin-data" class="form-control form-control-sm fin-input">
                    </div>
                    <div class="col-6">
                        <label class="form-label fin-label mb-1">Tipo <span class="text-danger">*</span></label>
                        <select id="fin-tipo" class="form-select form-select-sm fin-input">
                            <option value="">Selecione...</option>
                            <option value="entrada">Entrada</option>
                            <option value="saida">Saída</option>
                        </select>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fin-label mb-1">Categoria</label>
                        <input type="text" id="fin-categoria" class="form-control form-control-sm fin-input" placeholder="Ex: Corrida, Combustível">
                    </div>
                    <div class="col-6">
                        <label class="form-label fin-label mb-1">Valor <span class="text-danger">*</span></label>
                        <input type="text" id="fin-valor" class="form-control form-control-sm fin-input" placeholder="0,00" inputmode="decimal">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fin-label mb-1">Descrição <span class="text-danger">*</span></label>
                        <input type="text" id="fin-descricao" class="form-control form-control-sm fin-input" placeholder="Ex: Pagamento corrida cliente X">
                    </div>
                    <div class="col-6">
                        <label class="form-label fin-label mb-1">Status</label>
                        <select id="fin-status" class="form-select form-select-sm fin-input">
                            <option value="pendente">Pendente</option>
                            <option value="pago">Pago</option>
                            <option value="recebido">Recebido</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <label class="form-label fin-label mb-1">Forma de Pagamento</label>
                        <select id="fin-pagamento" class="form-select form-select-sm fin-input">
                            <option value="">Selecione</option>
                            <option value="pix">PIX</option>
                            <option value="dinheiro">Dinheiro</option>
                            <option value="cartao_credito">Cartão Crédito</option>
                            <option value="cartao_debito">Cartão Débito</option>
                            <option value="boleto">Boleto</option>
                            <option value="transferencia">Transferência</option>
                        </select>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fin-label mb-1">Observação</label>
                        <textarea id="fin-observacao" class="form-control form-control-sm fin-input" rows="2" placeholder="Detalhes adicionais..."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0 px-4 pb-4 pt-2">
                <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal" style="font-size:.74rem;">Cancelar</button>
                <button type="button" id="btn-salvar-form-fin" class="btn btn-danger btn-sm rounded-pill px-4" style="font-size:.74rem;">
                    <span id="spinner-salvar-fin" class="spinner-border spinner-border-sm me-1 d-none"></span>
                    <span id="txt-salvar-fin">Salvar</span>
                </button>
            </div>
        </div>
    </div>
</div>
