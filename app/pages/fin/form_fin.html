<div class="modal fade" id="modalFormFin" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 id="form-fin-titulo" class="modal-title fw-bold">Novo Lançamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-2">
                <div id="form-fin-erro" class="alert alert-danger small py-2 d-none"></div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold">Descrição <span class="text-danger">*</span></label>
                    <input type="text" id="fin-descricao" class="form-control form-control-sm" placeholder="Ex: Pagamento corrida cliente X">
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Valor <span class="text-danger">*</span></label>
                        <input type="number" id="fin-valor" class="form-control form-control-sm" step="0.01" min="0" placeholder="0,00">
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Tipo <span class="text-danger">*</span></label>
                        <select id="fin-tipo" class="form-select form-select-sm">
                            <option value="">Selecione...</option>
                            <option value="entrada">Entrada</option>
                            <option value="saida">Saída</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Categoria</label>
                        <input type="text" id="fin-categoria" class="form-control form-control-sm" placeholder="Ex: Corrida, Combustível">
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Status</label>
                        <select id="fin-status" class="form-select form-select-sm">
                            <option value="pendente">Pendente</option>
                            <option value="pago">Pago</option>
                            <option value="recebido">Recebido</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold">Data</label>
                    <input type="date" id="fin-data" class="form-control form-control-sm">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold">Observação</label>
                    <textarea id="fin-observacao" class="form-control form-control-sm" rows="2" placeholder="Observações adicionais..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-salvar-form-fin" class="btn btn-danger btn-sm rounded-pill px-4">
                    <span id="spinner-salvar-fin" class="spinner-border spinner-border-sm me-1 d-none"></span>
                    <span id="txt-salvar-fin">Salvar</span>
                </button>
            </div>
        </div>
    </div>
</div>
