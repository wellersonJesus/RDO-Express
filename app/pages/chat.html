<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3"></i>
                    <div>
                        <h5 class="fw-bold mb-0">RDO <span class="fw-light opacity-75">Express</span></h5>
                        <div class="d-flex align-items-center gap-2">
                            <span id="sync-text" class="text-white-50 small fst-italic" style="font-size: 0.7rem;">Chat atualizado</span>
                            <i id="sync-icon" class="bi bi-arrow-repeat text-white-50" style="cursor:pointer; font-size: 0.8rem;" onclick="carregarDados(true)"></i>
                        </div>
                    </div>
                </div>
                <div id="atendentes-status-bar" class="d-flex gap-2"></div>
                <div class="input-group bg-white rounded-pill p-1 shadow-sm" style="width: 40%;">
                    <input type="text" id="input-colar" class="form-control border-0 bg-transparent px-3" placeholder="Colar pedido..." style="font-size: 0.85rem;">
                    <button class="btn btn-danger rounded-pill px-4 fw-bold" onclick="criarPedido()">GERAR</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4"><div id="lista-contatos-chat" class="list-group overflow-auto bg-white rounded-4 shadow-sm" style="height: 550px;"></div></div>
    <div class="col-md-8"><div id="chat-messages-container" class="card border-0 shadow-sm p-4 overflow-auto whatsapp-bg rounded-4" style="height: 550px;"></div></div>
</div>

<style>
    .status-dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid white; position: absolute; bottom: 0; right: 0; }
    .grayscale { filter: grayscale(1); opacity: 0.4; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<script>
    let isFetching = false;
    let jidSelecionado = null;

    async function carregarDados(force = false) {
        if (isFetching) return;
        isFetching = true;
        
        const icon = document.getElementById('sync-icon');
        const text = document.getElementById('sync-text');
        
        icon.classList.add('spin');
        text.innerText = "Chat atualizando...";

        try {
            const masterOn = localStorage.getItem('bot_status') === 'true';
            const [configs, pedidos] = await Promise.all([
                API.call('getbotconfig'),
                API.call('getchatlive')
            ]);

            renderizarChat(configs || [], pedidos || [], masterOn);
            text.innerText = "Chat atualizado";
        } catch (e) {
            text.innerText = "Erro ao sincronizar";
        } finally {
            icon.classList.remove('spin');
            isFetching = false;
        }
    }

    function renderizarChat(configs, pedidos, masterOn) {
        const statusBar = document.getElementById('atendentes-status-bar');
        const listaGrupos = document.getElementById('lista-contatos-chat');

        // Renderizar Atendentes no Topo
        statusBar.innerHTML = configs.filter(c => c.tipo !== 'GRUPO').map(at => {
            const online = masterOn && String(at.status).toLowerCase() === 'true';
            return `
                <div class="position-relative">
                    <img src="${at.imagem}" class="rounded-circle border ${online ? 'border-success' : 'grayscale'}" width="30" height="30">
                    <span class="status-dot ${online ? 'bg-success' : 'bg-secondary'}"></span>
                </div>`;
        }).join('');

        // Renderizar Lista Lateral
        listaGrupos.innerHTML = configs.filter(g => g.tipo === 'GRUPO').map(g => {
            const online = masterOn && String(g.status).toLowerCase() === 'true';
            const active = jidSelecionado === g.jid_numero;
            return `
                <button onclick="selecionarGrupo('${g.jid_numero}')" class="list-group-item list-group-item-action border-0 p-3 ${active ? 'bg-danger text-white' : ''} ${!online ? 'grayscale' : ''}">
                    <div class="d-flex align-items-center">
                        <img src="${g.imagem}" class="rounded-circle me-3" width="35" height="35">
                        <span class="fw-bold small">${g.username}</span>
                    </div>
                </button>`;
        }).join('');

        // Renderizar Mensagens
        const container = document.getElementById('chat-messages-container');
        const filtrados = jidSelecionado ? pedidos.filter(p => p.cliente === jidSelecionado) : pedidos;
        container.innerHTML = filtrados.slice().reverse().map(p => `
            <div class="d-flex flex-column ${p.status === 'Concluído' ? 'align-items-end' : 'align-items-start'} mb-2">
                <div class="p-2 px-3 bg-white shadow-sm rounded-3 small" style="max-width: 80%;">${p.ultima_msg}</div>
            </div>`).join('');
    }

    window.selecionarGrupo = (jid) => {
        jidSelecionado = (jidSelecionado === jid) ? null : jid;
        carregarDados();
    };

    window.addEventListener('storage', carregarDados);
    carregarDados();
</script>
