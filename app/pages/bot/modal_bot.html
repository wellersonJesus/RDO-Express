<!-- Modal Escolha Tipo -->
<div class="modal fade" id="modalEscolhaTipo" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-4 text-center"><h5>Novo Registro</h5><button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('usuarios')">Usuário</button><button class="btn btn-outline-danger w-100 mb-2" onclick="window.abrirModalEspecifico('clientes')">Cliente</button><button class="btn btn-outline-danger w-100" onclick="window.abrirModalEspecifico('colaboradores')">Colaborador</button></div></div></div></div>

<!-- Modal Usuário (O formulário que você pediu) -->
<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">Cadastrar Usuário</h5>
                <input type="text" id="u-username" class="form-control mb-2" placeholder="Digite o nome completo">
                <input type="password" id="u-password" class="form-control mb-2" placeholder="Digite sua senha...">
                <input type="text" id="u-imagem" class="form-control mb-2" placeholder="URL da imagem">
                <label class="small text-muted mb-1">Tipo (Segure CTRL para múltiplos):</label>
                <select id="u-tipo" class="form-select mb-3" multiple style="height: 120px;">
                    <option value="Atendente">Atendente</option><option value="Grupo">Grupo</option><option value="Motoboy">Motoboy</option><option value="TI">TI</option><option value="SRE Architect">SRE Architect</option><option value="Logistica">Logistica</option><option value="Financeiro">Financeiro</option><option value="Comercial">Comercial</option>
                </select>
                <button id="btn-save-modal" class="btn btn-danger w-100 fw-bold" onclick="window.salvarNovo()">Salvar</button>
            </div>
        </div>
    </div>
</div>
