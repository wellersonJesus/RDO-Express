<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | SRE Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="landing-page">
        <div class="card shadow-lg p-5 bg-white rounded-4" style="z-index:10; width: 380px; border:none;">
            <h3 class="fw-bold text-center mb-4"><span class="text-danger">RDO</span> EXPRESS</h3>
            <form id="login-form">
                <div class="mb-3"><input type="text" id="user" class="form-control py-2" placeholder="Usuário"></div>
                <div class="mb-4"><input type="password" id="pass" class="form-control py-2" placeholder="Senha"></div>
                <button class="btn btn-danger w-100 fw-bold py-2">ACESSAR SISTEMA</button>
            </form>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <aside class="sidebar">
            <div class="p-4 border-bottom text-center">
                <h4 class="fw-bold m-0 text-danger">RDO EXPRESS</h4>
            </div>
            
            <nav class="mt-3 flex-grow-1">
                <a class="nav-link" onclick="toggleDrop('m-gestao', this)">
                    <i class="bi bi-box-seam me-2"></i> Gestão <i class="bi bi-chevron-down ms-auto small"></i>
                </a>
                <ul class="submenu list-unstyled" id="m-gestao" style="display:none; padding-left: 20px;">
                    <li><a class="nav-link py-1" onclick="loadModule('gestao', 'entregas', 'Gestão / Entregas')">Entrega</a></li>
                    <li><a class="nav-link py-1" onclick="loadModule('gestao', 'coletas', 'Gestão / Coletas')">Coletas</a></li>
                </ul>

                <a class="nav-link" onclick="toggleDrop('m-relat', this)">
                    <i class="bi bi-file-earmark-text me-2"></i> Relatório <i class="bi bi-chevron-down ms-auto small"></i>
                </a>
                <ul class="submenu list-unstyled" id="m-relat" style="display:none; padding-left: 20px;">
                    <li><a class="nav-link py-1" onclick="loadModule('relatorios', 'geral', 'Relatórios / Geral')">Geral</a></li>
                </ul>
            </nav>

            <div class="p-3">
                <button class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center" data-bs-toggle="modal" data-bs-target="#logoutModal">
                    <i class="bi bi-door-open me-2"></i> Sair
                </button>
            </div>
        </aside>

        <header class="top-header">
            <div class="d-flex align-items-center">
                <button class="btn btn-light d-lg-none me-3" onclick="document.querySelector('.sidebar').classList.toggle('active')">
                    <i class="bi bi-list"></i>
                </button>
                <h5 class="fw-bold m-0 text-dark" id="dynamic-title">Dashboard</h5>
            </div>

            <div class="user-profile" data-bs-toggle="modal" data-bs-target="#logoutModal">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small text-dark lh-1">SRE Wellerson</div>
                    <small class="text-danger fw-bold" style="font-size: 0.65rem; text-uppercase;">Master</small>
                </div>
                <div class="user-avatar">W</div>
            </div>
        </header>

        <main class="main-content">
            <div id="router-view"></div>
        </main>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body p-4 text-center">
                    <i class="bi bi-exclamation-circle text-danger display-4"></i>
                    <h4 class="fw-bold mt-3">Encerrar Sessão?</h4>
                    <p class="text-muted">Você realmente deseja sair da aplicação RDO Express?</p>
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button type="button" class="btn btn-light px-4 rounded-pill" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger px-4 rounded-pill" onclick="logout()">Sim, Sair</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleDrop(id, el) {
            const menu = document.getElementById(id);
            const isOpen = menu.style.display === 'block';
            menu.style.display = isOpen ? 'none' : 'block';
            el.classList.toggle('active');
        }
    </script>
</body>
</html>
