<div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header bg-danger text-white rounded-top-4">
                <h5 class="modal-title fw-bold">RDO Express - Checkout</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="form-checkout">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="small fw-bold">SOLICITANTE</label><input type="text" id="p-solicitante" class="form-control form-control-sm" readonly></div>
                        <div class="col-md-6"><label class="small fw-bold">CONTATO</label><input type="text" id="p-contato" class="form-control form-control-sm"></div>
                        <div class="col-md-4"><label class="small fw-bold">HORÁRIO ESTIMADO</label><input type="text" id="p-horario" class="form-control form-control-sm" placeholder="00:00"></div>
                        <div class="col-md-4"><label class="small fw-bold">DISTÂNCIA (KM)</label><input type="number" id="p-distancia" class="form-control form-control-sm" oninput="window.calcularTudo()"></div>
                        <div class="col-md-4"><label class="small fw-bold">TEMPO ESTIMADO</label><input type="text" id="p-tempo" class="form-control form-control-sm"></div>
                        
                        <div class="col-md-6"><label class="small fw-bold">VALOR KM</label>
                            <select id="p-valor-km" class="form-select form-select-sm" onchange="window.calcularTudo()">
                                <option value="2.02">2,02</option><option value="2.03">2,03</option><option value="2.05">2,05</option>
                                <option value="2.10">2,10</option><option value="2.20" selected>2,20</option><option value="2.40">2,40</option>
                                <option value="2.60">2,60</option><option value="3.00">3,00</option>
                            </select>
                        </div>
                        <div class="col-md-6"><label class="small fw-bold">MERCADORIA</label>
                            <select id="p-mercadoria" class="form-select form-select-sm">
                                <option>Sacola</option><option>Coleta</option><option>Bolsa</option><option>Envelope</option>
                            </select>
                        </div>

                        <div class="col-12"><label class="small fw-bold">ROTA (DE/PARA)</label><textarea id="p-rotas" class="form-control form-control-sm" rows="3"></textarea></div>

                        <div class="col-md-4"><label class="small fw-bold">TAXA RETORNO</label>
                            <select id="p-retorno" class="form-select form-select-sm" onchange="window.calcularTudo()">
                                <option value="0">NÃO (Taxa 0)</option><option value="0.6">SIM (Taxa 60%)</option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="small fw-bold">TAXA DINÂMICA</label>
                            <select id="p-dinamica" class="form-select form-select-sm" onchange="window.calcularTudo()">
                                <option value="0">Taxa 01 (0)</option><option value="5">Taxa 02 (5)</option><option value="7">Taxa 03 (7)</option>
                                <option value="10">Taxa 04 (10)</option><option value="15">Taxa 05 (15)</option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="small fw-bold">PRIORIDADE</label>
                            <select id="p-prioridade" class="form-select form-select-sm" onchange="window.calcularTudo()">
                                <option value="0">Normal</option><option value="5">Agendado (+5)</option><option value="7">Urgente (+7)</option>
                            </select>
                        </div>
                        <div class="col-12"><label class="small fw-bold">OBSERVAÇÃO</label><input type="text" id="p-obs" class="form-control form-control-sm"></div>
                    </div>
                </form>
                <div class="mt-4 text-center p-3 bg-light border rounded">
                    <div class="text-muted small">TOTAL ESTIMADO</div>
                    <div id="view-valor-final" class="fs-2 fw-bold text-danger">R$ 0,00</div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-secondary" onclick="window.voltarParaMapa()">Voltar</button>
                <button class="btn btn-danger px-4" onclick="window.salvarPedidoAPI()">EMITIR</button>
            </div>
        </div>
    </div>
</div>
