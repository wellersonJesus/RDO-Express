<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-danger text-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3"></i>
                    <div>
                        <h5 class="fw-bold mb-0">RDO <span class="fw-light opacity-75">Express</span></h5>
                        <div class="d-flex align-items-center gap-1">
                            <span id="sync-text" class="text-white-50" style="font-size: 0.65rem;">Cache Ativo</span>
                            <i id="sync-icon" class="bi bi-arrow-repeat text-white-50" style="cursor:pointer;" onclick="carregarDados(true)"></i>
                        </div>
                    </div>
                </div>
                <div class="input-group bg-white rounded-pill p-1 shadow-sm" style="width: 45%;">
                    <input type="text" id="input-colar" class="form-control border-0 bg-transparent px-3" placeholder="Colar conteúdo do pedido..." style="font-size: 0.85rem;">
                    <button class="btn btn-danger rounded-pill px-4 fw-bold" onclick="criarPedido()">GERAR</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="accordion-container shadow-sm rounded-4 overflow-hidden bg-white" style="height: 580px; overflow-y: auto;">
            <div class="p-3 border-bottom bg-light fw-bold text-secondary small text-uppercase">Equipe / Canais</div>
            <div id="lista-atendentes-chat" class="list-group list-group-flush"></div>
            <div class="p-3 border-bottom bg-light fw-bold text-secondary small text-uppercase">Grupos de Operação</div>
            <div id="lista-grupos-chat" class="list-group list-group-flush"></div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column" style="height: 580px;">
            <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center">
                <div id="chat-header-avatar">
                    <div class="rounded-circle bg-light d-flex align-items-center justify-content-center border" style="width: 40px; height: 40px;">
                        <i class="bi bi-person text-muted"></i>
                    </div>
                </div>
                <div class="ms-3">
                    <h6 id="chat-header-name" class="fw-bold mb-0" style="font-size: 0.9rem;">Selecione uma conversa</h6>
                    <small id="chat-header-status" class="text-muted" style="font-size: 0.7rem;">Aguardando...</small>
                </div>
            </div>
            <div id="chat-messages-container" class="flex-grow-1 p-4 whatsapp-bg overflow-auto">
                <div class="text-center my-5 text-muted small">Clique em um contato para ver as mensagens.</div>
            </div>
            <div class="p-3 bg-white border-top">
                <div class="input-group bg-light rounded-pill p-1">
                    <button class="btn btn-link text-secondary"><i class="bi bi-emoji-smile"></i></button>
                    <input type="text" id="msg-input" class="form-control border-0 bg-transparent px-2" placeholder="Digite uma mensagem...">
                    <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="enviarMensagemChat()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    if (!window.chatState) {
        window.chatState = { jidSelecionado: sessionStorage.getItem('last_jid'), cacheDados: null, lastHeader: null };
    }

    async function carregarDados(force = false) {
        const icon = document.getElementById('sync-icon');
        if (window.chatState.cacheDados && !force) {
            renderizar(window.chatState.cacheDados.configs, window.chatState.cacheDados.pedidos);
            restaurarHeader();
            return;
        }
        if(icon) icon.classList.add('spin');
        try {
            const [configs, pedidos] = await Promise.all([API.call('getbotconfig'), API.call('getchatlive')]);
            window.chatState.cacheDados = { configs, pedidos };
            renderizar(configs, pedidos);
        } finally { if(icon) icon.classList.remove('spin'); }
    }

    function renderizar(configs, pedidos) {
        const masterOn = localStorage.getItem('bot_status') === 'true';
        
        // Renderizar Atendentes e Cargos (Qualquer coisa que NÃO seja grupo)
        document.getElementById('lista-atendentes-chat').innerHTML = configs
            .filter(c => c.tipo && c.tipo.toLowerCase() !== 'grupo')
            .map(u => {
                const isOnline = masterOn && String(u.status) === 'true';
                const selecionado = window.chatState.jidSelecionado === u.jid_numero;
                return `<button onclick="selecionarJid('${u.jid_numero}', '${u.username}', '${u.imagem}', ${isOnline})" class="list-group-item list-group-item-action p-2 ${selecionado ? 'bg-danger text-white' : ''}">
                    <div class="d-flex align-items-center px-2">
                        <img src="${u.imagem}" class="rounded-circle border me-3" width="35" height="35" style="object-fit:cover">
                        <div class="flex-grow-1">
                            <span class="fw-bold d-block small ${selecionado ? 'text-white' : ''}">${u.username}</span>
                            <small class="${selecionado ? 'text-white-50' : 'text-muted'}" style="font-size:0.6rem">${u.tipo}</small>
                        </div>
                        <span class="status-dot ${isOnline ? 'bg-success' : 'bg-secondary'}"></span>
                    </div></button>`;
            }).join('');

        // Renderizar Grupos (Filtro corrigido para ignorar Case)
        document.getElementById('lista-grupos-chat').innerHTML = configs
            .filter(c => c.tipo && c.tipo.toLowerCase() === 'grupo')
            .map(g => {
                const selecionado = window.chatState.jidSelecionado === g.jid_numero;
                return `<button onclick="selecionarJid('${g.jid_numero}', '${g.username}', '${g.imagem}', true)" class="list-group-item list-group-item-action p-2 ${selecionado ? 'bg-danger text-white' : ''}">
                    <div class="d-flex align-items-center px-2">
                        <img src="${g.imagem}" class="rounded-circle border me-3" width="35" height="35" style="object-fit:cover">
                        <span class="fw-bold small ${selecionado ? 'text-white' : ''}">${g.username}</span>
                    </div></button>`;
            }).join('');

        if (window.chatState.jidSelecionado) {
            atualizarMensagens(pedidos);
        }
    }

    function atualizarMensagens(pedidos) {
        const container = document.getElementById('chat-messages-container');
        const msgs = pedidos.filter(p => p.cliente === window.chatState.jidSelecionado);
        if (msgs.length) {
            container.innerHTML = msgs.slice().reverse().map(p => `
                <div class="msg-bubble ${p.status === 'Concluído' ? 'msg-sent' : 'msg-received'}">
                    ${p.ultima_msg}
                </div>`).join('');
        } else {
            container.innerHTML = '<div class="text-center my-5 text-muted small">Sem mensagens neste chat.</div>';
        }
        container.scrollTop = container.scrollHeight;
    }

    window.selecionarJid = (jid, nome, imagem, online) => {
        window.chatState.jidSelecionado = jid;
        window.chatState.lastHeader = { nome, imagem, online };
        sessionStorage.setItem('last_jid', jid);
        restaurarHeader();
        renderizar(window.chatState.cacheDados.configs, window.chatState.cacheDados.pedidos);
    };

    function restaurarHeader() {
        const h = window.chatState.lastHeader;
        if(!h) return;
        document.getElementById('chat-header-name').innerText = h.nome;
        document.getElementById('chat-header-status').innerText = h.online ? 'Online' : 'Offline';
        document.getElementById('chat-header-avatar').innerHTML = `<img src="${h.imagem}" class="rounded-circle border" width="40" height="40" style="object-fit:cover">`;
    }

    carregarDados();
</script>
