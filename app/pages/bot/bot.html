<div class="card shadow-sm border-0 bg-white">
    <div class="card-header bg-white py-3 border-0">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="fw-bold text-dark mb-0" style="font-size: 1.1rem;">Instâncias do Bot</h4>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm btn-outline-info" onclick="window.abrirModalForm()">
                    NOVO REGISTRO
                </button>
                <button type="button" id="btn-status-bot" class="btn btn-sm btn-outline-info" onclick="window.toggleMaster()">
                    MASTER
                </button>
            </div>
        </div>
    </div>
    <div class="table-responsive px-3 pb-3">
        <table class="table table-hover align-middle">
            <thead class="text-uppercase text-muted" style="font-size: 0.65rem; letter-spacing: 0.5px;">
                <tr>
                    <th></th><th>Status</th><th>Avatar</th><th>Nome</th><th>Tipo</th><th>Ações</th>
                </tr>
            </thead>
            <tbody id="bot-list"></tbody>
        </table>
    </div>
</div>
