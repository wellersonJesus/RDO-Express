<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Express | SRE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="admin-panel">
        <aside class="sidebar">
            <div class="py-4 px-2 text-center">
                <h4 class="fw-bold m-0"><span class="text-danger">RDO</span> EXPRESS</h4>
            </div>
            
            <nav class="flex-grow-1">
                <div class="nav-item">
                    <a class="nav-link" onclick="toggleDrop('m-gestao')">
                        <i class="bi bi-grid-1x2-fill"></i> <span>Gestão</span>
                    </a>
                    <ul class="submenu" id="m-gestao">
                        <li><a class="nav-link" onclick="loadModule('gestao', 'entregas', 'Gestão / Entregas')">Entrega</a></li>
                        <li><a class="nav-link" onclick="loadModule('gestao', 'coletas', 'Gestão / Coletas')">Coletas</a></li>
                    </ul>
                </div>

                <div class="nav-item">
                    <a class="nav-link" onclick="toggleDrop('m-relat')">
                        <i class="bi bi-pie-chart-fill"></i> <span>Relatório</span>
                    </a>
                    <ul class="submenu" id="m-relat">
                        <li><a class="nav-link" onclick="loadModule('relatorios', 'geral', 'Relatórios / Geral')">Geral</a></li>
                    </ul>
                </div>

                <div class="nav-item">
                    <a class="nav-link" onclick="toggleDrop('m-admin')">
                        <i class="bi bi-gear-wide-connected"></i> <span>Administração</span>
                    </a>
                    <ul class="submenu" id="m-admin">
                        <li><a class="nav-link" onclick="loadModule('admin', 'config', 'Administração / WhatsApp')">WhatsApp Bot</a></li>
                    </ul>
                </div>
            </nav>

            <div class="pb-4">
                <a class="nav-link text-danger" data-bs-toggle="modal" data-bs-target="#logoutModal">
                    <i class="bi bi-power"></i> <span>Sair do Sistema</span>
                </a>
            </div>
        </aside>

        <header class="top-header">
            <div class="d-flex align-items-center">
                <button class="btn btn-light d-lg-none me-3" onclick="document.querySelector('.sidebar').classList.toggle('active')">
                    <i class="bi bi-list"></i>
                </button>
                <h5 class="fw-bold m-0" id="dynamic-title">Dashboard</h5>
            </div>

            <div class="user-profile d-flex align-items-center gap-3" data-bs-toggle="modal" data-bs-target="#logoutModal" style="cursor:pointer">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small lh-1">SRE Wellerson</div>
                    <small class="text-danger fw-bold" style="font-size: 0.65rem;">MASTER</small>
                </div>
                <div class="user-avatar">W</div>
            </div>
        </header>

        <main class="main-content">
            <div id="router-view"></div>
        </main>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body p-4 text-center">
                    <h4 class="fw-bold mt-2">Deseja sair da aplicação?</h4>
                    <p class="text-muted">Sua sessão será encerrada com segurança.</p>
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-danger rounded-pill px-4" onclick="logout()">Sair Agora</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleDrop(id) {
            const menu = document.getElementById(id);
            const wasOpen = menu.classList.contains('show');
            document.querySelectorAll('.submenu').forEach(m => m.classList.remove('show'));
            if (!wasOpen) menu.classList.add('show');
        }
    </script>
</body>
</html>
