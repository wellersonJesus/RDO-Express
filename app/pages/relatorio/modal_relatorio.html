<div id="modalBuilderOverlay" class="rb-overlay">
  <div id="modalBuilderContainer" class="rb-container">

    <div class="rb-header">
      <div class="d-flex align-items-center gap-3">
        <div class="rb-header-icon"><i class="bi bi-sliders"></i></div>
        <div>
          <div class="rb-header-title">Construtor de Relatório</div>
          <div class="rb-header-sub" id="rb-header-step">Etapa 1 de 2 - Selecione os campos</div>
        </div>
      </div>
      <button id="rb-btn-fechar" type="button" class="rb-btn-close" title="Fechar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="rb-steps-track">
      <div class="rb-step-dot active" data-step="1"><span>1</span> Campos</div>
      <div class="rb-step-line"></div>
      <div class="rb-step-dot" data-step="2"><span>2</span> Nome</div>
    </div>

    <div id="rb-step-1" class="rb-step-content active">
      <div class="rb-banco-tabs" id="rb-banco-tabs"></div>
      <div class="rb-banco-panels" id="rb-banco-panels"></div>
    </div>

    <div id="rb-step-2" class="rb-step-content">
      <div class="rb-step2-wrapper">
        <div class="rb-step2-icon"><i class="bi bi-file-earmark-text"></i></div>
        <label class="rb-step2-label" for="rb-nome-relatorio">Nome do Relatório</label>
        <input type="text" id="rb-nome-relatorio" class="form-control rb-nome-input"
          placeholder="Ex: Fechamento Mensal Motoboys - Julho">
        <div class="rb-step2-resumo" id="rb-step2-resumo"></div>
      </div>
    </div>

    <div class="rb-footer">
      <button id="rb-btn-voltar" type="button" class="btn-modal-rel btn-modal-rel-light" style="display:none;">
        <i class="bi bi-arrow-left"></i>
        <span>Voltar</span>
      </button>
      <div class="rb-footer-spacer"></div>
      <button id="rb-btn-avancar" type="button" class="btn-modal-rel btn-modal-rel-primary">
        <span>Avançar</span>
        <i class="bi bi-arrow-right"></i>
      </button>
      <button id="rb-btn-gerar-final" type="button" class="btn-modal-rel btn-modal-rel-primary" style="display:none;">
        <i class="bi bi-file-earmark-bar-graph"></i>
        <span>Gerar Relatório</span>
      </button>
    </div>

  </div>
</div>

<div id="modalRelatorioOverlay" class="rel-overlay">
  <div id="modalRelatorioContainer" class="rel-container">

    <div class="rel-header">
      <div class="d-flex align-items-center gap-3">
        <div class="rel-header-icon">
          <i id="modal-rel-icon" class="bi bi-file-earmark-bar-graph"></i>
        </div>
        <div>
          <div class="rel-header-title" id="modal-rel-titulo">RELATÓRIO</div>
          <div class="rel-header-sub" id="modal-rel-periodo">--/--/---- a --/--/----</div>
        </div>
      </div>
      <button id="modal-rel-fechar" type="button" class="rb-btn-close" title="Fechar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div id="modal-rel-body" class="rel-body">
      <!-- Conteúdo do relatório é injetado dinamicamente via JS -->
    </div>

    <div class="rel-footer">
      <button id="modal-rel-btn-voltar" type="button" class="btn-modal-rel btn-modal-rel-light" style="display:none;">
        <i class="bi bi-arrow-left"></i>
        <span>Voltar e Editar</span>
      </button>

      <div class="rb-footer-spacer"></div>

      <button id="modal-rel-btn-cancelar" type="button" class="btn-modal-rel btn-modal-rel-light">
        <i class="bi bi-x-circle"></i>
        <span>Fechar</span>
      </button>

      <button id="modal-rel-btn-copiar" type="button" class="btn-modal-rel btn-modal-rel-outline">
        <i class="bi bi-clipboard"></i>
        <span>Copiar</span>
      </button>

      <button id="modal-rel-btn-pdf" type="button" class="btn-modal-rel btn-modal-rel-outline">
        <i class="bi bi-file-earmark-pdf"></i>
        <span>PDF</span>
      </button>

      <button id="modal-rel-btn-salvar" type="button" class="btn-modal-rel btn-modal-rel-primary" style="display:none;">
        <i class="bi bi-save"></i>
        <span>Salvar Relatório</span>
      </button>
    </div>

  </div>
</div>

<div id="modalPdfPreviewOverlay" class="pdf-overlay">
  <div id="modalPdfPreviewContainer" class="pdf-container">

    <div class="pdf-header">
      <div class="d-flex align-items-center gap-3">
        <div class="pdf-header-icon"><i class="bi bi-file-earmark-pdf"></i></div>
        <div>
          <div class="pdf-header-title">PRÉ-VISUALIZAÇÃO DO PDF</div>
          <div class="pdf-header-sub">Confira todos os dados antes de imprimir</div>
        </div>
      </div>
      <button id="pdf-preview-btn-fechar" type="button" class="rb-btn-close" title="Fechar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div id="pdf-preview-body" class="pdf-body">
      <!-- Conteúdo do PDF é injetado dinamicamente via JS -->
    </div>

    <div class="pdf-footer">
      <div class="pdf-footer-hint">
        <i class="bi bi-info-circle me-1"></i>Revise o conteúdo antes de confirmar a impressão.
      </div>
      <div class="pdf-footer-actions">
        <button id="pdf-preview-btn-cancelar" type="button" class="btn-modal-rel btn-modal-rel-light">
          <i class="bi bi-x-circle"></i>
          <span>Cancelar</span>
        </button>
        <button id="pdf-preview-btn-imprimir" type="button" class="btn-modal-rel btn-modal-rel-primary">
          <i class="bi bi-printer"></i>
          <span>Imprimir</span>
        </button>
      </div>
    </div>

  </div>
</div>
