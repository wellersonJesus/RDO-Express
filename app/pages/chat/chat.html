<div class="row g-3 h-100">
    <div class="col-12">
        <div class="card border-0 shadow-sm bg-white rounded-4 overflow-hidden">
            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-whatsapp fs-3 text-danger"></i>
                    <div>
                        <h5 class="fw-bold mb-0"><span style="color: #FF0000;">RDO</span> Express - Chat</h5>
                        <small class="text-muted" style="font-size: 0.75rem;">Atendimento em Tempo Real</small>
                    </div>
                </div>
                <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="carregarDados()">
                    <i id="sync-icon-chat" class="bi bi-arrow-repeat"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 bg-white d-flex flex-column" style="height: 600px;">
            <div class="p-3 border-bottom">
                <div class="input-group bg-light rounded-pill px-2">
                    <span class="input-group-text bg-transparent border-0"><i
                            class="bi bi-search text-secondary"></i></span>
                    <input type="text" id="chat-search" class="form-control border-0 bg-transparent shadow-none"
                        placeholder="Pesquisar ...">
                </div>
            </div>
            <div id="lista-contatos-chat" class="list-group list-group-flush overflow-auto flex-grow-1"></div>
        </div>
    </div>

    <div class="col-md-8">
        <div id="dynamic-content-area" class="card border-0 shadow-sm rounded-4 overflow-hidden d-flex flex-column"
            style="height: 600px;">
            <div id="step-chat" class="d-flex flex-column h-100">
                <div id="chat-header" class="p-3 border-bottom bg-white d-flex align-items-center">
                    <img id="chat-header-logo" src="" class="rounded-circle d-none"
                        style="width: 40px; height: 40px; object-fit: cover;">
                    <div class="ms-3">
                        <h6 id="chat-header-name" class="fw-bold mb-0">Selecione um contato</h6>
                    </div>
                </div>
                <div id="chat-messages-container"
                    class="flex-grow-1 p-4 whatsapp-bg overflow-auto d-flex flex-column gap-2">
                    <div class="text-center text-muted my-auto"><i class="bi bi-chat-dots fs-1 d-block mb-2"></i>
                        <p>Selecione um contato na lista</p>
                    </div>
                </div>
                <div class="p-3 bg-white border-top">
                    <div class="input-group bg-light rounded-pill p-1">
                        <textarea id="msg-input" class="form-control border-0 bg-transparent px-3" rows="1"
                            placeholder="Digite a mensagem de pedido..."></textarea>
                        <button class="btn btn-danger rounded-pill px-3 ms-1" onclick="window.iniciarFluxoCheckout()">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="step-mapa" class="d-none d-flex flex-column h-100 p-4">
                <h6 class="fw-bold text-danger mb-3">Definir Rota</h6>
                <div id="map-placeholder"
                    class="flex-grow-1 bg-light rounded-3 border mb-3 d-flex align-items-center justify-content-center">
                    <span class="text-muted">Mapa de Rotas</span>
                </div>
                <button class="btn btn-danger rounded-pill" onclick="window.avancarParaFormulario()">Avançar para
                    Cálculo</button>
            </div>

            <div id="step-formulario" class="d-none d-flex flex-column h-100 p-4 overflow-auto">
                <h6 class="fw-bold text-danger mb-3">Detalhes do Pedido</h6>
                <div id="container-linhas-rotas" class="mb-3"></div>
                <button class="btn btn-success rounded-pill mt-auto" onclick="window.salvarPedidoAPI()">FINALIZAR
                    PEDIDO</button>
            </div>
        </div>
    </div>
</div>

</div>
</div>

<div class="modal fade" id="modalMapa" tabindex="-1" aria-labelledby="modalMapaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="modal-header border-0 pb-0 px-4 pt-4 flex-column align-items-start">
                <h5 class="modal-title fw-bold" id="modalMapaLabel">
                    <span class="text-danger">RDO</span> Express - Rota(s)
                </h5>
                <div class="mt-1 text-muted" style="font-size: 0.85rem; font-weight: normal;">
                    Solicitante: <span id="header-nome-solicitante">Carregando...</span>
                </div>
            </div>
            <div class="modal-body p-4">
                <div id="container-mapa-visual"
                    class="rounded-3 mb-4 border shadow-sm d-flex align-items-center justify-content-center"
                    style="height: 200px; background: #f8f9fa; color: #adb5bd;">
                    <span>Mapa Minimalista</span>
                </div>

                <div id="lista-rotas-editavel" class="mb-4">
                </div>

                <button class="btn btn-dark w-100 rounded-pill py-2 fw-bold"
                    onclick="window.prosseguirParaFormulario()">
                    Confirmar e Calcular
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalErro" tabindex="-1" aria-labelledby="modalErroLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-danger text-white border-0">
                <h5 class="modal-title" id="modalErroLabel">Atenção</h5>
            </div>
            <div class="modal-body p-4 text-center">
                <p id="msg-erro-conteudo" class="text-dark">Ocorreu um erro.</p>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-danger rounded-pill px-4"
                    data-bs-dismiss="modal">Entendido</button>
            </div>
        </div>
    </div>
</div>

<script src="app/js/chat/chat.js"></script>
